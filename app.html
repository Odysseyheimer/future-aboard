    // revealed: model answer + user's attempt + self-rate + Claude check
    h += '<div class="qz-bmodel"><div class="qz-bmodel-h">เฉลย (ตัวอย่างที่เป็นธรรมชาติ)</div>' +
      '<div class="qz-bmodel-en">' + esc(q.en) + ' <button type="button" class="qz-say" data-qz-say="model" aria-label="ฟัง">🔊</button>' +
      '<button type="button" class="qz-say" data-slow="' + esc(q.en) + '" aria-label="อ่านช้า">🐢</button></div></div>';
    if (String(Q.bDraft || "").replace(/^\s+|\s+$/g, "")) {
      h += '<div class="qz-byours"><div class="qz-byours-h">ที่คุณเขียน</div><div class="qz-byours-t">' + esc(Q.bDraft) + '</div></div>';
    }
    h += '<div class="qz-brate"><div class="qz-brate-h">ของคุณตรงกับเฉลยแค่ไหน?</div>' +
      '<button type="button" class="qz-bbtn qz-bok" data-qz-brate="good">✓ ตรงเลย</button>' +
      '<button type="button" class="qz-bbtn qz-bclose" data-qz-brate="close">≈ ใกล้เคียง</button>' +
      '<button type="button" class="qz-bbtn qz-bno" data-qz-brate="again">✗ ยังไม่ได้</button></div>';
    h += '<button type="button" class="qz-bclaude" data-qz-bclaude="1">📋 ให้ Claude ตรวจประโยคของฉัน</button>';
    h += '<div class="qz-bmsg" id="qz-bmsg"></div>';
    return h;
  }

  function renderType(S) {
    var q = Q.cur;
    var h = "";
    h += '<div class="qz-card">';
    h += '<div class="qz-plabel">' + (isEn(S) ? "พิมพ์ความหมาย (ไทย) ของคำนี้" : "พิมพ์คำศัพท์ภาษาอังกฤษ") + '</div>';
    h += '<div class="qz-prompt">' + esc(promptText(q.item, S)) + '</div>';
    if (isEn(S) && q.item.w) {
      h += '<button type="button" class="qz-say" data-qz-say="1" aria-label="ฟังเสียง">🔊</button>';
    }
    h += '</div>';

    h += '<div class="qz-typerow">';
    h += '<input id="qz-input" class="qz-input" type="text" autocomplete="off" autocapitalize="none" ' +
      'spellcheck="false" placeholder="พิมพ์คำตอบ..."' + (Q.answered ? ' disabled' : '') + '>';
    if (!Q.answered) {
      h += '<button type="button" class="qz-submit" data-qz-submit="1">ตรวจ</button>';
    }
    h += '</div>';

    if (Q.answered) {
      h += feedback(S);
      h += '<div class="qz-reveal">คำตอบ: <b>' + esc(q.answer || answerText(q.item, S)) + '</b>' + vfBadge(q.item) + '</div>';
      h += nextBtn();
    }
    return h;
  }

  // compact "went · gone" badge shown next to a reveal when the word is a verb
  function vfBadge(item) {
    if (!item || !item.vf || !item.vf.v2 || !item.vf.v3) return "";
    return ' <span class="qz-vf">V2 ' + esc(item.vf.v2) + ' · V3 ' + esc(item.vf.v3) + '</span>';
  }

  function feedback(S) {
    if (Q.lastCorrect) {
      return '<div class="qz-fb qz-fb-ok">ถูกต้อง! 🎉</div>';
    }
    return '<div class="qz-fb qz-fb-no">ยังไม่ถูก</div>';
  }

  function nextBtn() {
    return '<button type="button" class="qz-next" data-qz-next="1">ถัดไป</button>';
  }

  // Wire up event handlers for the freshly rendered DOM.
  function bind(S) {
    var v = document.getElementById("view");
    if (!v) return;
    var btns = v.querySelectorAll("[data-qz-sub]");
    var i;
    for (i = 0; i < btns.length; i++) {
      (function (b) {
        b.onclick = function () { setSub(b.getAttribute("data-qz-sub"), S); };
      })(btns[i]);
    }
    var picks = v.querySelectorAll("[data-qz-pick]");
    for (i = 0; i < picks.length; i++) {
      (function (b) {
        b.onclick = function () { pick(parseInt(b.getAttribute("data-qz-pick"), 10), S); };
      })(picks[i]);
    }
    var nx = v.querySelector("[data-qz-next]");
    if (nx) nx.onclick = function () { next(S); };
    var sub = v.querySelector("[data-qz-submit]:not([data-qz-breveal])");
    if (sub) sub.onclick = function () { submitTyped(S); };
    // build mode: reveal / self-rate / Claude check
    var brev = v.querySelector("[data-qz-breveal]");
    if (brev) brev.onclick = function () { bReveal(S); };
    var rates = v.querySelectorAll("[data-qz-brate]");
    for (i = 0; i < rates.length; i++) {
      (function (b) { b.onclick = function () { bRate(b.getAttribute("data-qz-brate"), S); }; })(rates[i]);
    }
    var bcl = v.querySelector("[data-qz-bclaude]");
    if (bcl) bcl.onclick = function () { bClaude(S); };
    var say = v.querySelector("[data-qz-say]");
    if (say) say.onclick = function () {
      if (!Q.cur || !Q.cur.item) return;
      var mode = say.getAttribute("data-qz-say");
      if (mode === "model") speak(Q.cur.en || "");
      else if (mode === "full") speak(Q.cur.item.ee || Q.cur.item.w);
      else speak(Q.cur.item.w);
    };
    var inp = v.querySelector("#qz-input");
    if (inp) {
      inp.onkeydown = function (e) {
        if ((e.keyCode || e.which) === 13) { e.preventDefault(); submitTyped(S); }
      };
      if (!Q.answered) { try { inp.focus(); } catch (e) {} }
    }
  }

  PT.quiz = {
    render: function (viewEl) { render(viewEl, window.S); },
    build: build,
    // exposed for potential host/testing use
    _state: Q
  };
})();

/* ===== module: bank ===== */
/* bank.js — "เติมประโยค" multi-blank word-bank game. Self-contained mini-game rendered
   inside the Quiz tab (own data/bank.json + own progress srs3_bank + PT.miss "bank"). ES5.
   Uses globals: esc, speak, store, PT.srs, PT.miss. */
PT.bank = (function () {
  "use strict";
  var POOL = null, loading = false, host = null, recs = null;
  var cur = null, tiles = [], filled = [], active = 0, checked = false;
  var right = 0, total = 0;

  function norm(s) { return String(s == null ? "" : s).replace(/^\s+|\s+$/g, "").toLowerCase(); }
  function keyB(it) { return (it && it.w ? it.w : "") + "|bank"; }
  function recsLoad() { if (!recs) recs = (PT.srs && PT.srs.load) ? PT.srs.load("bank") : {}; return recs; }

  function shuffle(a) { var i, j, t; for (i = a.length - 1; i > 0; i--) { j = Math.floor(Math.random() * (i + 1)); t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

  function load(cb) {
    if (POOL) { cb(); return; }
    if (loading) return;
    loading = true;
    fetch("data/bank.json").then(function (r) { return r.json(); }).then(function (d) { POOL = d; loading = false; cb(); })
      .catch(function () { loading = false; if (host) host.innerHTML = '<div class="qz-empty">โหลดเกมไม่สำเร็จ — เช็คเน็ตแล้วลองใหม่</div>'; });
  }

  function pick() {
    if (!POOL || !POOL.length) { cur = null; return; }
    var now = Date.now(), r = recsLoad(), cands = [], i;
    for (i = 0; i < POOL.length; i++) {
      var st = (PT.srs && PT.srs.statusOf) ? PT.srs.statusOf(r[keyB(POOL[i])], now) : "new";
      if (st !== "known") cands.push(POOL[i]);
    }
    if (!cands.length) cands = POOL.slice();
    var chosen = cands[Math.floor(Math.random() * cands.length)];
    if (cur && chosen === cur && cands.length > 1) chosen = cands[(cands.indexOf(chosen) + 1) % cands.length];
    cur = chosen;
    var n = (cur.a || []).length;
    filled = []; for (i = 0; i < n; i++) filled.push(-1);
    active = 0; checked = false;
    tiles = []; for (i = 0; i < (cur.bank || []).length; i++) tiles.push({ w: cur.bank[i], used: false });
    shuffle(tiles);
  }

  function cap(w) { return w ? w.charAt(0).toUpperCase() + w.slice(1) : w; }

  function sentHtml() {
    var parts = String(cur.w).split("___");
    var h = '<div class="qz-card bk-card"><div class="bk-sent">';
    var bi = 0, i;
    for (i = 0; i < parts.length; i++) {
      h += esc(parts[i]);
      if (i < parts.length - 1) {
        var atStart = (bi === 0 && /^\s*$/.test(parts[0]));
        var fi = filled[bi], word = (fi >= 0) ? tiles[fi].w : "";
        var disp = word ? (atStart ? cap(word) : word) : ("ช่อง " + (bi + 1));
        var cls = "bk-blank" + (word ? " bk-filled" : "") + ((active === bi && !checked) ? " bk-active" : "");
        if (checked) cls += (norm(word) === norm(cur.a[bi]) ? " bk-ok" : " bk-bad");
        h += '<button type="button" class="' + cls + '" data-bk-blank="' + bi + '" aria-label="ช่องที่ ' + (bi + 1) + '">' + esc(disp) + '</button>';
        if (checked && norm(word) !== norm(cur.a[bi])) h += '<span class="bk-corr">' + esc(cur.a[bi]) + '</span>';
        bi++;
      }
    }
    h += '</div>';
    if (cur.mt) h += '<div class="bk-th">' + esc(cur.mt) + '</div>';
    if (cur.hint && !checked) h += '<div class="bk-hint">💡 ' + esc(cur.hint) + '</div>';
    h += '</div>';
    return h;
  }

  function bankHtml() {
    var h = '<div class="bk-bank">', i;
    for (i = 0; i < tiles.length; i++) {
      var t = tiles[i], cls = "bk-tile" + (t.used ? " is-used" : "");
      h += '<button type="button" class="' + cls + '" data-bk-tile="' + i + '"' + ((t.used || checked) ? ' disabled' : '') +
        ' aria-pressed="' + (t.used ? "true" : "false") + '">' + esc(t.w) + '</button>';
    }
    return h + '</div>';
  }

  function draw() {
    if (!host) return;
    if (!cur) { host.innerHTML = '<div class="qz-empty">ยังไม่มีข้อมูลเกม</div>'; return; }
    var h = "", i, allFilled = true;
    for (i = 0; i < filled.length; i++) if (filled[i] < 0) allFilled = false;
    h += '<div class="bk-score">ถูก ' + right + ' / ' + total + (cur.lvl ? ' · ' + esc(cur.lvl) : '') + '</div>';
    h += '<div class="bk-instr">แตะช่องว่าง แล้วแตะคำจากคลังด้านล่างเพื่อเติม</div>';
    h += sentHtml();
    h += bankHtml();
    if (!checked) {
      h += '<div class="bk-actions"><button type="button" class="bk-clear" data-bk-clear="1">ล้าง</button>' +
        '<button type="button" class="bk-check" data-bk-check="1"' + (allFilled ? '' : ' disabled') + '>ตรวจคำตอบ</button></div>';
    } else {
      var sc = 0; for (i = 0; i < cur.a.length; i++) if (norm(filled[i] >= 0 ? tiles[filled[i]].w : "") === norm(cur.a[i])) sc++;
      var full = String(cur.w); for (i = 0; i < cur.a.length; i++) full = full.replace("___", cur.a[i]);
      h += '<div class="bk-result">' + sc + ' / ' + cur.a.length + ' ถูก <button type="button" class="qz-say" data-slow="' + esc(full) + '" aria-label="อ่านช้า">🐢</button></div>';
      h += '<button type="button" class="bk-next" data-bk-next="1">ถัดไป ▶</button>';
    }
    host.innerHTML = h;
    wire();
  }

  function fillActive(ti) {
    if (checked || tiles[ti].used) return;
    if (filled[active] >= 0) tiles[filled[active]].used = false;
    filled[active] = ti; tiles[ti].used = true;
    var i, nx = -1;
    for (i = 0; i < filled.length; i++) { var idx = (active + 1 + i) % filled.length; if (filled[idx] < 0) { nx = idx; break; } }
    if (nx >= 0) active = nx;
    draw();
  }
  function clearBlank(bi) { if (checked) return; if (filled[bi] >= 0) { tiles[filled[bi]].used = false; filled[bi] = -1; } active = bi; draw(); }
  function clearAll() { if (checked) return; var i; for (i = 0; i < filled.length; i++) if (filled[i] >= 0) { tiles[filled[i]].used = false; filled[i] = -1; } active = 0; draw(); }

  function check() {
    if (checked) return;
    var i, allFilled = true; for (i = 0; i < filled.length; i++) if (filled[i] < 0) allFilled = false;
    if (!allFilled) return;
    checked = true;
    var allRight = true; for (i = 0; i < cur.a.length; i++) if (norm(tiles[filled[i]].w) !== norm(cur.a[i])) allRight = false;
    total++; if (allRight) right++;
    try {
      var r = recsLoad(), k = keyB(cur), rec = r[k] || (PT.srs ? PT.srs.newRecord() : null);
      if (PT.srs) { var res = PT.srs.grade(rec, allRight ? 2 : 0, Date.now()); r[k] = res.rec; PT.srs.save("bank", r); }
      if (PT.miss) { if (allRight) PT.miss.right("bank", k); else PT.miss.add("bank", k); }
    } catch (e) {}
    try { if (PT.hub && PT.hub.notify) PT.hub.notify("game"); } catch (e) {}
    try { var full = String(cur.w); for (i = 0; i < cur.a.length; i++) full = full.replace("___", cur.a[i]); speak(full); } catch (e) {}
    draw();
  }

  function wire() {
    if (!host) return;
    var i, blanks = host.querySelectorAll("[data-bk-blank]");
    for (i = 0; i < blanks.length; i++) (function (b) {
      b.onclick = function () { var bi = parseInt(b.getAttribute("data-bk-blank"), 10); if (checked) return; if (filled[bi] >= 0) clearBlank(bi); else { active = bi; draw(); } };
    })(blanks[i]);
    var tl = host.querySelectorAll("[data-bk-tile]");
    for (i = 0; i < tl.length; i++) (function (b) { b.onclick = function () { fillActive(parseInt(b.getAttribute("data-bk-tile"), 10)); }; })(tl[i]);
    var ck = host.querySelector("[data-bk-check]"); if (ck) ck.onclick = check;
    var cl = host.querySelector("[data-bk-clear]"); if (cl) cl.onclick = clearAll;
    var nx = host.querySelector("[data-bk-next]"); if (nx) nx.onclick = function () { pick(); draw(); };
  }

  function mount(hostEl) {
    host = hostEl; if (!host) return;
    if (!POOL) { host.innerHTML = '<div class="qz-empty">กำลังโหลด…</div>'; load(function () { pick(); draw(); }); return; }
    if (!cur) pick();
    draw();
  }

  return { mount: mount };
})();

/* ===== module: fix ===== */
/* fix.js — "หาที่ผิด" error-correction game. Self-contained mini-game inside the Quiz tab
   (own data/fix.json + progress srs3_fix + PT.miss "fix"). Tap the wrong word -> reveal fix +
   Thai explanation. ES5. Uses globals: esc, speak, PT.srs, PT.miss. */
PT.fix = (function () {
  "use strict";
  var POOL = null, loading = false, host = null, recs = null;
  var cur = null, toks = [], errIdx = -1, picked = -1, checked = false;
  var right = 0, total = 0;

  function keyF(it) { return (it && it.s ? it.s : "") + "|fix"; }
  function recsLoad() { if (!recs) recs = (PT.srs && PT.srs.load) ? PT.srs.load("fix") : {}; return recs; }
  function clean(t) { return String(t).replace(/^[^A-Za-z']+/, "").replace(/[^A-Za-z']+$/, ""); }

  function load(cb) {
    if (POOL) { cb(); return; }
    if (loading) return;
    loading = true;
    fetch("data/fix.json").then(function (r) { return r.json(); }).then(function (d) { POOL = d; loading = false; cb(); })
      .catch(function () { loading = false; if (host) host.innerHTML = '<div class="qz-empty">โหลดเกมไม่สำเร็จ — เช็คเน็ตแล้วลองใหม่</div>'; });
  }

  function findErr(item) {
    var tk = String(item.s).split(/\s+/), i;
    for (i = 0; i < tk.length; i++) if (clean(tk[i]) === item.wrong) return { toks: tk, idx: i };
    // fallback: case-insensitive
    for (i = 0; i < tk.length; i++) if (clean(tk[i]).toLowerCase() === String(item.wrong).toLowerCase()) return { toks: tk, idx: i };
    return { toks: tk, idx: -1 };
  }

  function pick() {
    if (!POOL || !POOL.length) { cur = null; return; }
    var now = Date.now(), r = recsLoad(), cands = [], i;
    for (i = 0; i < POOL.length; i++) {
      var st = (PT.srs && PT.srs.statusOf) ? PT.srs.statusOf(r[keyF(POOL[i])], now) : "new";
      if (st !== "known") cands.push(POOL[i]);
    }
    if (!cands.length) cands = POOL.slice();
    // pick one whose error word is locatable
    var tries = 0, chosen = null, fe = null;
    while (tries < 25) {
      var c = cands[Math.floor(Math.random() * cands.length)];
      if (cur && c === cur && cands.length > 1) { tries++; continue; }
      fe = findErr(c);
      if (fe.idx >= 0) { chosen = c; break; }
      tries++;
    }
    if (!chosen) { chosen = cands[0]; fe = findErr(chosen); }
    cur = chosen; toks = fe.toks; errIdx = fe.idx; picked = -1; checked = false;
  }

  function correctedSentence() {
    // replace the wrong token (keep its surrounding punctuation) with the fix
    var out = toks.slice(), t = toks[errIdx];
    var pre = t.match(/^[^A-Za-z']+/); pre = pre ? pre[0] : "";
    var suf = t.match(/[^A-Za-z']+$/); suf = suf ? suf[0] : "";
    out[errIdx] = pre + cur.fix + suf;
    return out.join(" ");
  }

  function draw() {
    if (!host) return;
    if (!cur) { host.innerHTML = '<div class="qz-empty">ยังไม่มีข้อมูลเกม</div>'; return; }
    var h = "", i;
    h += '<div class="fx-score">ถูก ' + right + ' / ' + total + (cur.lvl ? ' · ' + esc(cur.lvl) : '') + '</div>';
    h += '<div class="fx-instr">' + (checked ? 'เฉลย' : 'แตะคำที่ผิดในประโยค') + '</div>';
    h += '<div class="qz-card fx-card"><div class="fx-sent">';
    for (i = 0; i < toks.length; i++) {
      var cls = "fx-tok";
      if (checked) {
        if (i === errIdx) cls += " fx-err";
        else if (i === picked) cls += " fx-wrongpick";
      }
      h += '<button type="button" class="' + cls + '" data-fx-tok="' + i + '"' + (checked ? ' disabled' : '') + '>' + esc(toks[i]) + '</button> ';
    }
    h += '</div></div>';
    if (checked) {
      var ok = (picked === errIdx);
      h += '<div class="fx-verdict ' + (ok ? 'fx-v-ok' : 'fx-v-no') + '">' + (ok ? '✓ ถูกต้อง! เจอที่ผิดแล้ว' : '✗ ยังไม่ใช่ — คำที่ผิดคือคำที่ไฮไลต์') + '</div>';
      h += '<div class="fx-fixbox"><span class="fx-x">' + esc(cur.wrong) + '</span> <span class="fx-arrow">→</span> <span class="fx-fix">' + esc(cur.fix) + '</span></div>';
      h += '<div class="fx-type-wrap"><span class="fx-type">' + esc(cur.type_th || "") + '</span></div>';
      if (cur.why_th) h += '<div class="fx-why">' + esc(cur.why_th) + '</div>';
      h += '<div class="fx-corrected">✓ ' + esc(correctedSentence()) + ' <button type="button" class="qz-say" data-fx-say="1" aria-label="ฟัง">🔊</button>' + '<button type="button" class="qz-say" data-slow="' + esc(correctedSentence()) + '" aria-label="อ่านช้า">🐢</button></div>';
      h += '<button type="button" class="fx-next" data-fx-next="1">ถัดไป ▶</button>';
    }
    host.innerHTML = h;
    wire();
  }

  function tap(i) {
    if (checked) return;
    picked = i; checked = true;
    var ok = (picked === errIdx);
    total++; if (ok) right++;
    try {
      var r = recsLoad(), k = keyF(cur), rec = r[k] || (PT.srs ? PT.srs.newRecord() : null);
      if (PT.srs) { var res = PT.srs.grade(rec, ok ? 2 : 0, Date.now()); r[k] = res.rec; PT.srs.save("fix", r); }
      if (PT.miss) { if (ok) PT.miss.right("fix", k); else PT.miss.add("fix", k); }
      try { if (PT.hub && PT.hub.bumpStep) PT.hub.bumpStep("game", 3); } catch (e) {}  // Today Hub game slot
    } catch (e) {}
    draw();
  }

  function wire() {
    if (!host) return;
    var i, tk = host.querySelectorAll("[data-fx-tok]");
    for (i = 0; i < tk.length; i++) (function (b) { b.onclick = function () { tap(parseInt(b.getAttribute("data-fx-tok"), 10)); }; })(tk[i]);
    var nx = host.querySelector("[data-fx-next]"); if (nx) nx.onclick = function () { pick(); draw(); };
    var say = host.querySelector("[data-fx-say]"); if (say) say.onclick = function () { try { speak(correctedSentence()); } catch (e) {} };
  }

  function mount(hostEl) {
    host = hostEl; if (!host) return;
    if (!POOL) { host.innerHTML = '<div class="qz-empty">กำลังโหลด…</div>'; load(function () { pick(); draw(); }); return; }
    if (!cur) pick();
    draw();
  }

  return { mount: mount };
})();

/* ===== module: daily ===== */
/* daily.js — "แบบทดสอบวันนี้" one-tap mixed session: due reviews + today's new (intro cards)
   + weak words (mistake notebook), finite with a score screen. ES5.
   Uses globals: S, esc, speak, keyOf, goMode, PT.srs, PT.miss, PT.bus. Reuses qz-* styles. */
PT.daily = (function () {
  "use strict";
  var q = [], idx = 0, right = 0, tested = 0, introduced = 0, done = false;
  var answered = false, picked = -1, opts = null, counts = { due: 0, neu: 0, weak: 0 };

  function shuffle(a) { var i, j, t; for (i = a.length - 1; i > 0; i--) { j = Math.floor(Math.random() * (i + 1)); t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

  function build() {
    var now = Date.now(), data = S.data || [], due = [], neu = [], i, it, st;
    for (i = 0; i < data.length; i++) {
      it = data[i]; st = PT.srs.statusOf(S.rec[keyOf(it)], now);
      if (st === "due" || st === "learning") due.push(it);
      else if (st === "new") neu.push(it);
    }
    due.sort(function (a, b) { var ra = S.rec[keyOf(a)], rb = S.rec[keyOf(b)]; return ((ra && ra.due) || 0) - ((rb && rb.due) || 0); });
    due = due.slice(0, 12);
    var cap = (S.settings && S.settings.newPerDay) || 20, dl = PT.srs.dayLog(S.deck), newLeft = Math.max(0, cap - (dl.n || 0));
    neu = neu.slice(0, Math.min(5, newLeft));
    var weak = [], seen = {};
    for (i = 0; i < due.length; i++) seen[keyOf(due[i])] = 1;
    for (i = 0; i < neu.length; i++) seen[keyOf(neu[i])] = 1;
    if (PT.miss && PT.miss.keys) {
      var ks = PT.miss.keys(S.deck), map = {};
      for (i = 0; i < data.length; i++) map[keyOf(data[i])] = data[i];
      for (i = 0; i < ks.length && weak.length < 5; i++) { var m = map[ks[i]]; if (m && !seen[ks[i]]) { weak.push(m); seen[ks[i]] = 1; } }
    }
    counts = { due: due.length, neu: neu.length, weak: weak.length };
    q = [];
    for (i = 0; i < due.length; i++) { due[i]._dnew = false; q.push(due[i]); }
    for (i = 0; i < weak.length; i++) { weak[i]._dnew = false; q.push(weak[i]); }
    shuffle(q);
    // new words go at the START as intro cards (learn first, then get tested by SRS later)
    for (i = neu.length - 1; i >= 0; i--) { neu[i]._dnew = true; q.unshift(neu[i]); }
    idx = 0; right = 0; tested = 0; introduced = 0; done = (q.length === 0);
    answered = false; picked = -1; opts = null;
  }

  function mkOpts(target) {
    var correct = target.mt || target.me || "";
    var pool = S.data || [], res = [correct], seen = {}; seen[correct] = 1;
    var guard = 0;
    while (res.length < 4 && guard < 500) {
      var c = pool[Math.floor(Math.random() * pool.length)], t = c.mt || c.me || ""; guard++;
      if (!t || seen[t] || keyOf(c) === keyOf(target)) continue;
      seen[t] = 1; res.push(t);
    }
    var os = [], i; for (i = 0; i < res.length; i++) os.push({ t: res[i], ok: res[i] === correct });
    shuffle(os); os._for = keyOf(target);
    return os;
  }

  function gradeCur(correct, isIntro) {
    var it = q[idx], k = keyOf(it);
    try {
      var rec = S.rec[k] || PT.srs.newRecord();
      var res = PT.srs.grade(rec, correct ? 2 : 0, Date.now());
      S.rec[k] = res.rec; PT.srs.save(S.deck, S.rec);
      if (it._dnew) PT.srs.bumpNew(S.deck); else PT.srs.bumpRev(S.deck);
      if (!isIntro && PT.miss) { if (correct) PT.miss.right(S.deck, k); else PT.miss.add(S.deck, k); }
    } catch (e) {}
  }

  function next() {
    idx++; answered = false; picked = -1; opts = null;
    if (idx >= q.length) {
      done = true;
      try { if (PT.hub && PT.hub.notify) PT.hub.notify("test"); } catch (e) {}
    }
    rerender();
  }

  function rerender() { var v = document.getElementById("view"); if (v && S.mode === "daily") render(v); }

  function render(v) {
    if (done || !q.length) { v.innerHTML = endHtml(); wireEnd(v); return; }
    var it = q[idx], h = '<div class="dl-wrap">';
    h += '<div class="dl-top"><button class="dl-back" data-dl-back="1">‹ ออก</button>' +
      '<div class="dl-prog">ข้อ ' + (idx + 1) + ' / ' + q.length + '</div>' +
      '<div class="dl-score">ถูก ' + right + '</div></div>';
    h += '<div class="dl-bar"><i style="width:' + Math.round(idx / q.length * 100) + '%"></i></div>';

    if (it._dnew) {
      // intro card for a new word
      h += '<div class="qz-card dl-intro"><div class="qz-plabel">🆕 คำใหม่วันนี้ — อ่านแล้วจำ</div>' +
        '<div class="qz-prompt">' + esc(it.w) + ' <button type="button" class="qz-say" data-dl-say="1">🔊</button></div>';
      if (it.p) h += '<div class="dl-pos">' + esc(it.p) + '</div>';
      if (it.mt || it.me) h += '<div class="dl-mean">' + esc(it.mt || it.me) + '</div>';
      if (it.ee) h += '<div class="dl-ex">' + esc(it.ee) + (it.et ? '<span>' + esc(it.et) + '</span>' : '') + '</div>';
      h += '</div>';
      h += '<button type="button" class="qz-next" data-dl-intro="1">จำได้แล้ว → ต่อ</button>';
    } else {
      if (!opts || opts._for !== keyOf(it)) opts = mkOpts(it);
      h += '<div class="qz-card"><div class="qz-plabel">ความหมายของคำนี้คือ</div>' +
        '<div class="qz-prompt">' + esc(it.w) + '</div>' +
        '<button type="button" class="qz-say" data-dl-say="1" aria-label="ฟังเสียง">🔊</button></div>';
      h += '<div class="qz-opts">';
      var i, o, cls;
      for (i = 0; i < opts.length; i++) {
        o = opts[i]; cls = "qz-opt";
        if (answered) { if (o.ok) cls += " qz-correct"; else if (i === picked) cls += " qz-wrong"; else cls += " qz-dim"; }
        h += '<button type="button" class="' + cls + '" data-dl-pick="' + i + '"' + (answered ? ' disabled' : '') + '>' + esc(o.t) + '</button>';
      }
      h += '</div>';
      if (answered) {
        h += (opts[picked] && opts[picked].ok) ? '<div class="qz-fb qz-fb-ok">ถูกต้อง! 🎉</div>' : '<div class="qz-fb qz-fb-no">ยังไม่ถูก</div>';
        h += '<button type="button" class="qz-next" data-dl-next="1">ถัดไป</button>';
      }
    }
    h += '</div>';
    v.innerHTML = h;
    wire(v);
  }

  function endHtml() {
    var h = '<div class="dl-wrap"><div class="dl-end">';
    if (!q.length) {
      h += '<div class="dl-end-i">🎉</div><div class="dl-end-t">วันนี้ครบแล้ว!</div>' +
        '<div class="dl-end-d">ไม่มีการ์ดค้าง คำใหม่ หรือคำที่มักผิด ในคลังนี้ตอนนี้ — พักได้ หรือสลับไปคลังอื่น</div>';
    } else {
      var pct = tested ? Math.round(right / tested * 100) : 0;
      h += '<div class="dl-end-i">' + (pct >= 80 ? '🏆' : pct >= 50 ? '💪' : '📚') + '</div>' +
        '<div class="dl-end-t">เสร็จแล้ว!</div>' +
        (tested ? '<div class="dl-end-s">ตอบถูก <b>' + right + ' / ' + tested + '</b> (' + pct + '%)</div>' : '') +
        (introduced ? '<div class="dl-end-d">เรียนคำใหม่ ' + introduced + ' คำ</div>' : '') +
        '<div class="dl-end-mix">ชุดนี้: ทบทวน ' + counts.due + ' · คำใหม่ ' + counts.neu + ' · คำที่มักผิด ' + counts.weak + '</div>';
    }
    h += '<button type="button" class="qz-next" data-dl-again="1">🎯 ทำอีกชุด</button>' +
      '<button type="button" class="dl-exit" data-dl-back="1">‹ กลับหน้าหลัก</button>';
    return h + '</div></div>';
  }

  function wire(v) {
    var back = v.querySelector("[data-dl-back]");
    if (back) back.onclick = exit;
    var say = v.querySelector("[data-dl-say]");
    if (say) say.onclick = function () { try { speak(q[idx].w); } catch (e) {} };
    var intro = v.querySelector("[data-dl-intro]");
    if (intro) intro.onclick = function () { introduced++; gradeCur(true, true); next(); };
    var nx = v.querySelector("[data-dl-next]");
    if (nx) nx.onclick = function () { next(); };
    var picks = v.querySelectorAll("[data-dl-pick]");
    var i;
    for (i = 0; i < picks.length; i++) (function (b) {
      b.onclick = function () {
        if (answered) return;
        picked = parseInt(b.getAttribute("data-dl-pick"), 10);
        answered = true; tested++;
        var ok = !!(opts[picked] && opts[picked].ok);
        if (ok) right++;
        gradeCur(ok, false);
        rerender();
      };
    })(picks[i]);
  }
  function wireEnd(v) {
    var ag = v.querySelector("[data-dl-again]");
    if (ag) ag.onclick = function () { build(); rerender(); };
    var back = v.querySelector("[data-dl-back]");
    if (back) back.onclick = exit;
  }
  function exit() {
    S.workingDirty = true;
    try { if (PT.bus && PT.bus.emit) PT.bus.emit("recchange"); } catch (e) {}
    if (window.goMode) goMode("browse");
  }

  function start() { build(); if (window.goMode) goMode("daily"); }

  return { start: start, render: render, leave: function () {} };
})();

/* ===== module: wmap ===== */
/* wmap.js — "แผนที่คำ" word-connections map, rendered inside the detail bottom sheet.
   Shows synonyms / antonyms / word family / frequent collocations for a word; tapping a
   related word recenters the map on it (looked up in the Oxford deck). ES5.
   Uses globals: esc, speak, S, DECKS, PT.browse.openSheet/closeSheet. */
PT.wmap = (function () {
  "use strict";
  var oxford = null, colloc = null, wIdx = null, loading = false;
  var hist = [];   // stack of {item, deck}

  function loadAll(cb) {
    if (oxford && colloc) { cb(); return; }
    if (loading) return;
    loading = true;
    var left = 2;
    function one() { left--; if (left <= 0) { loading = false; buildIdx(); cb(); } }
    if (oxford) one(); else fetch("data/oxford.json").then(function (r) { return r.json(); }).then(function (d) { oxford = d; one(); }).catch(function () { oxford = []; one(); });
    if (colloc) one(); else fetch("data/colloc.json").then(function (r) { return r.json(); }).then(function (d) { colloc = d; one(); }).catch(function () { colloc = []; one(); });
  }
  function buildIdx() {
    wIdx = {};
    var i; for (i = 0; i < (oxford || []).length; i++) {
      var k = String(oxford[i].w || "").toLowerCase();
      if (k && !wIdx[k]) wIdx[k] = oxford[i];
    }
  }
  function findWord(w) {
    if (!wIdx) return null;
    var k = String(w || "").toLowerCase().replace(/^\s+|\s+$/g, "");
    if (wIdx[k]) return wIdx[k];
    // light stemming fallbacks
    if (k.length > 4 && wIdx[k.replace(/ies$/, "y")]) return wIdx[k.replace(/ies$/, "y")];
    if (k.length > 3 && wIdx[k.replace(/e?s$/, "")]) return wIdx[k.replace(/e?s$/, "")];
    if (k.length > 4 && wIdx[k.replace(/ed$/, "")]) return wIdx[k.replace(/ed$/, "")];
    if (k.length > 5 && wIdx[k.replace(/ing$/, "")]) return wIdx[k.replace(/ing$/, "")];
    return null;
  }
  function collocsFor(w) {
    var out = [], i, needle = String(w || "").toLowerCase();
    if (!needle || needle.indexOf(" ") >= 0) return out;   // single words only
    var re = new RegExp("(^|[^a-z])" + needle.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "([^a-z]|$)", "i");
    for (i = 0; i < (colloc || []).length && out.length < 6; i++) {
      var c = colloc[i];
      if (c.w && re.test(String(c.w))) out.push(c);
    }
    return out;
  }
  function splitList(s) {
    if (!s) return [];
    var parts = String(s).split(/[,;·|]/), out = [], i;
    for (i = 0; i < parts.length; i++) { var t = parts[i].replace(/^\s+|\s+$/g, ""); if (t) out.push(t); }
    return out;
  }

  function chipRow(title, cls, words, navigable) {
    if (!words || !words.length) return "";
    var h = '<div class="wm-sec"><div class="wm-sec-h ' + cls + '">' + title + '</div><div class="wm-chips">';
    var i; for (i = 0; i < words.length; i++) {
      h += '<button type="button" class="wm-chip ' + cls + '" data-wm-word="' + esc(words[i]) + '" data-wm-nav="' + (navigable ? "1" : "0") + '">' + esc(words[i]) + '</button>';
    }
    return h + '</div></div>';
  }

  function draw() {
    var sheet = document.getElementById("sheet");
    if (!sheet || !hist.length) return;
    var top = hist[hist.length - 1], item = top.item;
    var h = ['<div class="pg-sheet wm-wrap">'];
    h.push('<button class="pg-close" type="button" aria-label="Close">✕</button>');
    h.push('<div class="wm-bar"><button type="button" class="wm-back">‹ กลับ</button><div class="wm-title">🗺️ แผนที่คำ</div></div>');
    h.push('<div class="wm-center wm-pop"><div class="wm-word">' + esc(item.w || "") +
      ' <button type="button" class="pg-spk wm-say" data-say="' + esc(item.w || "") + '">🔊</button>' +
      '<button type="button" class="pg-spk" data-spell="' + esc(item.w || "") + '">🔤</button></div>');
    if (item.p) h.push('<div class="wm-pos">' + esc(item.p) + '</div>');
    if (item.mt || item.me) h.push('<div class="wm-mean">' + esc(item.mt || item.me) + '</div>');
    h.push('</div>');
    h.push('<div class="wm-msg" id="wm-msg"></div>');

    if (!oxford) {
      h.push('<div class="wm-loading">กำลังโหลดข้อมูลคำ…</div></div>');
      sheet.innerHTML = h.join("");
      wire(sheet);
      return;
    }

    var sy = (item.sy && item.sy.length) ? item.sy.slice(0, 10) : [];
    var an = (item.an && item.an.length) ? item.an.slice(0, 8) : [];
    var fam = splitList(item.x).slice(0, 8);
    var cols = collocsFor(item.w);

    h.push(chipRow("🟢 คำเหมือน (synonyms)", "wm-sy", sy, true));
    h.push(chipRow("🔴 คำตรงข้าม (antonyms)", "wm-an", an, true));
    h.push(chipRow("🧬 ครอบครัวคำ (word family)", "wm-fam", fam, true));
    if (cols.length) {
      h.push('<div class="wm-sec"><div class="wm-sec-h wm-col">🧩 ใช้คู่กันบ่อย (collocations)</div><div class="wm-chips">');
      var i; for (i = 0; i < cols.length; i++) {
        h.push('<button type="button" class="wm-chip wm-col" data-wm-say="' + esc(cols[i].w) + '">' + esc(cols[i].w) +
          (cols[i].mt ? '<span>' + esc(cols[i].mt) + '</span>' : '') + '</button>');
      }
      h.push('</div></div>');
    }
    if (!sy.length && !an.length && !fam.length && !cols.length) {
      h.push('<div class="wm-empty">คำนี้ยังไม่มีข้อมูลเชื่อมโยง (คำเหมือน/ตรงข้าม/collocation)</div>');
    }
    h.push('<div class="wm-hint">แตะคำเพื่อเปิดแผนที่ของคำนั้น · แตะวลีเพื่อฟัง</div>');
    h.push('</div>');
    sheet.innerHTML = h.join("");
    sheet.scrollTop = 0;   // recentered content appears at the top — always show it
    wire(sheet);
  }

  function wire(sheet) {
    var close = sheet.querySelector(".pg-close");
    if (close) close.onclick = function () { hist = []; if (PT.browse && PT.browse.closeSheet) PT.browse.closeSheet(); };
    var back = sheet.querySelector(".wm-back");
    if (back) back.onclick = function () {
      if (hist.length > 1) { hist.pop(); draw(); }
      else { var h0 = hist[0]; hist = []; if (PT.browse && PT.browse.openSheet) PT.browse.openSheet(h0.item, h0.deck); }
    };
    var say = sheet.querySelector(".wm-say");
    if (say) say.onclick = function () { speak(say.getAttribute("data-say") || ""); };
    var chips = sheet.querySelectorAll("[data-wm-word]");
    var i;
    for (i = 0; i < chips.length; i++) (function (b) {
      b.onclick = function () {
        var w = b.getAttribute("data-wm-word") || "";
        speak(w);
        var it = findWord(w);
        if (it) { hist.push({ item: it, deck: "oxford" }); draw(); }
        else {
          var m = document.getElementById("wm-msg");
          if (m) m.textContent = '🔊 "' + w + '" — คำนี้ไม่อยู่ในคลัง Oxford จึงเปิดแผนที่ต่อไม่ได้ (ฟังเสียงได้)';
          try { sheet.scrollTop = 0; } catch (e) {}
        }
      };
    })(chips[i]);
    var says = sheet.querySelectorAll("[data-wm-say]");
    for (i = 0; i < says.length; i++) (function (b) {
      b.onclick = function () {
        var t = b.getAttribute("data-wm-say") || "";
        speak(t);
        var m = document.getElementById("wm-msg");
        if (m) m.textContent = '🔊 กำลังอ่าน: "' + t + '"';
      };
    })(says[i]);
  }

  function openFor(item, deckKey) {
    hist = [{ item: item, deck: deckKey || S.deck }];
    draw();                    // instant frame (may show loading)
    loadAll(function () { draw(); });
  }

  return { openFor: openFor };
})();

  // shared mode toggle (บทสนทนา | เรื่องสั้น)
  function modeSeg(active) {

  function setMode(m) {

  function cardHtml(idx) {

    return '<button class="tk-card" data-i="' + idx + '"><div class="tk-card-t">' + esc(d.title || "") +
      '</div><div class="tk-card-m"><span class="tk-lv">' + esc(d.level || "") + '</span> ' +
      esc(d.roleA) + ' · ' + esc(d.roleB) + ' · ' + d.turns.length + ' บรรทัด</div></button>';
  }

  function renderList(v) {
    var byG = {}, groups = [], i;
    for (i = 0; i < DATA.length; i++) { var g = DATA[i].g; if (!byG[g]) { byG[g] = []; groups.push(g); } byG[g].push(i); }
    var ql = q.trim().toLowerCase();
    var h = ['<div class="tk-wrap">'];
    h.push(modeSeg("conv"));
    h.push('<div class="tk-search"><input id="tk-q" type="search" placeholder="ค้นหาบทสนทนา / หมวด…" value="' + esc(q) + '"></div>');
    if (ql) {
      var hits = [];
      for (i = 0; i < DATA.length; i++) {
        var d = DATA[i];
        if ((d.title || "").toLowerCase().indexOf(ql) !== -1 || (d.g || "").toLowerCase().indexOf(ql) !== -1 ||
          (TH_G[d.g] || "").indexOf(q.trim()) !== -1) hits.push(i);
      }
      h.push('<div class="tk-intro">' + hits.length + ' ผลลัพธ์</div>');
      for (i = 0; i < hits.length; i++) h.push(cardHtml(hits[i]));
    } else if (cat === null) {
      h.push('<div class="tk-intro">เลือกหมวด · ' + DATA.length + ' บทสนทนา</div><div class="tk-catgrid">');
      for (i = 0; i < groups.length; i++) {
        var gg = groups[i];
        h.push('<button class="tk-catcard" data-cat="' + esc(gg) + '"><div class="tk-catcard-t">' +
          esc(TH_G[gg] || gg) + '</div><div class="tk-catcard-n">' + byG[gg].length + ' บท</div></button>');
      }
      h.push('</div>');
    } else {
      h.push('<button class="tk-back" id="tk-catback">‹ ทุกหมวด</button>');
      h.push('<div class="tk-gh">' + esc(cat) + ' <span>' + esc(TH_G[cat] || "") + '</span></div>');
      var arr = byG[cat] || [];
      for (i = 0; i < arr.length; i++) h.push(cardHtml(arr[i]));
    }
    h.push('</div>');
    v.innerHTML = h.join("");
    wireModeSeg(v);
    var qi = document.getElementById("tk-q");
    if (qi) qi.oninput = function () { q = qi.value; renderList(v); var n = document.getElementById("tk-q"); if (n) { n.focus(); try { n.setSelectionRange(q.length, q.length); } catch (e) {} } };
    var cb = document.getElementById("tk-catback");
    if (cb) cb.onclick = function () { cat = null; renderList(v); };
    [].forEach.call(v.querySelectorAll(".tk-catcard"), function (b) { b.onclick = function () { cat = b.getAttribute("data-cat"); renderList(v); }; });
    [].forEach.call(v.querySelectorAll(".tk-card"), function (b) { b.onclick = function () { sel = parseInt(b.getAttribute("data-i"), 10); revealed = {}; render(v); }; });
  }

  function renderDialogue(v, d) {
    var h = ['<div class="tk-wrap tk-dlg">'];
    h.push('<div class="tk-bar">');
    h.push('<button class="tk-back" id="tk-back">‹ กลับ</button>');
    h.push('<div class="tk-title">' + esc(d.title || "") + ' <span>' + esc(d.level || "") + '</span></div>');
    h.push('</div>');
    h.push('<div class="tk-roles"><b>A</b> ' + esc(d.roleA) + '  ·  <b>B</b> ' + esc(d.roleB) + '</div>');
    h.push('<div class="tk-ctrls">');
    h.push('<button class="tk-ctrl' + (showTh ? ' on' : '') + '" id="tk-th">ไทย</button>');
    h.push('<button class="tk-ctrl' + (shadow ? ' on' : '') + '" id="tk-shadow">ฝึกพูด</button>');
    h.push('<button class="tk-play" id="tk-play">▶ เล่นทั้งหมด</button>');
    h.push('</div>');
    h.push('<div class="tk-thread">');
    var i;
    for (i = 0; i < d.turns.length; i++) {
      var t = d.turns[i], side = (t.speaker === "A") ? "a" : "b";
      var hideEn = shadow && !revealed[i];
      h.push('<div class="tk-turn ' + side + '" data-i="' + i + '">');
      h.push('<div class="tk-bub">');
      if (hideEn) {
        h.push('<div class="tk-en tk-hidden" data-rev="' + i + '">แตะเพื่อดูประโยค</div>');
      } else {
        h.push('<div class="tk-en">' + esc(t.en) + '</div>');
      }
      if (showTh) { h.push('<div class="tk-thl">' + esc(t.th) + '</div>'); }
      h.push('<button class="tk-spk" data-ti="' + i + '" aria-label="ฟัง">🔊</button>');
      h.push('<button class="tk-spk tk-slow2" data-slow="' + esc(t.en) + '" aria-label="อ่านช้า">🐢</button>');
      h.push('</div></div>');
    }
    h.push('</div>');
    if (d.keyphrases && d.keyphrases.length) {
      h.push('<div class="tk-keys"><div class="tk-keys-h">วลีสำคัญ</div>');
      for (i = 0; i < d.keyphrases.length; i++) {
        var k = d.keyphrases[i];
        h.push('<div class="tk-key"><div class="tk-key-tx"><span class="tk-key-en">' + esc(k.en) +
          '</span><span class="tk-key-th">' + esc(k.th) + '</span></div>' +
          '<button class="tk-spk sm" data-ki="' + i + '" aria-label="ฟัง">🔊</button>' +
          '<button class="tk-spk sm" data-slow="' + esc(k.en) + '" aria-label="อ่านช้า">🐢</button></div>');
      }
      h.push('</div>');
    }
    h.push('</div>');
    v.innerHTML = h.join("");

    document.getElementById("tk-back").onclick = function () { stopPlay(); sel = -1; render(v); };
    document.getElementById("tk-th").onclick = function () { showTh = !showTh; render(v); };
    document.getElementById("tk-shadow").onclick = function () { shadow = !shadow; revealed = {}; render(v); };
    document.getElementById("tk-play").onclick = function () {
      if (playing) { stopPlay(); render(v); } else { playAll(d, v); }
    };
    [].forEach.call(v.querySelectorAll(".tk-spk"), function (b) {
      b.onclick = function (e) {
        e.stopPropagation();
        var ti = b.getAttribute("data-ti"), ki = b.getAttribute("data-ki");
        var txt = (ti !== null) ? d.turns[+ti].en : d.keyphrases[+ki].en;
        if (window.speak) speak(txt);
      };
    });
    [].forEach.call(v.querySelectorAll(".tk-hidden"), function (b) {
      b.onclick = function () { revealed[parseInt(b.getAttribute("data-rev"), 10)] = true; render(v); };
    });
  }

  function playAll(d, v) {
    stopPlay(); playing = true;
    var pb = document.getElementById("tk-play");
    if (pb) { pb.textContent = "■ หยุด"; pb.classList.add("on"); }
    var thread = v.querySelector(".tk-thread");
    var i = 0, cancelled = false;
    function turns() { return thread ? thread.querySelectorAll(".tk-turn") : []; }
    function hi(idx) {
      var ts = turns(), k;
      for (k = 0; k < ts.length; k++) { ts[k].classList.toggle("hl", k === idx); }
      if (ts[idx] && ts[idx].scrollIntoView) { try { ts[idx].scrollIntoView({ block: "center" }); } catch (e) {} }
    }
    function clr() { var ts = turns(), k; for (k = 0; k < ts.length; k++) { ts[k].classList.remove("hl"); } }
    function done() {
      playing = false; clr();
      var b = document.getElementById("tk-play");
      if (b) { b.textContent = "▶ เล่นทั้งหมด"; b.classList.remove("on"); }
    }
    function step() {
      if (cancelled || i >= d.turns.length) { done(); return; }
      hi(i);
      var u = new SpeechSynthesisUtterance(d.turns[i].en);
      u.lang = "en-US"; u.rate = 0.9;
      var vo = enVoice(); if (vo) u.voice = vo;
      u.onend = function () { i++; step(); };
      u.onerror = function () { i++; step(); };
      try { speechSynthesis.speak(u); } catch (e) { i++; step(); }
    }
    try { speechSynthesis.cancel(); } catch (e) {}
    step();
    playStop = function () { cancelled = true; try { speechSynthesis.cancel(); } catch (e) {} clr(); };
  }

  PT.talk = {
    render: render,
    setMode: setMode,
    modeSeg: modeSeg,
    wireModeSeg: wireModeSeg,
    leave: function () { stopPlay(); },        // called when navigating away
    reset: function () { sel = -1; cat = null; q = ""; mode = "conv"; stopPlay(); }
  };
})();

/* ===== module: reader ===== */
/* reader.js — "เรื่องสั้น" graded reader inside the สนทนา tab (PT.talk delegates when its
   mode is "story"). Stories from data/stories.json: per-paragraph tap-to-reveal Thai, per-para
   TTS, in-context glossary, 3 comprehension MCQs. ES5.
   Uses globals: S, esc, speak, store; PT.talk.modeSeg/wireModeSeg for the shared toggle. */
PT.reader = (function () {
  "use strict";
  var DATA = null, loading = false;
  var lvl = null;        // level filter (null = all)
  var sel = -1;          // story index; -1 = list
  var thOn = {};         // para index -> Thai revealed
  var ans = {};          // question index -> picked option text
  var GEN_TH = {
    "everyday life": "ชีวิตประจำวัน", "light mystery": "สืบสวนเบาๆ",
    "friendship and family": "มิตรภาพ/ครอบครัว", "travel and adventure": "เดินทาง/ผจญภัย",
    "work and office life": "ชีวิตทำงาน"
  };

  function readSet() { try { return JSON.parse(store.get("pt_read") || "{}") || {}; } catch (e) { return {}; } }
  function markRead(id) { try { var r = readSet(); r[id] = 1; store.set("pt_read", JSON.stringify(r)); } catch (e) {} }

  function load(cb) {
    if (DATA) { cb(); return; }
    if (loading) return;
    loading = true;
    fetch("data/stories.json").then(function (r) { return r.json(); }).then(function (d) { DATA = d; loading = false; cb(); })
      .catch(function () { loading = false; var v = document.getElementById("view"); if (v) v.innerHTML = '<div class="empty">โหลดเรื่องสั้นไม่สำเร็จ — เช็คเน็ตแล้วลองใหม่</div>'; });
  }

  function render(v) {
    if (!DATA) { v.innerHTML = '<div class="empty">กำลังโหลดเรื่องสั้น…</div>'; load(function () { render(v); }); return; }
    if (sel >= 0 && sel < DATA.length) renderStory(v, DATA[sel]);
    else renderList(v);
  }

  function renderList(v) {
    var h = ['<div class="tk-wrap">'];
    if (PT.talk && PT.talk.modeSeg) h.push(PT.talk.modeSeg("story"));
    var lvls = ["A2", "B1", "B2", "C1"], i;
    h.push('<div class="rd2-lvls"><button type="button" class="rd2-lvl' + (lvl === null ? " on" : "") + '" data-rd2-lvl="">ทั้งหมด</button>');
    for (i = 0; i < lvls.length; i++) h.push('<button type="button" class="rd2-lvl' + (lvl === lvls[i] ? " on" : "") + '" data-rd2-lvl="' + lvls[i] + '">' + lvls[i] + '</button>');
    h.push('</div>');
    var rs = readSet(), shown = 0;
    for (i = 0; i < DATA.length; i++) {
      var st = DATA[i];
      if (lvl && st.lvl !== lvl) continue;
      shown++;
      h.push('<button type="button" class="rd2-card" data-rd2-i="' + i + '">' +
        '<div class="rd2-card-top"><span class="rd2-badge">' + esc(st.lvl) + '</span>' +
        '<span class="rd2-genre">' + esc(GEN_TH[st.genre] || st.genre) + '</span>' +
        (rs[st.id] ? '<span class="rd2-read">✓ อ่านแล้ว</span>' : '') + '</div>' +
        '<div class="rd2-card-t">' + esc(st.title) + '</div>' +
        '<div class="rd2-card-tt">' + esc(st.title_th || "") + '</div>' +
        '<div class="rd2-card-m">~' + (st.words || "") + ' คำ · คำถาม ' + (st.qs ? st.qs.length : 0) + ' ข้อ</div></button>');
    }
    if (!shown) h.push('<div class="empty">ไม่มีเรื่องในระดับนี้</div>');
    h.push('</div>');
    v.innerHTML = h.join("");
    if (PT.talk && PT.talk.wireModeSeg) PT.talk.wireModeSeg(v);
    [].forEach.call(v.querySelectorAll("[data-rd2-lvl]"), function (b) {
      b.onclick = function () { lvl = b.getAttribute("data-rd2-lvl") || null; render(v); };
    });
    [].forEach.call(v.querySelectorAll("[data-rd2-i]"), function (b) {
      b.onclick = function () { sel = parseInt(b.getAttribute("data-rd2-i"), 10); thOn = {}; ans = {}; render(v); };
    });
  }

  function renderStory(v, st) {
    var h = ['<div class="tk-wrap rd2-story">'], i;
    h.push('<div class="tk-bar"><button class="tk-back" id="rd2-back">‹ เรื่องอื่น</button>' +
      '<div class="tk-title">' + esc(st.lvl) + ' · ' + esc(GEN_TH[st.genre] || st.genre) + '</div></div>');
    h.push('<div class="rd2-t">' + esc(st.title) + '</div>');
    if (st.title_th) h.push('<div class="rd2-tt">' + esc(st.title_th) + '</div>');
    h.push('<div class="rd2-hintline">แตะย่อหน้าเพื่อดูคำแปลไทย · แตะ 🔊 เพื่อฟัง</div>');

    for (i = 0; i < st.paras.length; i++) {
      var p = st.paras[i];
      h.push('<div class="rd2-para" data-rd2-p="' + i + '">' +
        '<div class="rd2-en">' + esc(p.en) + '</div>' +
        (thOn[i] && p.th ? '<div class="rd2-th">' + esc(p.th) + '</div>' : '') +
        '<button type="button" class="rd2-say" data-rd2-say="' + i + '">🔊</button>' +
        '<button type="button" class="rd2-say rd2-slow" data-slow="' + esc(p.en) + '">🐢</button></div>');
    }

    if (st.gloss && st.gloss.length) {
      h.push('<div class="rd2-sec">📚 ศัพท์ในเรื่อง</div><div class="rd2-gloss">');
      for (i = 0; i < st.gloss.length; i++) {
        h.push('<button type="button" class="rd2-gw" data-rd2-gsay="' + esc(st.gloss[i].w) + '"><b>' + esc(st.gloss[i].w) + '</b><span>' + esc(st.gloss[i].th) + '</span></button>');
      }
      h.push('</div>');
    }

    if (st.qs && st.qs.length) {
      h.push('<div class="rd2-sec">❓ คำถามท้ายเรื่อง</div>');
      var answeredAll = true, right = 0;
      for (i = 0; i < st.qs.length; i++) {
        var qq = st.qs[i], picked = ans[i];
        if (picked == null) answeredAll = false;
        else if (picked === qq.a) right++;
        h.push('<div class="rd2-q"><div class="rd2-q-t">' + (i + 1) + '. ' + esc(qq.q) + '</div>');
        for (var o = 0; o < qq.options.length; o++) {
          var ot = qq.options[o], cls = "rd2-opt";
          if (picked != null) {
            if (ot === qq.a) cls += " ok";
            else if (ot === picked) cls += " bad";
            else cls += " dim";
          }
          h.push('<button type="button" class="' + cls + '" data-rd2-q="' + i + '" data-rd2-o="' + esc(ot) + '"' + (picked != null ? " disabled" : "") + '>' + esc(ot) + '</button>');
        }
        h.push('</div>');
      }
      if (answeredAll) {
        markRead(st.id);
        h.push('<div class="rd2-score">ตอบถูก ' + right + ' / ' + st.qs.length + (right === st.qs.length ? ' 🏆' : '') + '</div>');
        h.push('<button type="button" class="rd2-next" id="rd2-next">📖 เรื่องถัดไป</button>');
      }
    }
    h.push('</div>');
    v.innerHTML = h.join("");

    document.getElementById("rd2-back").onclick = function () { sel = -1; render(v); };
    [].forEach.call(v.querySelectorAll(".rd2-para"), function (el) {
      el.onclick = function (e) {
        if (e.target && e.target.getAttribute && e.target.getAttribute("data-rd2-say") !== null) return;
        var pi = parseInt(el.getAttribute("data-rd2-p"), 10);
        thOn[pi] = !thOn[pi]; render(v);
      };
    });
    [].forEach.call(v.querySelectorAll("[data-rd2-say]"), function (b) {
      b.onclick = function (e) { e.stopPropagation(); var pi = parseInt(b.getAttribute("data-rd2-say"), 10); try { speak(st.paras[pi].en); } catch (x) {} };
    });
    [].forEach.call(v.querySelectorAll("[data-rd2-gsay]"), function (b) {
      b.onclick = function () { try { speak(b.getAttribute("data-rd2-gsay")); } catch (x) {} };
    });
    [].forEach.call(v.querySelectorAll("[data-rd2-q]"), function (b) {
      b.onclick = function () {
        var qi = parseInt(b.getAttribute("data-rd2-q"), 10);
        if (ans[qi] != null) return;
        ans[qi] = b.getAttribute("data-rd2-o");
        render(v);
      };
    });
    var nx = document.getElementById("rd2-next");
    if (nx) nx.onclick = function () {
      // next unread story at the same level filter, else next index
      var i2, rs = readSet(), pick = -1;
      for (i2 = 0; i2 < DATA.length; i2++) {
        var c = (sel + 1 + i2) % DATA.length;
        if (lvl && DATA[c].lvl !== lvl) continue;
        if (!rs[DATA[c].id]) { pick = c; break; }
        if (pick < 0) pick = c;
      }
      sel = (pick >= 0) ? pick : ((sel + 1) % DATA.length);
      thOn = {}; ans = {};
      render(v);
      try { v.scrollIntoView({ block: "start" }); } catch (e) {}
    };
  }

  return {
    render: render,
    reset: function () { sel = -1; lvl = null; thOn = {}; ans = {}; }
  };
})();

/* ===== module: wordchoice ===== */
/* PT.wordchoice — "เลือกใช้คำ" tab: near-synonym clusters (how each differs) + 4 games.
   ES5. Uses globals: esc, speak. Lazy-loads data/wordchoice.json.
   Cluster: {id, core_en, core_th, cat, scale_label_en, scale_label_th,
     words:[{w,pos,when_en,when_th,reg,scale,collocations,ex_en,ex_th}],
     quiz:[{s,a,why_th}], tip_en, tip_th} */
(function () {
  "use strict";
  window.PT = window.PT || {};

  var DATA = null, loading = false;
  var sel = -1;          // cluster index; -1 = list
  var cat = null;        // selected theme (null = theme grid)
  var q = "";            // search text
  var game = null;       // { type, ci, ... } current game state

  var REG_TH = { formal: "ทางการ", neutral: "กลางๆ", informal: "ไม่ทางการ" };

  function shuffle(a) { var i, j, t; for (i = a.length - 1; i > 0; i--) { j = Math.floor(Math.random() * (i + 1)); t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
  function ri(n) { return Math.floor(Math.random() * n); }

  function load(cb) {
    if (DATA) { cb(); return; }
    if (loading) return;
    loading = true;
    fetch("data/wordchoice.json").then(function (r) { return r.json(); }).then(function (d) {
      DATA = d; loading = false; cb();
    }).catch(function () {
      loading = false;
      var v = document.getElementById("view");
      if (v) v.innerHTML = '<div class="empty">โหลดข้อมูลไม่สำเร็จ — เช็คเน็ตแล้วลองใหม่</div>';
    });
  }

  function render(v) {
    if (!DATA) { v.innerHTML = '<div class="empty">กำลังโหลด…</div>'; load(function () { render(v); }); return; }
    if (game) { renderGame(v); return; }
    if (sel < 0 || sel >= DATA.length) { renderList(v); } else { renderDetail(v, DATA[sel]); }
  }

  /* ---------------- list ---------------- */
  function matches(c, ql) {
    if (!ql) return true;
    if ((c.core_en || "").toLowerCase().indexOf(ql) !== -1) return true;
    if ((c.core_th || "").indexOf(ql) !== -1) return true;
    for (var i = 0; i < c.words.length; i++) if ((c.words[i].w || "").toLowerCase().indexOf(ql) !== -1) return true;
    return false;
  }

  function clusterCard(idx) {
    var cc = DATA[idx];
    var words = cc.words.map(function (x) { return esc(x.w); }).join(" · ");
    return '<button class="wc-card" data-i="' + idx + '"><div class="wc-card-w">' + words + '</div>' +
      '<div class="wc-card-m">' + esc(cc.core_th || cc.core_en || "") + '</div></button>';
  }

  function renderList(v) {
    var byC = {}, cats = [], i;
    for (i = 0; i < DATA.length; i++) { var g = DATA[i].cat || "อื่นๆ"; if (!byC[g]) { byC[g] = []; cats.push(g); } byC[g].push(i); }
    var ql = q.toLowerCase();
    var h = ['<div class="wc-wrap">'];
    h.push('<div class="wc-search"><input id="wc-q" type="search" placeholder="ค้นหาคำ / ความหมาย…" value="' + esc(q) + '"></div>');
    h.push('<button class="wc-rand" id="wc-rand">🎮 เล่นเกมสุ่ม</button>');
    if (ql) {
      var hits = [];
      for (i = 0; i < DATA.length; i++) if (matches(DATA[i], ql)) hits.push(i);
      h.push('<div class="wc-intro">' + hits.length + ' ผลลัพธ์</div>');
      for (i = 0; i < hits.length; i++) h.push(clusterCard(hits[i]));
    } else if (cat === null) {
      h.push('<div class="wc-intro">เลือกหมวด · ' + DATA.length + ' กลุ่มคำ</div><div class="wc-catgrid">');
      for (i = 0; i < cats.length; i++) {
        h.push('<button class="wc-catcard" data-cat="' + esc(cats[i]) + '"><div class="wc-catcard-t">' +
          esc(cats[i]) + '</div><div class="wc-catcard-n">' + byC[cats[i]].length + ' กลุ่ม</div></button>');
      }
      h.push('</div>');
    } else {
      h.push('<button class="wc-back" id="wc-catback">‹ ทุกหมวด</button>');
      h.push('<div class="wc-cat">' + esc(cat) + '</div>');
      var arr = byC[cat] || [];
      for (i = 0; i < arr.length; i++) h.push(clusterCard(arr[i]));
    }
    h.push('</div>');

    var rb = document.getElementById("wc-rand");
    if (rb) rb.onclick = function () { var gi = ["match", "choose", "tag", "rank"][ri(4)]; startGame(gi, ri(DATA.length)); render(document.getElementById("view")); };
    var cb = document.getElementById("wc-catback");
    if (cb) cb.onclick = function () { cat = null; renderList(document.getElementById("view")); };

    [].forEach.call(v.querySelectorAll(".wc-card"), function (b) { b.onclick = function () { sel = parseInt(b.getAttribute("data-i"), 10); render(document.getElementById("view")); }; });
  }

  /* ---------------- cluster detail ---------------- */
  function regBadge(reg) { var r = reg || "neutral"; return '<span class="wc-reg wc-reg-' + r + '">' + (REG_TH[r] || r) + '</span>'; }

  function renderDetail(v, c) {
    var words = c.words.slice().sort(function (a, b) { return (a.scale || 0) - (b.scale || 0); });
    var h = ['<div class="wc-wrap wc-detail">'];
    h.push('<div class="wc-bar"><button class="wc-back" id="wc-back">‹ กลับ</button><div class="wc-title">' +
      esc(c.words.map(function (x) { return x.w; }).join(" · ")) + '</div></div>');
    h.push('<div class="wc-core"><b>ความหมายร่วม:</b> ' + esc(c.core_th || "") + (c.core_en ? '<div class="wc-core-en">' + esc(c.core_en) + '</div>' : '') + '</div>');
    if (c.scale_label_th) h.push('<div class="wc-scalelab">เรียงจาก ' + esc(c.scale_label_th) + ' (บน→ล่าง)</div>');
    for (var i = 0; i < words.length; i++) {
      var w = words[i];
      h.push('<div class="wc-word">');
      h.push('<div class="wc-word-h"><span class="wc-w">' + esc(w.w) + '</span>' +
        (w.pos ? '<span class="wc-pos">' + esc(w.pos) + '</span>' : '') + regBadge(w.reg) +
        '<button class="wc-spk" data-say="' + esc(w.ex_en || w.w) + '" aria-label="ฟัง">🔊</button></div>');
      if (w.when_th) h.push('<div class="wc-when">' + esc(w.when_th) + '</div>');
      if (w.collocations && w.collocations.length) h.push('<div class="wc-collo">🔗 ' + esc(w.collocations.join(" · ")) + '</div>');
      if (w.ex_en) h.push('<div class="wc-ex">' + esc(w.ex_en) + (w.ex_th ? ' <span class="wc-ex-th">— ' + esc(w.ex_th) + '</span>' : '') + '</div>');
      h.push('</div>');
    }
    if (c.tip_th) h.push('<div class="wc-tip"><div class="wc-tip-h">📌 วิธีเลือก</div>' + esc(c.tip_th) + '</div>');
    h.push('<div class="wc-games"><div class="wc-games-h">🎮 ฝึกด้วยเกม</div><div class="wc-games-row">' +
      '<button class="wc-gbtn" data-g="match">จับคู่ความต่าง</button>' +
      '<button class="wc-gbtn" data-g="choose">เลือกให้ถูกบริบท</button>' +
      '<button class="wc-gbtn" data-g="tag">จับคู่ระดับ</button>' +
      '<button class="wc-gbtn" data-g="rank">เรียงระดับ</button></div></div>');
    h.push('</div>');
    v.innerHTML = h.join("");
    document.getElementById("wc-back").onclick = function () { sel = -1; render(document.getElementById("view")); };
    [].forEach.call(v.querySelectorAll(".wc-spk"), function (b) { b.onclick = function () { if (window.speak) speak(b.getAttribute("data-say")); }; });
    [].forEach.call(v.querySelectorAll(".wc-gbtn"), function (b) { b.onclick = function () { startGame(b.getAttribute("data-g"), sel); render(document.getElementById("view")); }; });
  }

  /* ---------------- games ---------------- */
  function startGame(type, ci) {
    var c = DATA[ci];
    game = { type: type, ci: ci, done: false, score: 0, total: 0 };
    if (type === "match") { game.left = -1; game.matched = {}; game.right = shuffle(c.words.map(function (w, i) { return i; })); game.total = c.words.length; }
    else if (type === "choose") { game.qi = 0; game.answered = false; game.picked = ""; game.total = (c.quiz || []).length; }
    else if (type === "tag") { game.assign = {}; game.sel = -1; game.total = c.words.length; }
    else if (type === "rank") { game.order = []; game.checked = false; game.total = c.words.length; }
  }

  function gameHeader(c, title) {
    return '<div class="wc-bar"><button class="wc-back" id="wc-gback">‹ ออก</button><div class="wc-title">' + esc(title) +
      '</div></div><div class="wc-gcluster">' + esc(c.words.map(function (x) { return x.w; }).join(" · ")) + '</div>';
  }

  function renderGame(v) {
    var c = DATA[game.ci];
    var h = ['<div class="wc-wrap wc-game">'];
    if (game.type === "match") h.push(gmeMatch(c));
    else if (game.type === "choose") h.push(gmeChoose(c));
    else if (game.type === "tag") h.push(gmeTag(c));
    else if (game.type === "rank") h.push(gmeRank(c));
    h.push('</div>');
    v.innerHTML = h.join("");
    document.getElementById("wc-gback").onclick = function () { game = null; render(document.getElementById("view")); };
    wireGame(c);
  }

  // Game 1: match word <-> "when to use"
  function gmeMatch(c) {
    var h = gameHeader(c, "จับคู่คำกับวิธีใช้") + '<div class="wc-ghint">แตะคำ แล้วแตะวิธีใช้ที่ตรงกัน</div><div class="wc-match">';
    h += '<div class="wc-mcol">';
    for (var i = 0; i < c.words.length; i++) {
      var m = game.matched[i];
      h += '<button class="wc-mw' + (m ? ' wc-ok' : (game.left === i ? ' wc-sel' : '')) + '" data-w="' + i + '"' + (m ? ' disabled' : '') + '>' + esc(c.words[i].w) + '</button>';
    }
    h += '</div><div class="wc-mcol">';
    for (var j = 0; j < game.right.length; j++) {
      var wi = game.right[j], done = game.matched[wi];
      h += '<button class="wc-mn' + (done ? ' wc-ok' : '') + '" data-n="' + wi + '"' + (done ? ' disabled' : '') + '>' + esc((c.words[wi].when_th || "").slice(0, 60)) + '</button>';
    }
    h += '</div></div>';
    var n = 0; for (var k in game.matched) if (game.matched[k]) n++;
    if (n >= c.words.length) h += '<div class="wc-gwin">🎉 จับคู่ครบแล้ว! เก่งมาก</div>';
    return h;
  }

  // Map a (possibly inflected) quiz answer to its cluster word (prefix/stem match).
  function answerWord(c, Q) {
    var a = (Q.a || "").toLowerCase(), best = Q.a;
    for (var i = 0; i < c.words.length; i++) {
      var w = c.words[i].w.toLowerCase();
      if (a === w) return c.words[i].w;
      if (a.indexOf(w) === 0 || w.indexOf(a) === 0) best = c.words[i].w;
    }
    return best;
  }

  // Game 2: choose the right word for the context
  function gmeChoose(c) {
    var quiz = c.quiz || [];
    if (!quiz.length) return gameHeader(c, "เลือกให้ถูกบริบท") + '<div class="wc-ghint">กลุ่มนี้ยังไม่มีโจทย์บริบท</div>';
    if (game.qi >= quiz.length) return gameHeader(c, "เลือกให้ถูกบริบท") + '<div class="wc-gwin">🎉 จบแล้ว! ถูก ' + game.score + '/' + quiz.length + '</div>';
    var Q = quiz[game.qi], aw = answerWord(c, Q);
    var h = gameHeader(c, "เลือกให้ถูกบริบท") + '<div class="wc-gprog">ข้อ ' + (game.qi + 1) + '/' + quiz.length + ' · ถูก ' + game.score + '</div>';
    h += '<div class="wc-qsent">' + esc((Q.s || "").replace(/_+/, "_____")) + '</div><div class="wc-opts">';
    for (var i = 0; i < c.words.length; i++) {
      var w = c.words[i].w, cls = "wc-opt";
      if (game.answered) { if (w === aw) cls += " wc-correct"; else if (w === game.picked) cls += " wc-wrong"; else cls += " wc-dim"; }
      h += '<button class="' + cls + '" data-opt="' + esc(w) + '"' + (game.answered ? ' disabled' : '') + '>' + esc(w) + '</button>';
    }
    h += '</div>';
    if (game.answered) {
      var ok = game.picked === aw;
      h += '<div class="wc-fb ' + (ok ? 'wc-fb-ok' : 'wc-fb-no') + '">' + (ok ? 'ถูกต้อง!' : 'คำตอบ: ' + esc(aw)) + '</div>';
      if (Q.why_th) h += '<div class="wc-why">💡 ' + esc(Q.why_th) + '</div>';
      h += '<button class="wc-next" id="wc-next">ถัดไป</button>';
    }
    return h;
  }

  // Game 3: match word -> register tag
  function gmeTag(c) {
    var tags = ["formal", "neutral", "informal"];
    var h = gameHeader(c, "จับคู่ระดับความเป็นทางการ") + '<div class="wc-ghint">แตะคำ แล้วแตะช่องระดับที่ใช่</div>';
    h += '<div class="wc-tagwords">';
    for (var i = 0; i < c.words.length; i++) {
      var a = game.assign[i];
      h += '<button class="wc-tw' + (a ? ' wc-done' : (game.sel === i ? ' wc-sel' : '')) + '" data-w="' + i + '"' + (a ? ' disabled' : '') + '>' + esc(c.words[i].w) + '</button>';
    }
    h += '</div><div class="wc-tagbuckets">';
    for (var t = 0; t < tags.length; t++) {
      h += '<div class="wc-bucket" data-tag="' + tags[t] + '"><div class="wc-bucket-h">' + REG_TH[tags[t]] + '</div>';
      for (var j = 0; j < c.words.length; j++) if (game.assign[j] === tags[t]) {
        var ok = (c.words[j].reg || "neutral") === tags[t];
        h += '<span class="wc-chip ' + (ok ? 'wc-ok' : 'wc-bad') + '">' + esc(c.words[j].w) + (ok ? '' : ' ✕') + '</span>';
      }
      h += '</div>';
    }
    h += '</div>';
    var n = 0; for (var k in game.assign) if (game.assign[k]) n++;
    if (n >= c.words.length) { var right = 0; for (var m = 0; m < c.words.length; m++) if (game.assign[m] === (c.words[m].reg || "neutral")) right++; h += '<div class="wc-gwin">เสร็จ! ถูก ' + right + '/' + c.words.length + '</div>'; }
    return h;
  }

  // Game 4: rank words along the scale
  function gmeRank(c) {
    var h = gameHeader(c, "เรียงระดับ") + '<div class="wc-ghint">แตะคำเรียงจาก ' + esc(c.scale_label_th || "น้อย→มาก") + '</div>';
    h += '<div class="wc-rankslot">';
    for (var i = 0; i < game.order.length; i++) h += '<span class="wc-rchip">' + (i + 1) + '. ' + esc(c.words[game.order[i]].w) + '</span>';
    h += '</div><div class="wc-rankpool">';
    for (var j = 0; j < c.words.length; j++) if (game.order.indexOf(j) === -1) h += '<button class="wc-rw" data-w="' + j + '">' + esc(c.words[j].w) + '</button>';
    h += '</div>';
    if (game.order.length >= c.words.length && !game.checked) h += '<button class="wc-next" id="wc-check">ตรวจคำตอบ</button>';
    if (game.checked) {
      var sorted = c.words.map(function (w, k) { return k; }).sort(function (a, b) { return (c.words[a].scale || 0) - (c.words[b].scale || 0); });
      var right = 0; for (var p = 0; p < sorted.length; p++) if (game.order[p] === sorted[p]) right++;
      h += '<div class="wc-fb ' + (right === sorted.length ? 'wc-fb-ok' : 'wc-fb-no') + '">' + (right === sorted.length ? 'ถูกทั้งหมด! 🎉' : 'ถูก ' + right + '/' + sorted.length) + '</div>';
      h += '<div class="wc-answer">ลำดับที่ถูก: ' + sorted.map(function (k) { return esc(c.words[k].w); }).join(" → ") + '</div>';
      h += '<button class="wc-next" id="wc-again">ลองใหม่</button>';
    }
    return h;
  }

  function wireGame(c) {
    var v = document.getElementById("view");
    if (game.type === "match") {
      [].forEach.call(v.querySelectorAll(".wc-mw"), function (b) { b.onclick = function () { game.left = parseInt(b.getAttribute("data-w"), 10); render(v); }; });
      [].forEach.call(v.querySelectorAll(".wc-mn"), function (b) {
        b.onclick = function () {
          if (game.left < 0) return; var ni = parseInt(b.getAttribute("data-n"), 10);
          if (ni === game.left) { game.matched[ni] = true; game.left = -1; } else { game.left = -1; b.classList.add("wc-shake"); }
          render(v);
        };
      });
    } else if (game.type === "choose") {
      [].forEach.call(v.querySelectorAll(".wc-opt"), function (b) { b.onclick = function () { var Q = c.quiz[game.qi]; game.answered = true; game.picked = b.getAttribute("data-opt"); if (game.picked === answerWord(c, Q)) game.score++; render(v); }; });
      var nx = document.getElementById("wc-next"); if (nx) nx.onclick = function () { game.qi++; game.answered = false; game.picked = ""; render(v); };
    } else if (game.type === "tag") {
      [].forEach.call(v.querySelectorAll(".wc-tw"), function (b) { b.onclick = function () { game.sel = parseInt(b.getAttribute("data-w"), 10); render(v); }; });
      [].forEach.call(v.querySelectorAll(".wc-bucket"), function (b) { b.onclick = function () { if (game.sel < 0) return; game.assign[game.sel] = b.getAttribute("data-tag"); game.sel = -1; render(v); }; });
    } else if (game.type === "rank") {
      [].forEach.call(v.querySelectorAll(".wc-rw"), function (b) { b.onclick = function () { game.order.push(parseInt(b.getAttribute("data-w"), 10)); render(v); }; });
      [].forEach.call(v.querySelectorAll(".wc-rchip"), function (b) {}); // chips not removable for simplicity
      var ck = document.getElementById("wc-check"); if (ck) ck.onclick = function () { game.checked = true; render(v); };
      var ag = document.getElementById("wc-again"); if (ag) ag.onclick = function () { game.order = []; game.checked = false; render(v); };
    }
  }

  PT.wordchoice = {
    render: render,
    leave: function () { /* keep state */ },
    reset: function () { sel = -1; cat = null; game = null; q = ""; }
  };
})();

    h.push('<div class="ex-intro">เลือกบทความ → อ่าน (ลองจับเวลา ~15–18 นาที/บท) → ตอบคำถาม → ตรวจอัตโนมัติ + ดูเฉลยและจุดอ้างอิง</div>');
    for (var i = 0; i < list.length; i++) {
      var p = list[i], realIdx = RDATA.indexOf(p);
      h.push('<button class="rd-card" data-p="' + realIdx + '">' +
        '<div class="rd-card-top">' + bandBadge(p.band) + '<span class="rd-card-topic">' + esc(p.topic || "") + '</span></div>' +
        '<div class="rd-card-t">' + esc(p.title) + '</div>' +
        '<div class="rd-card-m">' + (p.questions ? p.questions.length : 0) + ' คำถาม · ~' + (p.words || "") + ' คำ</div></button>');
    }
    h.push('</div>');
    v.innerHTML = h.join("");
    var back = document.getElementById("ex-back");
    if (back) back.onclick = function () { view = "home"; render(v); };
    [].forEach.call(v.querySelectorAll("[data-p]"), function (b) {
      b.onclick = function () { rdSel = parseInt(b.getAttribute("data-p"), 10); rdAns = {}; rdDone = false; render(v); };
    });
  }

  var TFNG = [{ v: "True", t: "True / จริง" }, { v: "False", t: "False / เท็จ" }, { v: "Not Given", t: "Not Given / ไม่ได้กล่าว" }];

  function passageHtml(txt) {
    // split on paragraph labels like [A]; esc text, render label as a styled span
    var parts = String(txt).split(/(?=\[[A-Z]\])/);
    var h = "";
    for (var i = 0; i < parts.length; i++) {
      var s = parts[i].replace(/^\s+|\s+$/g, "");
      if (!s) continue;
      var m = s.match(/^\[([A-Z])\]\s*([\s\S]*)$/);
      if (m) h += '<p class="rd-para"><span class="rd-plab">' + m[1] + '</span> ' + esc(m[2]) + "</p>";
      else h += '<p class="rd-para">' + esc(s) + "</p>";
    }
    return h || ('<p class="rd-para">' + esc(txt) + "</p>");
  }

  function norm(s) { return String(s == null ? "" : s).toLowerCase().replace(/[.,;:!?"'()]/g, "").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, ""); }
  function isCorrect(q, val) {
    if (val == null || val === "") return false;
    if (q.type === "gap") return norm(val) === norm(q.a);
    return String(val) === String(q.a);
  }

  function renderPassage(v, p) {
    var qs = p.questions || [];
    var h = ['<div class="ex-wrap">'];
    h.push('<div class="ex-bar"><button class="ex-back" id="rd-back">‹ บทอื่น</button><div class="ex-title">Reading</div></div>');
    h.push('<div class="rd-head">' + bandBadge(p.band) + '<span class="rd-htopic">' + esc(p.topic || "") + '</span></div>');
    h.push('<div class="rd-title">' + esc(p.title) + '</div>');
    h.push('<div class="rd-passage">' + passageHtml(p.passage) + '</div>');

    if (rdDone) {
      var score = 0;
      for (var s = 0; s < qs.length; s++) if (isCorrect(qs[s], rdAns[s])) score++;
      var pct = qs.length ? Math.round(score / qs.length * 100) : 0;
      h.push('<div class="rd-score"><b>' + score + ' / ' + qs.length + '</b><span>' + pct + '% ถูก</span></div>');
    }

    h.push('<div class="rd-qs">');
    for (var i = 0; i < qs.length; i++) {
      var q = qs[i], cor = rdDone ? isCorrect(q, rdAns[i]) : null;
      var tag = q.type === "tfng" ? "True / False / Not Given" : (q.type === "gap" ? "เติมคำ" + (q.limit ? " (ไม่เกิน " + q.limit + " คำ)" : "") : "เลือกตอบ");
      h.push('<div class="rd-q' + (rdDone ? (cor ? " ok" : " bad") : "") + '"><div class="rd-qn">ข้อ ' + (i + 1) + ' <span>' + tag + '</span>' + (rdDone ? (cor ? ' <b class="rd-mk ok">✓</b>' : ' <b class="rd-mk bad">✗</b>') : "") + '</div>');
      h.push('<div class="rd-qtext">' + esc(q.q) + '</div>');
      if (q.type === "gap") {
        h.push('<input class="rd-gap" data-q="' + i + '" ' + (rdDone ? "disabled" : "") + ' value="' + esc(rdAns[i] || "") + '" placeholder="พิมพ์คำตอบ…" autocomplete="off" autocapitalize="off" spellcheck="false">');
      } else {
        var opts = q.type === "tfng" ? TFNG : (q.options || []).map(function (o) { return { v: o, t: o }; });
        h.push('<div class="rd-opts">');
        for (var o = 0; o < opts.length; o++) {
          var ov = opts[o].v, sel = rdAns[i] === ov;
          var oc = "rd-opt" + (sel ? " sel" : "");
          if (rdDone) { if (String(q.a) === String(ov)) oc += " ans"; else if (sel) oc += " wrong"; }
          h.push('<button class="' + oc + '" data-q="' + i + '" data-v="' + esc(ov) + '"' + (rdDone ? " disabled" : "") + '>' + esc(opts[o].t) + '</button>');
        }
        h.push('</div>');
      }
      if (rdDone) {
        h.push('<div class="rd-fb">');
        h.push('<div class="rd-ans">เฉลย: <b>' + esc(q.a) + '</b></div>');
        if (q.why_th) h.push('<div class="rd-why">' + esc(q.why_th) + '</div>');
        if (q.evidence) h.push('<div class="rd-ev">📌 “' + esc(q.evidence) + '”</div>');
        h.push('</div>');
      }
      h.push('</div>');
    }
    h.push('</div>');

    if (!rdDone) h.push('<button class="rd-submit" id="rd-submit">ตรวจคำตอบ</button>');
    else h.push('<button class="rd-submit rd-retry" id="rd-retry">🔄 ลองใหม่</button>');
    h.push('</div>');
    v.innerHTML = h.join("");

    document.getElementById("rd-back").onclick = function () { rdSel = -1; rdAns = {}; rdDone = false; render(v); };
    // option selection (no re-render, preserve inputs)
    [].forEach.call(v.querySelectorAll(".rd-opt"), function (b) {
      b.onclick = function () {
        if (rdDone) return;
        var qi = b.getAttribute("data-q");
        rdAns[qi] = b.getAttribute("data-v");
        [].forEach.call(v.querySelectorAll('.rd-opt[data-q="' + qi + '"]'), function (x) { x.className = "rd-opt" + (x === b ? " sel" : ""); });
      };
    });
    [].forEach.call(v.querySelectorAll(".rd-gap"), function (inp) {
      inp.oninput = function () { rdAns[inp.getAttribute("data-q")] = inp.value; };
    });
    var sub = document.getElementById("rd-submit");
    if (sub) sub.onclick = function () {
      [].forEach.call(v.querySelectorAll(".rd-gap"), function (inp) { rdAns[inp.getAttribute("data-q")] = inp.value; });
      rdDone = true; render(v);
      var top = v.querySelector(".rd-score"); if (top) try { top.scrollIntoView({ block: "center" }); } catch (e) {}
    };
    var rt = document.getElementById("rd-retry");
    if (rt) rt.onclick = function () { rdAns = {}; rdDone = false; render(v); try { v.scrollIntoView({ block: "start" }); } catch (e) {} };
  }

  function wireCommon(v) {
    var back = document.getElementById("ex-back");
    if (back) back.onclick = function () { view = "home"; render(v); };
    [].forEach.call(v.querySelectorAll("[data-rev]"), function (b) {
      b.onclick = function (e) {
        if (e.target && e.target.getAttribute && e.target.getAttribute("data-say") !== null) return; // let speak button handle
        var k = b.getAttribute("data-rev"); rev[k] = !rev[k]; render(v);
      };
    });
    [].forEach.call(v.querySelectorAll(".ex-spk"), function (b) {
      b.onclick = function (e) { e.stopPropagation(); if (window.speak) speak(b.getAttribute("data-say")); };
    });
  }

  PT.examprep = {
    render: render,
    open: function (v) { view = v || "home"; },   // deep-link: "home" | "sp" | "wr" | "wl" | "rd"
    leave: function () { stopTimer(); },
    reset: function () { view = "home"; spSel = -1; spSub = "part2"; wrSub = "task1"; rev = {}; rdSel = -1; rdAns = {}; rdDone = false; wlTask = "task2"; stopTimer(); wlSec = 0; }
  };
})();

/* ===== module: prachub ===== */
/* prachub.js — "ฝึก" hub: a simple menu that gathers all drills/games (Quiz's 7 modes),
   Word Choice, and weak-word review. Routes into existing modes. ES5. Uses S, esc, goMode, PT.quiz, PT.miss. */
PT.prachub = (function () {
  "use strict";
  function go(mode, sub) {
    if (mode === "quiz" && sub) { try { PT.quiz._state.sub = sub; PT.quiz._state.cur = null; } catch (e) {} }
    goMode(mode);
  }
  function weak() {
    S.filter.status = {}; S.filter.groups = {}; S.filter.pos = {}; S.filter.fav = false; S.filter.miss = true; S.filter.q = "";
    S.workingDirty = true; goMode("quiz");

    { ic: "🎧", sub: "listen", t: "ฟังเขียนตาม", d: "dictation" },
    { ic: "◻️", sub: "cloze", t: "เติมคำ", d: "เติมช่องว่างในประโยค" },
    { ic: "✍️", sub: "build", t: "แต่งประโยค", d: "ไทย → อังกฤษ + ให้ Claude ตรวจ" },
    { ic: "🧩", sub: "bank", t: "เติมประโยค", d: "เกมเติมหลายช่องจากคลังคำ" },
    { ic: "🔧", sub: "fix", t: "หาที่ผิด", d: "เกมแก้ประโยคผิด" }

    h.push('<div class="ph-grid">');

        '<div class="ph-t">' + esc(m.t) + '</div><div class="ph-d">' + esc(m.d) + '</div></button>');
    }
    h.push('</div>');
    h.push('<div class="ph-sec">เข้าใจให้ลึก</div>');
    h.push('<button class="ph-wide" data-ph-wc="1"><span class="ph-wic">⚖️</span><span><b>เลือกคำ (near-synonyms)</b>' +
      '<em>668 กลุ่มคำใกล้เคียง + 4 เกม — รู้ว่าคำไหนใช้ตอนไหน</em></span></button>');
    h.push('<button class="ph-wide" data-ph-struct="1"><span class="ph-wic">📐</span><span><b>โครงสร้างประโยค</b>' +
      '<em>โครงประโยคอังกฤษ · WH · คำเชื่อม · การแปลงประโยค</em></span></button>');
    h.push('</div>');
    v.innerHTML = h.join("");
    [].forEach.call(v.querySelectorAll("[data-ph-sub]"), function (b) { b.onclick = function () { go("quiz", b.getAttribute("data-ph-sub")); }; });
    var wc = v.querySelector("[data-ph-wc]"); if (wc) wc.onclick = function () { goMode("wordchoice"); };
    var stb = v.querySelector("[data-ph-struct]"); if (stb) stb.onclick = function () { if (PT.structure) PT.structure.open(); };
