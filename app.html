<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pocket Tutor">
<meta name="theme-color" content="#151420" media="(prefers-color-scheme:dark)">
<meta name="theme-color" content="#f4f2ec" media="(prefers-color-scheme:light)">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Pocket Tutor — English EN·TH</title>
<style>

:root{--bg:#f7f5f1;--surface:#fff;--surface2:#f1ede6;--text:#1f1b16;--muted:#8a8177;--border:#e6e0d6;
 --accent:#e0942f;--accent-ink:#fff;--accent-soft:#fbebd3;--know:#4e9a6b;--review:#cf6f2c;--shadow:0 1px 2px rgba(31,27,22,.05),0 4px 16px rgba(31,27,22,.05);
 --g0:#4e9a6b;--g1:#5f9a37;--g2:#bd9126;--g3:#cd6f2f;--g4:#bd4a49;
 --font:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Segoe UI",Roboto,"Noto Sans Thai","Sarabun",sans-serif}
@media (prefers-color-scheme:dark){:root{--bg:#14120f;--surface:#1e1b16;--surface2:#282420;--text:#f4efe8;--muted:#a69c8e;--border:#332e27;--accent:#f0a94a;--accent-ink:#20160a;--accent-soft:#3a2c17;--know:#69b98a;--review:#e08a45;--shadow:0 2px 12px rgba(0,0,0,.35);--g0:#69b98a;--g1:#7cb84f;--g2:#dcae44;--g3:#e08a45;--g4:#dd6663}}
:root[data-theme=light]{--bg:#f7f5f1;--surface:#fff;--surface2:#f1ede6;--text:#1f1b16;--muted:#8a8177;--border:#e6e0d6;--accent:#e0942f;--accent-ink:#fff;--accent-soft:#fbebd3;--know:#4e9a6b;--review:#cf6f2c;--shadow:0 1px 2px rgba(31,27,22,.05),0 4px 16px rgba(31,27,22,.05);--g0:#4e9a6b;--g1:#5f9a37;--g2:#bd9126;--g3:#cd6f2f;--g4:#bd4a49}
:root[data-theme=dark]{--bg:#14120f;--surface:#1e1b16;--surface2:#282420;--text:#f4efe8;--muted:#a69c8e;--border:#332e27;--accent:#f0a94a;--accent-ink:#20160a;--accent-soft:#3a2c17;--know:#69b98a;--review:#e08a45;--shadow:0 2px 12px rgba(0,0,0,.35);--g0:#69b98a;--g1:#7cb84f;--g2:#dcae44;--g3:#e08a45;--g4:#dd6663}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;overscroll-behavior-y:none}
#app{max-width:600px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
button,select,input{font-family:inherit;color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
.top{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top) + 10px) 14px 9px}
.hrow{display:flex;align-items:center;gap:10px}
.mark{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;flex:1;min-width:0}
.dot{width:22px;height:22px;border-radius:7px;background:var(--accent);color:var(--accent-ink);display:grid;place-items:center;font-size:12px;font-weight:900;flex:0 0 auto}
.icon{width:36px;height:36px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:grid;place-items:center;font-size:15px;flex:0 0 auto}
select.deck{flex:1;min-width:0;height:38px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);padding:0 10px;font-size:14px;font-weight:700}
.row2{display:flex;gap:8px;margin-top:9px}
#q{flex:1;height:40px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);padding:0 13px;font-size:16px;color:var(--text)}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex:0 0 auto}
.seg button{padding:0 11px;font-size:12.5px;font-weight:700;color:var(--muted);background:var(--surface2);border:none;height:40px}
.seg button.on{background:var(--accent);color:var(--accent-ink)}
main{flex:1;padding:12px 14px calc(env(safe-area-inset-bottom) + 82px);font-size:16px}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;max-width:600px;margin:0 auto;background:var(--bg);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.tabbar button{flex:1;padding:8px 0 7px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:700;color:var(--muted);background:none;border:none}
.tabbar button .i{font-size:20px}
.tabbar button.on{color:var(--accent)}
.empty{text-align:center;color:var(--muted);padding:48px 20px}
.s-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.s-stat{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:15px 10px;text-align:center;box-shadow:var(--shadow)}
.s-stat b{display:block;font-size:26px;font-weight:800}.s-stat span{font-size:11.5px;color:var(--muted);font-weight:600}
.s-pl{margin-bottom:12px}.s-pl .h{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px}
.s-pl .h span{color:var(--muted)}.s-bar{height:9px;border-radius:6px;background:var(--surface2);overflow:hidden}.s-bar i{display:block;height:100%}
.s-reset{width:100%;margin-top:14px;padding:12px;border-radius:11px;background:var(--surface2);color:var(--muted);font-weight:700;border:none}
.apptitle{display:none;font-weight:800;font-size:16px;color:var(--text)}
.mode-nodeck #deckwrap{display:none}
.mode-nodeck .apptitle{display:inline}
.tabbar button .i{font-size:22px}
.tabbar button.on .i{transform:translateY(-1px)}
.dot{background:var(--accent)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* filtersUI.css */
/* PT.filtersUI styles — prefix .f-  (light + dark via CSS vars).
   Horizontally scrollable, compact chip rows for iPhone. */

#filters { display: block; }

.f-row {
  display: flex;
  gap: 6px;
  align-items: center;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 6px 10px;
  white-space: nowrap;
  scrollbar-width: none;         /* Firefox */
}
.f-row::-webkit-scrollbar { display: none; } /* iOS/WebKit */

.f-toolrow {
  justify-content: space-between;
  gap: 10px;
}

/* Chips */
.f-chip {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font: 500 13px/1 var(--font);
  color: var(--text);
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 7px 11px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  transition: background .12s ease, border-color .12s ease, color .12s ease;
}
.f-chip:active { transform: scale(0.96); }

.f-chip.f-on {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-ink);
}

.f-lab { display: inline-block; }

/* Count badge on status chips */
.f-count {
  display: inline-block;
  min-width: 16px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  line-height: 16px;
  padding: 0 4px;
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted);
}
.f-chip.f-on .f-count {
  background: var(--accent);
  color: var(--accent-ink);
}

/* Segmented sort control */
.f-seg {
  flex: 0 0 auto;
  display: inline-flex;
  border: 1.5px solid var(--border);
  border-radius: 999px;
  overflow: hidden;
  background: var(--surface2);
}
.f-segbtn {
  flex: 0 0 auto;
  font: 500 13px/1 var(--font);
  color: var(--muted);
  background: transparent;
  border: none;
  padding: 7px 12px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}
.f-segbtn + .f-segbtn { border-left: 1px solid var(--border); }
.f-segbtn.f-on {
  background: var(--accent);
  color: var(--accent-ink);
  font-weight: 700;
}

/* Clear-all */
.f-clear {
  flex: 0 0 auto;
  font: 500 13px/1 var(--font);
  color: var(--muted);
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 999px;
  padding: 7px 12px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}
.f-clear:active { transform: scale(0.96); }

/* Hide the search bar + filter chips on screens that aren't word-list browsing
   (ฝึก/สอบ/วันนี้/สถิติ/โครงสร้างประโยค). These modes carry the mode-nodeck class. */
.mode-nodeck .row2,
.mode-nodeck #filters { display: none; }

/* browse.css */
/* PT.browse — Browse tab styles. Prefix ".pg-". Light + dark via vars. */

.pg-count {
  padding: 8px 12px;
  color: var(--muted);
  font: 13px/1.4 var(--font);
}

.pg-host { padding-bottom: 12px; }

.pg-empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--muted);
}

/* Rows */
.pg-list { display: block; }

.pg-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
}
.pg-row:active { background: var(--surface2); }

.pg-tag {
  flex: 0 0 auto;
  min-width: 34px;
  text-align: center;
  padding: 3px 6px;
  border-radius: 6px;
  font: 600 11px/1.2 var(--font);
  color: var(--accent-ink);
}
.pg-tag-plain {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

.pg-main { flex: 1 1 auto; min-width: 0; }

.pg-w {
  font: 600 15px/1.3 var(--font);
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pg-pos {
  font-weight: 400;
  font-size: 12px;
  color: var(--muted);
}
.pg-mt {
  font: 13px/1.4 var(--font);
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pg-dot {
  flex: 0 0 auto;
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* Pager */
.pg-pager {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 14px 8px;
}
.pg-pg, .pg-nav {
  min-width: 34px;
  height: 34px;
  padding: 0 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font: 14px/1 var(--font);
  cursor: pointer;
}
.pg-pg:active, .pg-nav:active { background: var(--surface2); }
.pg-cur {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: var(--accent);
  font-weight: 700;
}
.pg-nav[disabled] { opacity: .4; cursor: default; }
.pg-gap { padding: 0 4px; color: var(--muted); }

/* Bottom sheet */
.pg-sheet {
  position: relative;
  padding: 20px 16px 28px;
  font: 14px/1.5 var(--font);
  color: var(--text);
}
.pg-close {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 50%;
  background: var(--surface2);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
}
.pg-sh-head { margin: 4px 44px 12px 0; }
.pg-sh-word { font: 700 22px/1.2 var(--font); color: var(--text); }
.pg-sh-pos { font-size: 13px; color: var(--muted); margin-top: 2px; }

.pg-sh-me { color: var(--text); margin-bottom: 4px; }
.pg-sh-mt { color: var(--muted); margin-bottom: 12px; }

.pg-sh-row { margin-bottom: 10px; }
.pg-sh-lab {
  display: inline-block;
  font: 600 11px/1.2 var(--font);
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--accent);
  margin-right: 6px;
}
.pg-sh-val { color: var(--text); }

.pg-sh-ex {
  background: var(--surface2);
  border-radius: 10px;
  padding: 10px 12px;
  margin: 8px 0 12px;
}
.pg-sh-ee { color: var(--text); }
.pg-sh-et { color: var(--muted); margin-top: 4px; }
.pg-spk {
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 15px;
  vertical-align: middle;
}

.pg-sh-note, .pg-sh-rq {
  margin-top: 10px;
  color: var(--text);
}

/* verb forms V1 -> V2 -> V3 */
.pg-sh-vf { display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  background: var(--surface2); border-radius: 12px; padding: 11px 12px; margin: 4px 0 14px; }
.pg-vf-cell { display: flex; flex-direction: column; gap: 2px; }
.pg-vf-l { font: 700 10.5px/1.2 var(--font); text-transform: uppercase; letter-spacing: .03em; color: var(--accent); }
.pg-vf-w { font: 700 15px/1.3 var(--font); color: var(--text); }
.pg-vf-ar { color: var(--muted); font-size: 14px; }
.pg-vf-ir { flex: 0 0 100%; font-size: 12px; color: var(--text); background: var(--accent-soft);
  border-radius: 8px; padding: 6px 9px; margin-top: 2px; line-height: 1.5; }

/* item running numbers (#N, match the daily plan) */
.pg-no { font-size: 11px; font-weight: 800; color: var(--muted); background: var(--surface2);
  border-radius: 6px; padding: 1px 5px; vertical-align: 1px; font-variant-numeric: tabular-nums; }
.pg-sh-no { color: var(--accent); font-weight: 700; }

/* library header (คลัง) */
.lib-head { display: flex; align-items: center; gap: 10px; margin: 2px 2px 8px; }
.lib-title { flex: 1; min-width: 0; font-size: 18px; font-weight: 900; }
.lib-review { flex: 0 0 auto; font-family: var(--font); font-size: 13px; font-weight: 800; color: var(--accent-ink);
  background: var(--accent); border: none; border-radius: 999px; padding: 8px 15px; cursor: pointer; }
.lib-review:active { transform: scale(.97); }

/* cards.css */
/* PT.cards — flashcards styles. All classes prefixed ".c-". Light + dark via vars. */

.c-wrap {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 560px;
  margin: 0 auto;
  padding: 12px 14px 24px;
}

.c-top {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--muted);
}
.c-prog { font-weight: 600; color: var(--text); }
.c-grp {
  color: var(--accent);
  font-weight: 600;
}
.c-dot { opacity: .5; }
.c-undo {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 999px;
  padding: 4px 12px;
  font: inherit;
  font-size: 13px;
  cursor: pointer;
}
.c-undo:active { background: var(--surface2); }

/* ---- 3D flip card ---- */
.c-card {
  position: relative;
  width: 100%;
  min-height: 260px;
  perspective: 1400px;
  cursor: pointer;
  outline: none;
}
.c-inner {
  position: relative;
  width: 100%;
  min-height: 260px;
  transform-style: preserve-3d;
  transition: transform .45s cubic-bezier(.4, .1, .2, 1);
}
.c-wrap.c-flipped .c-inner { transform: rotateY(180deg); }

.c-face {
  position: absolute;
  inset: 0;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 22px 20px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

/* front: centered word */
.c-front {
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 10px;
}
.c-word {
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  word-break: break-word;
}
.c-pos {
  font-size: 15px;
  color: var(--muted);
  font-style: italic;
}
.c-hint {
  margin-top: 8px;
  font-size: 13px;
  color: var(--muted);
  opacity: .8;
}

/* back: detail, rotated so it faces us when flipped */
.c-back {
  transform: rotateY(180deg);
  gap: 8px;
}
.c-b-head {
  display: flex;
  align-items: center;
  gap: 10px;
}
.c-b-word {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.c-speak {
  margin-left: auto;
  background: var(--accent-soft);
  border: none;
  color: var(--accent);
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
}
.c-speak:active { transform: scale(.92); }
.c-b-pos { font-size: 14px; color: var(--muted); font-style: italic; margin-bottom: 2px; }

/* verb forms V1 -> V2 -> V3 on the flashcard back */
.c-b-vf { display: flex; flex-wrap: wrap; align-items: center; gap: 7px;
  background: var(--surface2); border-radius: 10px; padding: 8px 10px; margin: 2px 0 6px; }
.c-vf-cell { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
.c-vf-l { font-size: 10px; font-weight: 700; letter-spacing: .03em; color: var(--accent); }
.c-vf-w { font-size: 14.5px; font-weight: 700; color: var(--text); }
.c-vf-ar { color: var(--muted); font-size: 13px; }
.c-vf-ir { font-size: 11px; font-weight: 700; color: var(--accent-ink); background: var(--accent-soft);
  border-radius: 999px; padding: 2px 8px; margin-left: 2px; }
.c-b-row {
  font-size: 15px;
  color: var(--text);
  display: flex;
  gap: 8px;
  line-height: 1.45;
}
.c-b-lab {
  flex: 0 0 auto;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  background: var(--surface2);
  border-radius: 6px;
  padding: 1px 6px;
  height: fit-content;
  margin-top: 2px;
}
.c-b-ex {
  font-size: 14px;
  color: var(--text);
  border-left: 3px solid var(--accent-soft);
  padding-left: 10px;
  line-height: 1.5;
}
.c-b-ex-th { color: var(--muted); }
.c-b-x {
  font-size: 13px;
  color: var(--muted);
  background: var(--surface2);
  border-radius: 8px;
  padding: 6px 10px;
}
.c-b-note {
  font-size: 13px;
  color: var(--muted);
  background: var(--accent-soft);
  border-radius: 8px;
  padding: 8px 10px;
  line-height: 1.5;
}

/* ---- footer: reveal button / rating row ---- */
.c-foot { min-height: 56px; }
.c-reveal {
  width: 100%;
  background: var(--accent);
  color: var(--accent-ink);
  border: none;
  border-radius: 14px;
  padding: 16px;
  font: inherit;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
}
.c-reveal:active { filter: brightness(.94); }
.c-wrap.c-flipped .c-reveal { display: none; }

.c-rates { display: none; }
.c-wrap.c-flipped .c-rates {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.c-rate {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 4px;
  background: var(--surface);
  color: var(--text);
  font: inherit;
  cursor: pointer;
}
.c-rate:active { transform: translateY(1px); }
.c-rate-th { font-size: 15px; font-weight: 700; }
.c-rate-iv { font-size: 12px; color: var(--muted); }

.c-again { border-color: var(--review); }
.c-again .c-rate-th { color: var(--review); }
.c-easy { border-color: var(--know); }
.c-easy .c-rate-th { color: var(--know); }
.c-good { border-color: var(--accent); }
.c-good .c-rate-th { color: var(--accent); }

/* ---- empty state ---- */
.c-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding: 64px 24px;
  color: var(--muted);
}
.c-empty-emoji { font-size: 52px; }
.c-empty-msg { font-size: 18px; font-weight: 600; color: var(--text); }
.c-empty-sub { font-size: 13.5px; color: var(--muted); margin-top: -6px; }
.c-unl-cta { font-family: var(--font); font-size: 14.5px; font-weight: 800; color: var(--accent-ink);
  background: var(--accent); border: none; border-radius: 999px; padding: 11px 20px; cursor: pointer; margin-top: 4px; }
.c-unl-cta:active { transform: scale(.97); }

/* unlimited-mode toggle, top bar */

/* bank.css */

.bk-actions { display: flex; gap: 10px; margin-top: 18px; }

.bk-result { text-align: center; font-size: 20px; font-weight: 900; color: var(--accent); margin: 16px 0 12px; }

/* fix.css */

/* daily.css */

.dl-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

/* hide search/filters while in the daily test */

/* Today-panel primary button */

/* wmap.css */
/* wmap.css — แผนที่คำ (word-connections map) inside the bottom sheet */
.pg-sh-map { display: block; width: 100%; margin-top: 14px; font-family: var(--font); font-size: 14px;

  border-radius: 12px; padding: 11px; cursor: pointer; text-align: center; }

.wm-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

/* talk.css */
/* talk.css — Conversations tab: dialogue list + chat-bubble role-play view */

.tk-wrap { padding: 4px 2px 8px; }

  font-size: 12.5px; color: var(--muted); margin: 2px 4px 12px; text-align: center;
}

/* ---- dialogue view ---- */
.tk-bar { display: flex; align-items: center; gap: 10px; margin: 2px 2px 6px; }
.tk-back {

}
.tk-title { font-size: 16px; font-weight: 800; color: var(--text); flex: 1; min-width: 0; }

/* reader.css */
/* reader.css — เรื่องสั้น graded reader (สนทนา tab) + shared mode toggle */
.tk-modeseg { display: flex; gap: 8px; margin-bottom: 12px; }
.tk-modebtn { flex: 1; font-family: var(--font); font-size: 14px; font-weight: 800; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); color: var(--muted); border-radius: 12px; padding: 10px; }
.tk-modebtn.on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

.rd2-lvls { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
.rd2-lvl { font-family: var(--font); font-size: 13px; font-weight: 800; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 7px 14px; }
.rd2-lvl.on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

.rd2-card { display: block; width: 100%; text-align: left; cursor: pointer; background: var(--surface);
  border: 1px solid var(--border); border-radius: 14px; padding: 13px 15px; margin-bottom: 9px;
  color: var(--text); font-family: var(--font); box-shadow: var(--shadow); }
.rd2-card:active { background: var(--surface2); }
.rd2-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.rd2-badge { font-size: 11px; font-weight: 800; color: var(--accent-ink); background: var(--accent-soft); border-radius: 999px; padding: 2px 9px; }
.rd2-genre { font-size: 11.5px; color: var(--muted); font-weight: 600; }
.rd2-read { margin-left: auto; font-size: 11px; font-weight: 800; color: var(--know); }
.rd2-card-t { font-size: 15.5px; font-weight: 800; line-height: 1.3; }
.rd2-card-tt { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
.rd2-card-m { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

.rd2-t { font-size: 20px; font-weight: 900; line-height: 1.3; margin: 4px 2px 2px; }
.rd2-tt { font-size: 13.5px; color: var(--muted); margin: 0 2px 8px; }
.rd2-hintline { font-size: 11.5px; color: var(--muted); background: var(--surface2); border-radius: 9px; padding: 7px 11px; margin-bottom: 12px; }

.rd2-para { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 13px;
  padding: 13px 42px 13px 15px; margin-bottom: 9px; cursor: pointer; box-shadow: var(--shadow); }
.rd2-en { font-size: 15.5px; line-height: 1.75; color: var(--text); }
.rd2-th { font-size: 13.5px; line-height: 1.65; color: var(--accent-ink); background: var(--accent-soft);
  border-radius: 9px; padding: 9px 11px; margin-top: 9px; }
.rd2-say { position: absolute; top: 10px; right: 9px; background: none; border: none; font-size: 16px; cursor: pointer; }

.rd2-sec { font-size: 13.5px; font-weight: 900; color: var(--accent); margin: 18px 2px 9px; }
.rd2-gloss { display: flex; flex-wrap: wrap; gap: 7px; }
.rd2-gw { font-family: var(--font); text-align: left; cursor: pointer; background: var(--surface);
  border: 1px solid var(--border); border-radius: 11px; padding: 8px 12px; min-height: 40px; }
.rd2-gw b { display: block; font-size: 13.5px; font-weight: 800; color: var(--text); }
.rd2-gw span { display: block; font-size: 11.5px; color: var(--muted); }

.rd2-q { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
.rd2-q-t { font-size: 14px; font-weight: 700; margin-bottom: 9px; line-height: 1.5; }
.rd2-opt { display: block; width: 100%; text-align: left; font-family: var(--font); font-size: 13.5px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface2); color: var(--text); border-radius: 9px; padding: 9px 12px; margin-bottom: 7px; }
.rd2-opt.ok { border-color: var(--know); background: rgba(46,139,100,.12); font-weight: 700; }
.rd2-opt.bad { border-color: #d9534f; background: rgba(217,83,79,.12); }
.rd2-opt.dim { opacity: .55; }
.rd2-score { text-align: center; font-size: 17px; font-weight: 900; color: var(--accent); margin: 14px 0 10px; }
.rd2-next { display: block; width: 100%; font-family: var(--font); font-size: 15px; font-weight: 800;
  color: var(--accent-ink); background: var(--accent); border: none; border-radius: 12px; padding: 13px; cursor: pointer; }
.rd2-slow { top: 40px; }

/* wordchoice.css */
/* wordchoice.css — "เลือกใช้คำ" tab: near-synonym clusters + games */

.wc-wrap { padding: 4px 2px 10px; }
.wc-search input { width: 100%; box-sizing: border-box; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); border-radius: 12px; padding: 11px 14px;
  font-size: 15px; font-family: var(--font); }
.wc-rand { width: 100%; margin: 10px 0 4px; border: none; border-radius: 12px; cursor: pointer;
  background: var(--accent); color: var(--accent-ink); font-family: var(--font); font-weight: 800;
  font-size: 14px; padding: 10px; }
.wc-intro { font-size: 12.5px; color: var(--muted); text-align: center; margin: 8px 4px 6px; }
.wc-catgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.wc-catcard { display: block; text-align: left; cursor: pointer; background: var(--surface);
  border: 1px solid var(--border); border-radius: 14px; padding: 14px; color: var(--text); font-family: var(--font); }
.wc-catcard:active { background: var(--surface2); }
.wc-catcard-t { font-size: 14px; font-weight: 800; color: var(--accent); }
.wc-catcard-n { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
.wc-cat { font-size: 13px; font-weight: 800; color: var(--accent); text-transform: uppercase;
  letter-spacing: .04em; margin: 16px 4px 8px; }
.wc-card { display: block; width: 100%; text-align: left; cursor: pointer; background: var(--surface);
  border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin: 0 0 8px;
  color: var(--text); font-family: var(--font); }
.wc-card:active { background: var(--surface2); }
.wc-card-w { font-size: 15px; font-weight: 800; color: var(--accent); }
.wc-card-m { font-size: 12.5px; color: var(--muted); margin-top: 3px; }

/* ---- detail ---- */
.wc-bar { display: flex; align-items: center; gap: 10px; margin: 2px 2px 8px; }
.wc-back { background: none; border: none; color: var(--accent); font-family: var(--font);
  font-size: 15px; font-weight: 700; cursor: pointer; padding: 4px 2px; }
.wc-title { font-size: 15px; font-weight: 800; color: var(--text); flex: 1; min-width: 0; }
.wc-core { font-size: 13.5px; color: var(--text); background: var(--accent-soft); border-radius: 12px;
  padding: 10px 13px; margin-bottom: 6px; }
.wc-core-en { font-size: 12px; color: var(--muted); margin-top: 3px; }
.wc-scalelab { font-size: 11.5px; color: var(--muted); margin: 6px 2px; }
.wc-word { border: 1px solid var(--border); border-radius: 12px; padding: 10px 13px; margin-bottom: 8px; background: var(--surface); }
.wc-word-h { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.wc-w { font-size: 16px; font-weight: 800; color: var(--text); }
.wc-pos { font-size: 11px; color: var(--muted); font-style: italic; }
.wc-reg { font-size: 10.5px; font-weight: 800; border-radius: 999px; padding: 1px 8px; }
.wc-reg-formal { background: #b8761a22; color: var(--accent); }
.wc-reg-neutral { background: var(--surface2); color: var(--muted); }
.wc-reg-informal { background: #2e9c6a22; color: #2e9c6a; }
.wc-spk { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 15px; }
.wc-when { font-size: 13px; color: var(--text); line-height: 1.5; margin-top: 5px; }
.wc-collo { font-size: 12px; color: var(--muted); margin-top: 4px; }
.wc-ex { font-size: 12.5px; color: var(--muted); margin-top: 4px; font-style: italic; }
.wc-ex-th { font-style: normal; }
.wc-tip { margin-top: 6px; padding: 11px 14px; border-radius: 12px; background: var(--accent-soft);
  font-size: 13px; color: var(--text); line-height: 1.5; }
.wc-tip-h { font-size: 12px; font-weight: 800; color: var(--accent-ink); margin-bottom: 4px; }
.wc-games { margin-top: 14px; }
.wc-games-h { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
.wc-games-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.wc-gbtn { border: 1px solid var(--border); background: var(--surface); color: var(--text);
  font-family: var(--font); font-weight: 700; font-size: 13px; border-radius: 12px; padding: 12px 8px; cursor: pointer; }
.wc-gbtn:active { background: var(--surface2); }

/* ---- games ---- */
.wc-gcluster { font-size: 13px; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 8px; }
.wc-ghint { font-size: 12.5px; color: var(--muted); text-align: center; margin-bottom: 10px; }
.wc-gprog, .wc-gwin { text-align: center; font-size: 13px; margin: 6px 0; }
.wc-gwin { font-weight: 800; color: var(--accent); font-size: 15px; margin: 14px 0; }
.wc-match { display: flex; gap: 8px; }
.wc-mcol { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.wc-mw, .wc-mn { border: 1px solid var(--border); background: var(--surface); color: var(--text);
  font-family: var(--font); border-radius: 10px; padding: 10px; cursor: pointer; font-size: 13px; text-align: left; }
.wc-mw { font-weight: 800; text-align: center; }
.wc-sel { border-color: var(--accent); background: var(--accent-soft); }
.wc-ok { background: #2e9c6a22; border-color: #2e9c6a; color: #2e9c6a; }
.wc-bad { background: #d0453a22; color: #d0453a; }
.wc-shake { animation: wcshake .3s; }
@keyframes wcshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.wc-qsent { font-size: 16px; font-weight: 600; color: var(--text); text-align: center; margin: 10px 0 14px; line-height: 1.5; }
.wc-opts { display: flex; flex-direction: column; gap: 8px; }
.wc-opt { border: 1px solid var(--border); background: var(--surface); color: var(--text);
  font-family: var(--font); font-weight: 700; border-radius: 12px; padding: 12px; cursor: pointer; font-size: 15px; }
.wc-correct { background: #2e9c6a22; border-color: #2e9c6a; color: #2e9c6a; }
.wc-wrong { background: #d0453a22; border-color: #d0453a; color: #d0453a; }
.wc-dim { opacity: .5; }
.wc-fb { text-align: center; font-weight: 800; margin: 12px 0 6px; }
.wc-fb-ok { color: #2e9c6a; } .wc-fb-no { color: #d0453a; }
.wc-why { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.5; margin-bottom: 6px; }
.wc-answer { font-size: 12.5px; color: var(--muted); text-align: center; margin: 6px 0; }
.wc-next { display: block; width: 100%; border: none; border-radius: 12px; cursor: pointer;
  background: var(--accent); color: var(--accent-ink); font-family: var(--font); font-weight: 800; font-size: 15px; padding: 11px; margin-top: 8px; }
.wc-tagwords { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 12px; }
.wc-tw { border: 1px solid var(--border); background: var(--surface); color: var(--text);
  font-family: var(--font); font-weight: 800; border-radius: 999px; padding: 8px 14px; cursor: pointer; font-size: 14px; }
.wc-done { opacity: .35; }
.wc-tagbuckets { display: flex; gap: 8px; }
.wc-bucket { flex: 1; min-height: 70px; border: 1px dashed var(--border); border-radius: 12px; padding: 8px; cursor: pointer; }
.wc-bucket-h { font-size: 11px; font-weight: 800; color: var(--muted); text-align: center; margin-bottom: 6px; }
.wc-chip { display: inline-block; font-size: 12px; border-radius: 999px; padding: 2px 8px; margin: 2px; }
.wc-rankslot { display: flex; flex-wrap: wrap; gap: 6px; min-height: 40px; padding: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; }
.wc-rchip { font-size: 13px; font-weight: 700; color: var(--accent-ink); background: var(--accent); border-radius: 999px; padding: 4px 11px; }
.wc-rankpool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.wc-rw { border: 1px solid var(--border); background: var(--surface); color: var(--text);
  font-family: var(--font); font-weight: 800; border-radius: 999px; padding: 9px 15px; cursor: pointer; font-size: 15px; }

/* hide the deck search/filter bar while on this tab */
.mode-wordchoice .row2, .mode-wordchoice #filters { display: none; }

/* examprep.css */
/* examprep.css — "ติวสอบ" tab: Speaking + Writing */
.ex-wrap { padding: 4px 2px 12px; }
.ex-hero { font-size: 20px; font-weight: 900; text-align: center; color: var(--accent); margin: 8px 0 16px; }
.ex-home-card { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; cursor: pointer;
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 16px;
  margin-bottom: 12px; color: var(--text); font-family: var(--font); box-shadow: var(--shadow); }
.ex-home-card:active { background: var(--surface2); }
.ex-hc-i { font-size: 30px; }
.ex-hc-t { font-size: 18px; font-weight: 800; }
.ex-hc-d { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

.ex-bar { display: flex; align-items: center; gap: 10px; margin: 2px 2px 8px; }
.ex-back { background: none; border: none; color: var(--accent); font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer; padding: 4px 2px; }
.ex-title { font-size: 16px; font-weight: 800; color: var(--text); }
.ex-intro { font-size: 12.5px; color: var(--muted); margin: 4px 4px 12px; line-height: 1.5; }

.ex-subs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.ex-sub { border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--font);
  font-weight: 700; font-size: 13.5px; border-radius: 999px; padding: 8px 16px; cursor: pointer; }
.ex-sub.on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

.ex-topic { font-size: 14px; font-weight: 800; color: var(--accent); margin: 14px 2px 8px; }
.ex-topic span { color: var(--muted); font-weight: 500; }
.ex-qa { border: 1px solid var(--border); background: var(--surface); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; }
.ex-q { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.ex-reveal { width: 100%; text-align: left; border: 1px dashed var(--border); background: var(--surface2); color: var(--muted);
  font-family: var(--font); font-size: 13.5px; border-radius: 10px; padding: 10px 12px; cursor: pointer; line-height: 1.55; }
.ex-reveal:active { transform: scale(.995); }
.ex-reveal-big { border-style: solid; background: var(--accent-soft); color: var(--accent-ink); font-weight: 700; text-align: center; margin: 4px 0 12px; }

.ex-cue { display: block; width: 100%; text-align: left; cursor: pointer; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 8px; color: var(--text);
  font-family: var(--font); font-weight: 700; font-size: 14px; }
.ex-cue:active { background: var(--surface2); }
.ex-cuecard { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.ex-cue-t { font-size: 16px; font-weight: 800; color: var(--text); }
.ex-cue-say { font-size: 12px; color: var(--muted); margin: 8px 0 4px; }
.ex-cuecard ul { margin: 0; padding-left: 20px; }
.ex-cuecard li { font-size: 13.5px; color: var(--text); line-height: 1.7; }

.ex-spk { background: none; border: none; cursor: pointer; font-size: 14px; vertical-align: middle; }
.ex-phrasebox, .ex-pgroup { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; margin-top: 10px; }
.ex-ph-h, .ex-pgroup-h { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
.ex-ph { display: flex; flex-direction: column; padding: 5px 0; border-top: 1px solid var(--border); }
.ex-ph:first-of-type { border-top: none; }
.ex-ph-en { font-size: 13.5px; font-weight: 700; color: var(--text); }
.ex-ph-th { font-size: 12px; color: var(--muted); }

.ex-sec-h { font-size: 13px; font-weight: 800; color: var(--accent); margin: 16px 2px 8px; }
.ex-step { border-left: 3px solid var(--accent); background: var(--surface); border-radius: 0 10px 10px 0; padding: 9px 12px; margin-bottom: 8px; }
.ex-step-h { font-size: 13.5px; font-weight: 800; color: var(--text); }
.ex-step-d { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.ex-sample { border: 1px solid var(--border); background: var(--surface); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
.ex-sample-t { font-size: 14px; font-weight: 800; color: var(--text); }
.ex-sample-p { font-size: 12.5px; color: var(--muted); margin: 5px 0 8px; line-height: 1.5; }
.ex-essay { font-size: 13.5px; color: var(--text); line-height: 1.7; margin-top: 8px; }

/* ---------------- Reading ---------------- */
.rd-band { display:inline-block; font-size:11px; font-weight:800; color:var(--accent-ink); background:var(--accent-soft); border-radius:999px; padding:2px 9px; white-space:nowrap; }
.rd-card { display:block; width:100%; text-align:left; cursor:pointer; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:13px 15px; margin-bottom:9px; color:var(--text); font-family:var(--font); box-shadow:var(--shadow); }
.rd-card:active { background:var(--surface2); }
.rd-card-top { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.rd-card-topic { font-size:11.5px; color:var(--muted); font-weight:600; }
.rd-card-t { font-size:15px; font-weight:800; line-height:1.3; }
.rd-card-m { font-size:11.5px; color:var(--muted); margin-top:4px; }

.rd-head { display:flex; align-items:center; gap:9px; margin:2px 2px 6px; }
.rd-htopic { font-size:12px; color:var(--muted); font-weight:600; }
.rd-title { font-size:18px; font-weight:900; color:var(--text); margin:0 2px 10px; line-height:1.25; }
.rd-passage { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; box-shadow:var(--shadow); }
.rd-para { font-size:14.5px; line-height:1.75; color:var(--text); margin:0 0 11px; }
.rd-para:last-child { margin-bottom:0; }
.rd-plab { display:inline-grid; place-items:center; width:20px; height:20px; border-radius:6px; background:var(--accent-soft); color:var(--accent-ink); font-size:12px; font-weight:900; vertical-align:1px; margin-right:2px; }

.rd-score { display:flex; align-items:baseline; gap:12px; justify-content:center; background:var(--accent-soft); border:1px solid var(--border); border-radius:14px; padding:12px; margin:16px 0; }
.rd-score b { font-size:26px; font-weight:900; color:var(--accent-ink); }
.rd-score span { font-size:13px; color:var(--accent-ink); font-weight:700; }

.rd-qs { margin-top:16px; }
.rd-q { border:1px solid var(--border); background:var(--surface); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
.rd-q.ok { border-color:var(--know); }
.rd-q.bad { border-color:#d9534f; }
.rd-qn { font-size:11.5px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; }
.rd-qn span { color:var(--accent); }
.rd-mk { float:right; font-size:15px; }
.rd-mk.ok { color:var(--know); }
.rd-mk.bad { color:#d9534f; }
.rd-qtext { font-size:14px; font-weight:600; color:var(--text); margin:6px 0 10px; line-height:1.5; }
.rd-opts { display:flex; flex-direction:column; gap:7px; }
.rd-opt { text-align:left; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:var(--font); font-size:13.5px; border-radius:9px; padding:9px 12px; cursor:pointer; }
.rd-opt.sel { border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink); font-weight:700; }
.rd-opt.ans { border-color:var(--know); background:var(--know-soft,rgba(46,139,100,.12)); color:var(--text); font-weight:700; }
.rd-opt.wrong { border-color:#d9534f; background:rgba(217,83,79,.12); }
.rd-gap { width:100%; font-family:var(--font); font-size:14px; padding:9px 12px; border:1px solid var(--border); border-radius:9px; background:var(--surface2); color:var(--text); }
.rd-gap:disabled { opacity:.85; }
.rd-fb { margin-top:10px; border-top:1px dashed var(--border); padding-top:9px; }
.rd-ans { font-size:13px; color:var(--text); }
.rd-ans b { color:var(--accent); }
.rd-why { font-size:12.5px; color:var(--muted); margin-top:4px; line-height:1.5; }
.rd-ev { font-size:12.5px; color:var(--text); background:var(--accent-soft); border-radius:8px; padding:7px 10px; margin-top:7px; line-height:1.5; }
.rd-submit { width:100%; margin-top:14px; font-family:var(--font); font-size:15px; font-weight:800; border:none; background:var(--accent); color:var(--accent-ink); border-radius:12px; padding:13px; cursor:pointer; }
.rd-submit:active { transform:scale(.99); }

/* ---------------- Writing Lab ---------------- */

/* a11y.css */
/* PT.a11y — accessibility CSS: focus rings, touch targets, reduced motion.
   Prefixed with ".a-" per module convention. Uses only the frozen
   CSS custom properties (--accent, --surface, --border, etc). */

/* Visible focus ring on anything the a11y pass makes focusable, plus
   general keyboard-focus visibility across the app (safe, additive). */
.a-focus-ring,
#tabbar [role="tab"]:focus-visible,
#filters [role="button"]:focus-visible,
#sheet :focus-visible,
.c-card:focus-visible,
[class*="c-card"]:focus-visible,
button:focus-visible,
a:focus-visible,
[role="button"]:focus-visible,
[tabindex]:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 6px;
}

/* Fallback for browsers without :focus-visible support */
#tabbar [role="tab"]:focus,
#filters [role="button"]:focus,
button:focus,
[role="button"]:focus {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Minimum 44x44px touch targets for interactive controls. */
#tabbar [role="tab"],
#filters [role="button"],
.a-touch,
button,
[role="button"] {
  min-width: 44px;
  min-height: 44px;
}

/* Icon-only buttons (theme toggle, speaker, close) — ensure comfortable
   tap area even if visual glyph is small. */
#theme,
[data-speak],
.c-speak,
.speak,
button[class*="speak"],
[data-close],
.close,
button[class*="close"] {
  min-width: 44px;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* Respect prefers-reduced-motion: host toggles .a-reduced-motion on the
   root element; also honor the media query directly as a fallback. */
.a-reduced-motion,
.a-reduced-motion * {
  animation-duration: 0.001ms !important;
  animation-iteration-count: 1 !important;
  transition-duration: 0.001ms !important;
  scroll-behavior: auto !important;
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

/* Dialog (bottom sheet) should sit above content and read clearly against
   the dimmed background in both themes. */
#sheet[role="dialog"] {
  background: var(--surface);
  color: var(--text);
}

#sheetbg[aria-hidden="true"] {
  pointer-events: auto;
}

/* theme.css */
/* =========================================================================
   POCKET TUTOR v2 — theme.css
   Visual polish only. No behavior. Uses ONLY the frozen custom properties:
   --bg --surface --surface2 --text --muted --border --accent --accent-ink
   --accent-soft --know --review --g0 --g1 --g2 --g3 --g4 --shadow --font
   Marigold accent + warm-indigo neutrals. Calm, generous, mobile-first.
   ========================================================================= */

/* -------------------------------------------------------------------------
   0. Base / shell
   ------------------------------------------------------------------------- */

html {
  -webkit-text-size-adjust: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Top bar: deck select + search + theme toggle live here */
#topbar,
.pt-topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: calc(0.6rem + env(safe-area-inset-top, 0px)) 0.75rem 0.6rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 10px var(--shadow);
  backdrop-filter: saturate(1.2) blur(8px);
}

#deckwrap {
  flex: 1 1 auto;
  min-width: 0;
}

#deckwrap select {
  width: 100%;
  min-height: 44px;
  padding: 0.55rem 2.1rem 0.55rem 0.9rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background:
    linear-gradient(var(--surface2), var(--surface2))
      padding-box,
    none;
  color: var(--text);
  font: inherit;
  font-weight: 600;
  font-size: 0.95rem;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23a8a29e' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
  background-repeat: no-repeat;
  background-position: right 0.85rem center;
  cursor: pointer;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
}

#deckwrap select:focus-visible,
#deckwrap select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

#deckwrap select:active {
  transform: scale(0.99);
}

#q {
  flex: 1 1 auto;
  min-width: 0;
  min-height: 44px;
  padding: 0.55rem 0.95rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  font-size: 0.95rem;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}

#q::placeholder {
  color: var(--muted);
}

#q:focus-visible,
#q:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

#theme {
  flex: 0 0 auto;
  width: 44px;
  height: 44px;
  min-width: 44px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 1.15rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
}

#theme:hover {
  border-color: var(--accent);
}

#theme:active {
  transform: scale(0.92) rotate(-8deg);
}

/* Main content host */
#view {
  padding: 0.85rem 0.85rem calc(5.5rem + env(safe-area-inset-bottom, 0px));
  width: 100%;               /* flex-item auto margins would otherwise shrink it to content */
  max-width: 720px;
  margin: 0 auto;
  min-height: 60vh;
}

/* Filters host under the top bar */
#filters {
  position: sticky;
  top: calc(3.6rem + env(safe-area-inset-top, 0px));
  z-index: 30;
  background: var(--bg);
  padding: 0.55rem 0.85rem 0.35rem;
  border-bottom: 1px solid transparent;
}

/* -------------------------------------------------------------------------
   1. Bottom tab bar (#tabbar)
   ------------------------------------------------------------------------- */

#tabbar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 50;
  display: flex;
  gap: 0.25rem;
  padding: 0.4rem 0.5rem calc(0.4rem + env(safe-area-inset-bottom, 0px));
  background: var(--surface);
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 12px var(--shadow);
}

#tabbar button,
#tabbar .tab {
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.15rem;
  min-height: 52px;
  padding: 0.3rem 0.2rem;
  border: none;
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 0.72rem;
  font-weight: 600;
  border-radius: 14px;
  cursor: pointer;
  transition: color 0.15s ease, background 0.15s ease, transform 0.12s ease;
}

#tabbar button[aria-selected="true"],
#tabbar .tab.active,
#tabbar .tab[aria-current="page"] {
  color: var(--accent-ink);
  background: var(--accent-soft);
}

#tabbar button:active,
#tabbar .tab:active {
  transform: scale(0.94);
}

/* -------------------------------------------------------------------------
   2. Filters — ".f-"
   ------------------------------------------------------------------------- */

.f-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0.3rem 0.05rem;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.f-row::-webkit-scrollbar {
  display: none;
}

.f-label {
  flex: 0 0 auto;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  padding-right: 0.15rem;
}

.f-chip,
.f-pill {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  min-height: 36px;
  padding: 0.4rem 0.85rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  white-space: nowrap;
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.1s ease;
}

.f-chip:active,
.f-pill:active {
  transform: scale(0.96);
}

.f-chip.f-active,
.f-pill.f-active,
.f-chip[aria-pressed="true"],
.f-pill[aria-pressed="true"] {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-ink);
  box-shadow: 0 2px 8px var(--shadow);
}

.f-chip .f-dot,
.f-pill .f-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex: 0 0 auto;
  background: currentColor;
}

.f-chip-clear,
.f-clear {
  flex: 0 0 auto;
  min-height: 36px;
  padding: 0.4rem 0.7rem;
  border-radius: 999px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
}

.f-chip-clear:hover,
.f-clear:hover {
  color: var(--review);
  border-color: var(--review);
}

.f-sortbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  padding: 0.35rem 0.05rem 0.1rem;
}

.f-count {
  font-size: 0.8rem;
  color: var(--muted);
}

.f-select,
.f-sort select {
  min-height: 40px;
  padding: 0.35rem 1.8rem 0.35rem 0.7rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  font-size: 0.85rem;
}

/* -------------------------------------------------------------------------
   3. Browse / pager — ".pg-"
   ------------------------------------------------------------------------- */

.pg-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-top: 0.5rem;
}

.pg-item,
.pg-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.8rem 0.9rem;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: 0 1px 4px var(--shadow);
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.15s ease, border-color 0.15s ease;
}

.pg-item:hover,
.pg-row:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 14px var(--shadow);
}

.pg-item:active,
.pg-row:active {
  transform: scale(0.99);
}

.pg-main {
  flex: 1 1 auto;
  min-width: 0;
}

.pg-word {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.pg-pos {
  display: inline-block;
  margin-left: 0.4rem;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--muted);
  font-style: italic;
}

.pg-meaning {
  margin-top: 0.15rem;
  font-size: 0.85rem;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.pg-group {
  flex: 0 0 auto;
  min-width: 2.2rem;
  text-align: center;
  padding: 0.2rem 0.5rem;
  border-radius: 8px;
  font-size: 0.72rem;
  font-weight: 800;
  color: #241a05;
  background: var(--g0);
}

.pg-status {
  flex: 0 0 auto;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border);
}

.pg-status.pg-status-new { background: var(--g2); }
.pg-status.pg-status-learning { background: var(--accent); }
.pg-status.pg-status-due { background: var(--review); }
.pg-status.pg-status-known { background: var(--know); }

.pg-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}

.pg-pagination,
.pg-pager {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin: 1.1rem 0 0.4rem;
}

.pg-btn {
  min-width: 44px;
  min-height: 44px;
  padding: 0.5rem 0.9rem;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font: inherit;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
}

.pg-btn:hover:not(:disabled) {
  border-color: var(--accent);
}

.pg-btn:active:not(:disabled) {
  transform: scale(0.95);
}

.pg-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.pg-btn.pg-current,
.pg-btn[aria-current="true"] {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-ink);
}

.pg-pageinfo {
  font-size: 0.85rem;
  color: var(--muted);
  min-width: 4rem;
  text-align: center;
}

/* -------------------------------------------------------------------------
   4. Cards / flip — ".c-"
   ------------------------------------------------------------------------- */

.c-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 0.5rem;
}

.c-progress {
  width: 100%;
  height: 6px;
  border-radius: 999px;
  background: var(--surface2);
  overflow: hidden;
  margin-bottom: 0.9rem;
}

.c-progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width 0.25s ease;
}

.c-cardwrap {
  width: 100%;
  max-width: 480px;
  perspective: 1400px;
  margin: 0 auto;
}

.c-card {
  position: relative;
  width: 100%;
  min-height: 300px;
  border-radius: 22px;
  cursor: pointer;
  /* perspective container must stay flat; only .c-inner rotates in 3D */
}

.c-card.c-flipped {
  transform: rotateY(180deg);
}

.c-face {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.7rem;
  padding: 1.6rem 1.4rem;
  border-radius: 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: 0 10px 30px var(--shadow);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  text-align: center;
}

.c-front {
  transform: rotateY(0deg);
}

.c-back {
  transform: rotateY(180deg);
  align-items: stretch;
  justify-content: flex-start;
  text-align: left;
  overflow-y: auto;
}

.c-word {
  font-size: 1.7rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1.25;
}

.c-word.c-size-lg { font-size: 2.1rem; }
.c-word.c-size-sm { font-size: 1.3rem; }

/* Long text (full sentences): shrink the front word so it doesn't overflow. */
.c-word.c-word-long { font-size: 1.2rem; font-weight: 700; line-height: 1.4; }
.c-word.c-word-long.c-size-lg { font-size: 1.4rem; }
.c-word.c-word-long.c-size-sm { font-size: 1.02rem; }
.c-b-word.c-b-word-long { font-size: 15px; font-weight: 600; line-height: 1.4; }

/* Favorite (⭐) star on the card back */
.c-b-head .c-fav { margin-left: auto; background: none; border: none; color: var(--muted);
  font-size: 22px; line-height: 1; cursor: pointer; padding: 0 2px; }
.c-b-head .c-fav.on { color: var(--accent); }
.c-b-head .c-speak { margin-left: 0; }

/* Daily streak + goal widget (Stats) */
.s-streak { display: flex; gap: 12px; align-items: stretch; margin: 2px 2px 14px; }
.s-fire { flex: 0 0 auto; display: flex; flex-direction: column; justify-content: center;
  align-items: center; background: var(--accent-soft); color: var(--accent-ink);
  border-radius: 14px; padding: 10px 18px; font-size: 24px; font-weight: 900; }
.s-fire span { font-size: 11px; font-weight: 700; opacity: .82; }
.s-goal { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center;
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; }
.s-goal-h { display: flex; justify-content: space-between; gap: 8px; font-size: 12px;
  color: var(--muted); margin-bottom: 7px; }
.s-gbar { height: 8px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
.s-gbar > i { display: block; height: 100%; background: var(--accent); border-radius: 999px; }

/* Quiz — Listen / dictation sub-mode */
.qz-listen { text-align: center; }
.qz-bigsay { display: block; margin: 8px auto 6px; width: 92px; height: 92px; border-radius: 50%;
  border: none; background: var(--accent-soft); color: var(--accent); font-size: 42px; cursor: pointer; }
.qz-bigsay:active { transform: scale(.94); }
.qz-hint { font-size: 12px; color: var(--muted); }
.qz-reveal-th { color: var(--muted); font-weight: 400; }

/* Quiz — Cloze (fill-in-the-blank) sub-mode */
.qz-cloze { text-align: left; }
.qz-clsent { font-size: 17px; font-weight: 600; line-height: 1.5; color: var(--text); }
.qz-clth { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.45; }
.qz-clhint { font-size: 12px; color: var(--accent); margin-top: 8px; }
.qz-clfull { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
.qz-clfull .qz-say { background: none; border: none; cursor: pointer; font-size: 15px; padding: 0 2px; vertical-align: middle; }

/* Enrichment: IPA + synonyms / antonyms */
.pg-sh-ipa { font-size: 14px; color: var(--muted); margin: -2px 0 8px; font-family: "Times New Roman", Georgia, serif; }
.c-b-ipa { color: var(--muted); font-style: normal; font-family: "Times New Roman", Georgia, serif; }
.c-b-syn { font-size: 12.5px; color: var(--muted); margin-top: 6px; }
.c-b-ant { color: var(--muted); }

/* Speaker button next to the headword in the detail sheet */
.pg-sh-say { background: var(--accent-soft); border-radius: 8px; padding: 2px 9px; font-size: 16px; margin-left: 6px; }
.pg-sh-say:active { transform: scale(.92); }

/* Knowledge deck: "what it is" box + academic usage */
.pg-sh-know { margin: 12px 0 6px; padding: 12px 14px; border-radius: 12px;
  background: var(--accent-soft); border: 1px solid var(--border); }
.pg-sh-know-h { font-size: 12px; font-weight: 800; color: var(--accent-ink); margin-bottom: 6px; }
.pg-sh-know-en { font-size: 13.5px; color: var(--text); line-height: 1.5; }
.pg-sh-know-th { font-size: 13px; color: var(--muted); line-height: 1.5; margin-top: 4px; }
.pg-sh-aca { margin-top: 12px; }
.pg-sh-aca-h { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em;
  color: var(--accent); margin-bottom: 6px; }

/* "วันนี้" (Today) summary panel atop Browse */
.td-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 12px 14px; margin: 2px 2px 12px; box-shadow: var(--shadow); }
.td-hi { display: flex; justify-content: space-between; gap: 8px; font-size: 12.5px;
  font-weight: 700; color: var(--muted); margin-bottom: 10px; }
.td-hi span:first-child { color: var(--accent); }
.td-row { display: flex; gap: 8px; margin-bottom: 10px; }
.td-chip { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  padding: 9px 4px; cursor: pointer; font-family: var(--font); color: var(--text); }
.td-chip:active { transform: scale(.97); }
.td-chip b { font-size: 20px; font-weight: 900; }
.td-chip span { font-size: 11px; color: var(--muted); }
.td-start { display: block; width: 100%; border: none; border-radius: 12px; cursor: pointer;
  background: var(--accent); color: var(--accent-ink); font-family: var(--font);
  font-size: 15px; font-weight: 800; padding: 11px; }
.td-start:active { transform: scale(.99); }

/* Backup / restore section (Stats) */
.s-backup { margin: 18px 2px 4px; padding: 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 14px; }
.s-bk-h { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.s-bk-sub { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
.s-bk-row, .s-bk-row2 { display: flex; gap: 8px; }
.s-bk-row2 { margin-top: 8px; align-items: center; flex-wrap: wrap; }
.s-bk-btn { flex: 1; border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: var(--font); font-size: 13.5px; font-weight: 700;
  border-radius: 10px; padding: 10px; cursor: pointer; }
.s-bk-btn:active { transform: scale(.98); }
.s-bk-go { flex: 0 0 auto; background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.s-bk-ta { width: 100%; margin-top: 8px; min-height: 70px; resize: vertical; font-size: 11px;
  font-family: ui-monospace, Menlo, Consolas, monospace; border: 1px solid var(--border);
  border-radius: 10px; padding: 8px; background: var(--bg); color: var(--text); box-sizing: border-box; }
.s-bk-file, #s-bk-file { flex: 1; font-size: 12px; color: var(--muted); min-width: 0; }
.s-bk-msg { font-size: 11.5px; color: var(--accent); margin-top: 8px; line-height: 1.5; }

.c-pos {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--muted);
  font-style: italic;
}

.c-group-badge {
  position: absolute;
  top: 0.85rem;
  left: 0.85rem;
  padding: 0.2rem 0.55rem;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 800;
  color: #241a05;
  background: var(--g1);
}

.c-speak {
  position: absolute;
  top: 0.7rem;
  right: 0.7rem;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 1.05rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.c-speak:active {
  transform: scale(0.9);
}

.c-meaning {
  font-size: 1.1rem;
  color: var(--text);
  line-height: 1.5;
}

.c-thai {
  font-size: 1rem;
  color: var(--accent-ink);
  font-weight: 600;
}

.c-example {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.5;
  border-top: 1px dashed var(--border);
  padding-top: 0.6rem;
  margin-top: 0.2rem;
}

.c-note {
  font-size: 0.8rem;
  color: var(--muted);
  background: var(--surface2);
  border-radius: 10px;
  padding: 0.5rem 0.7rem;
}

.c-hint {
  position: absolute;
  bottom: 0.7rem;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
  opacity: 0.75;
}

.c-controls {
  display: flex;
  gap: 0.6rem;
  margin-top: 1.1rem;
  width: 100%;
  max-width: 480px;
}

.c-rate {
  flex: 1 1 0;
  min-height: 56px;
  border-radius: 16px;
  border: none;
  font: inherit;
  font-weight: 800;
  font-size: 0.85rem;
  color: #fff;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.15rem;
  transition: transform 0.12s ease, filter 0.15s ease;
}

.c-rate:active {
  transform: scale(0.95);
}

.c-rate .c-rate-iv {
  font-size: 0.7rem;
  font-weight: 600;
  opacity: 0.85;
}

.c-rate-again {
  background: var(--review);
}

.c-rate-hard {
  background: var(--muted);
  color: var(--text);
}

.c-rate-good {
  background: var(--know);
}

.c-rate-easy {
  background: var(--accent);
  color: var(--accent-ink);
}

.c-rate:hover {
  filter: brightness(1.06);
}

.c-skipbar {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-top: 0.7rem;
}

.c-skipbar button,
.c-link {
  min-height: 44px;
  padding: 0.3rem 0.6rem;
  border: none;
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 0.82rem;
  font-weight: 600;
  text-decoration: underline;
  cursor: pointer;
}

.c-done {
  text-align: center;
  padding: 3rem 1rem;
}

.c-done .c-done-title {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 0.4rem;
}

/* -------------------------------------------------------------------------
   5. Quiz — ".qz-"
   ------------------------------------------------------------------------- */

.qz-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;

.qz-progress {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
}

.qz-score {

  font-weight: 700;
  color: var(--accent-ink);
  background: var(--accent-soft);

}

.qz-card {

.qz-prompt-label {

  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 0.3rem;
}

.qz-prompt {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1.35;
}

.qz-sub {
  margin-top: 0.3rem;
  font-size: 0.9rem;
  color: var(--muted);
}

.qz-options {
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  margin-top: 1.1rem;
}

.qz-option {
  min-height: 48px;
  padding: 0.7rem 1rem;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
}

.qz-option:active {
  transform: scale(0.99);
}

.qz-option.qz-selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.qz-option.qz-correct {
  border-color: var(--know);
  background: color-mix(in srgb, var(--know) 18%, var(--surface));
  color: var(--know);
}

.qz-option.qz-incorrect {
  border-color: var(--review);
  background: color-mix(in srgb, var(--review) 18%, var(--surface));
  color: var(--review);
}

.qz-option:disabled {
  cursor: default;
  opacity: 0.85;
}

.qz-input {
  width: 100%;
  min-height: 48px;
  margin-top: 1.1rem;
  padding: 0.7rem 1rem;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  font-size: 1rem;
  text-align: center;
}

.qz-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.qz-feedback {
  margin-top: 0.9rem;
  padding: 0.6rem 0.8rem;
  border-radius: 12px;
  font-size: 0.88rem;
  font-weight: 700;
}

.qz-feedback.qz-good {
  background: color-mix(in srgb, var(--know) 16%, transparent);
  color: var(--know);
}

.qz-feedback.qz-bad {
  background: color-mix(in srgb, var(--review) 16%, transparent);
  color: var(--review);
}

.qz-actions {
  display: flex;
  gap: 0.6rem;
  margin-top: 1.2rem;
}

.qz-btn {
  flex: 1 1 0;
  min-height: 50px;
  border-radius: 14px;
  border: none;
  background: var(--accent);
  color: var(--accent-ink);
  font: inherit;
  font-weight: 800;
  font-size: 0.95rem;
  cursor: pointer;

.qz-btn:active {

.qz-btn.qz-ghost {

  border: 1px solid var(--border);
  box-shadow: 0 1px 4px var(--shadow);
}

  font-weight: 800;
  color: var(--text);
}

.s-card-label {

  color: var(--muted);
  margin-top: 0.15rem;
}

.s-card.s-accent .s-card-num { color: var(--accent-ink); }
.s-card.s-know .s-card-num { color: var(--know); }
.s-card.s-review .s-card-num { color: var(--review); }

}

.s-section-title {
  font-size: 0.85rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.s-bar-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.45rem;
}

.s-bar-label {

  font-size: 0.78rem;
  color: var(--muted);
  text-align: right;
}

.s-bar-track {

  height: 12px;
  border-radius: 999px;
  background: var(--surface2);
  overflow: hidden;
}

.s-bar-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--accent);

}

.s-bar-fill.s-fill-know { background: var(--know); }
.s-bar-fill.s-fill-review { background: var(--review); }

.s-bar-value {
  flex: 0 0 2.4rem;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text);
}

  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 0.4rem;
}

.s-heat-cell {

  border-radius: 5px;
  background: var(--surface2);
}

.s-heat-cell.s-heat-1 { background: var(--accent-soft); }

.s-streak {

  align-items: baseline;
  gap: 0.4rem;
  margin-top: 0.3rem;
}

.s-streak-num {
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent-ink);
}

.s-streak-label {
  font-size: 0.85rem;
  color: var(--muted);
}

/* -------------------------------------------------------------------------
   7. Settings — ".set-"
   ------------------------------------------------------------------------- */

.set-group {
  margin-top: 1.1rem;
}

.set-group-title {
  font-size: 0.85rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

.set-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  min-height: 56px;
  padding: 0.7rem 0.9rem;
  border-radius: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 0.5rem;
}

.set-row-label {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text);
}

.set-row-desc {
  font-size: 0.76rem;
  color: var(--muted);
  margin-top: 0.1rem;
}

.set-input,
.set-row input[type="number"],
.set-row input[type="text"] {
  width: 4.5rem;
  min-height: 40px;
  padding: 0.4rem 0.5rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  text-align: center;
}

.set-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.set-toggle {

  height: 28px;
  border-radius: 999px;
  background: var(--border);
  border: none;
  cursor: pointer;
  flex: 0 0 auto;
  transition: background 0.2s ease;
}

.set-toggle::after {
  content: "";
  position: absolute;
  top: 3px;
  left: 3px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--surface);
  box-shadow: 0 1px 3px var(--shadow);
  transition: transform 0.2s ease;
}

.set-toggle.set-on {
  background: var(--accent);
}

.set-toggle.set-on::after {
  transform: translateX(20px);
}

.set-btn {
  min-height: 48px;
  padding: 0.6rem 1rem;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font: inherit;
  font-weight: 700;
  cursor: pointer;
}

.set-btn.set-danger {
  border-color: var(--review);
  color: var(--review);
}

.set-btn.set-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-ink);
}

   ------------------------------------------------------------------------- */

.a-sr-only {

  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.a-skip-link {
  position: absolute;
  top: -100px;
  left: 0.5rem;
  z-index: 100;
  padding: 0.6rem 1rem;
  border-radius: 10px;
  background: var(--accent);
  color: var(--accent-ink);
  font-weight: 700;
  text-decoration: none;
  transition: top 0.15s ease;

.a-skip-link:focus {
  top: 0.5rem;

/* -------------------------------------------------------------------------

   ------------------------------------------------------------------------- */

#sheetbg {
  position: fixed;
  inset: 0;
  z-index: 60;
  background: rgba(20, 14, 4, 0.45);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s ease, visibility 0.2s ease;
}

#sheetbg.open,
#sheetbg.show {
  opacity: 1;
  visibility: visible;
}

#sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 61;
  max-height: 86vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  box-shadow: 0 -12px 40px var(--shadow);
  padding: 0.6rem 1.1rem calc(1.4rem + env(safe-area-inset-bottom, 0px));
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.2, 0.7, 0.3, 1);
}

#sheet.open,
#sheet.show {
  transform: translateY(0);
}

#sheet::before {
  content: "";
  display: block;
  width: 42px;
  height: 5px;
  margin: 0.5rem auto 0.9rem;
  border-radius: 999px;
  background: var(--border);
}

#sheet .sheet-title,
#sheet h2,
#sheet h3 {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 0.2rem;
}

#sheet .sheet-close {
  position: absolute;
  top: 0.6rem;
  right: 0.7rem;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 1.1rem;
  cursor: pointer;
}

/* -------------------------------------------------------------------------
   10. Group color legend (shared) — maps g0..g4 to level dots/badges
   ------------------------------------------------------------------------- */

.pg-group[data-gi="0"], .c-group-badge[data-gi="0"] { background: var(--g0); }
.pg-group[data-gi="1"], .c-group-badge[data-gi="1"] { background: var(--g1); }

.pg-group[data-gi="3"], .c-group-badge[data-gi="3"] { background: var(--g3); }
.pg-group[data-gi="4"], .c-group-badge[data-gi="4"] { background: var(--g4); }

/* -------------------------------------------------------------------------
   11. Motion & touch-target safety
   ------------------------------------------------------------------------- */

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }

  .c-card {
    transition: none;
  }
}

button,
select,
.f-chip,
.f-pill,
.pg-btn,

.qz-option,
.qz-btn,
.set-btn,
.set-toggle {
  min-height: 44px;
  touch-action: manipulation;

/* -------------------------------------------------------------------------

   ------------------------------------------------------------------------- */

@media (max-width: 360px) {
  #view {
    padding-left: 0.6rem;
    padding-right: 0.6rem;
  }

  .c-word {
    font-size: 1.45rem;
  }

  .s-grid {
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
}

(function () {
  "use strict";
  window.PT = window.PT || {};

  /* ---------------------------------------------------------------- POS */
  var pos = {};
  /* bit order MUST match LABELS order */
  pos.LABELS = ["noun", "verb", "adjective", "adverb", "other"];

  /* token -> bucket name. The p string is split on , / + . and spaces,
     so multi-word tags reduce to constituent tokens (e.g. "modal v" ->
     "modal","v"; "past participle" -> "past","participle"). We map the
     meaningful constituents. */

    n: "noun", noun: "noun",
    v: "verb", verb: "verb", modal: "verb", auxiliary: "verb", aux: "verb",
    adj: "adjective", adjective: "adjective", participle: "adjective",
    adv: "adverb", adverb: "adverb",
    prep: "other", preposition: "other",
    pron: "other", pronoun: "other",
    conj: "other", conjunction: "other",
    det: "other", determiner: "other",
    exclam: "other", exclamation: "other", interjection: "other",
    number: "other", numeral: "other",
    article: "other", indefinite: "other", definite: "other", phrase: "other"
  };

  function bitOf(bucket) {
    for (var i = 0; i < pos.LABELS.length; i++) {
      if (pos.LABELS[i] === bucket) return (1 << i);
    }
    return 0;
  }

  function tokens(pStr) {
    if (!pStr) return [];
    var raw = String(pStr).toLowerCase().split(/[,\/+·\s]+/);
    var out = [];
    for (var i = 0; i < raw.length; i++) {
      var t = raw[i];
      if (!t) continue;
      /* strip trailing dots */
      while (t.length && t.charAt(t.length - 1) === ".") {
        t = t.substring(0, t.length - 1);
      }
      if (t) out.push(t);
    }
    return out;
  }

  pos.mask = function (pStr) {
    var tks = tokens(pStr), m = 0;
    for (var i = 0; i < tks.length; i++) {
      var b = TOK[tks[i]];
      if (b) m |= bitOf(b);
    }

  };

  pos.buckets = function (pStr) {
    var m = pos.mask(pStr), out = [];
    for (var i = 0; i < pos.LABELS.length; i++) {

  pos.precompute = function (item) {

  };

      learn: (st && st.learnSteps && st.learnSteps.length) ? st.learnSteps : D_LEARN,
      relearn: D_RELEARN,
      grad: (st && st.graduate) ? st.graduate : D_GRAD,
      easy: (st && st.easyIv) ? st.easyIv : D_EASY

      if (rating === 0) {                 // Again -> lapse into relearn

    for (j = 0; j < labels.length; j++) res.pos[labels[j]] = 0;
