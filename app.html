/* ===== module: structure ===== */
/* structure.js — "โครงสร้างประโยค" a sentence-structure learning resource + practice.
   Browse: category list -> pattern list -> pattern detail (frame with highlighted slots,
   slot roles, meaning, examples w/ speak, transformations, Thai-error, tip).
   Practice: a quiz built FROM the same data — "เลือกประโยคที่ถูก" (from thai_err) and
   "ใช้โครงไหน" (identify the structure of an example). Hidden mode "structure". ES5.
   Uses S, esc, speak, speakSlow, goMode. Lazy-loads data/structure.json. */
PT.structure = (function () {
  "use strict";
  var DATA = null, loading = false, waiters = [];
  var cat = -1;   // selected category index; -1 = category list
  var pat = -1;   // selected pattern index; -1 = pattern list
  // practice state
  var pmode = null;      // null=browse, 'q'=question in progress, 'result'
  var sess = null, si = 0, sscore = 0, smiss = [], answered = false;

  function liveView() { return document.getElementById("view"); }
  function rerender() { var v = liveView(); if (v && S.mode === "structure") render(v); }

  function load(cb) {
    if (DATA) { if (cb) cb(); return; }
    if (cb) waiters.push(cb);
    if (loading) return;
    loading = true;
    fetch("data/structure.json").then(function (r) {
      if (!r.ok) throw new Error("http " + r.status);
      return r.json();
    }).then(function (d) {
      DATA = d; loading = false;
      var w = waiters; waiters = [];
      for (var i = 0; i < w.length; i++) { try { w[i](); } catch (e) {} }
    }).catch(function () {
      loading = false; waiters = [];
      var v = liveView();
      if (v && S.mode === "structure") {
        v.innerHTML = '<button class="st2-retry" id="st-retry">โหลดไม่สำเร็จ — แตะเพื่อลองใหม่</button>';
        var r = document.getElementById("st-retry");
        if (r) r.onclick = function () { rerender(); };
      }
    });
  }

  // ---------- helpers ----------
  function randn(n) { return Math.floor(Math.random() * n); }
  function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = randn(i + 1); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
  function count() { var n = 0; for (var i = 0; i < (DATA ? DATA.length : 0); i++) n += DATA[i].patterns.length; return n; }
  function locate(n) { var k = 0; for (var ci = 0; ci < DATA.length; ci++) { var len = DATA[ci].patterns.length; if (n < k + len) return { ci: ci, pi: n - k }; k += len; } return { ci: 0, pi: 0 }; }

  function render(v) {
    if (!DATA) { v.innerHTML = '<div class="empty">กำลังโหลด…</div>'; load(rerender); return; }
    if (pmode === 'q') { renderQuestion(v); return; }
    if (pmode === 'result') { renderResult(v); return; }
    if (cat >= 0 && DATA[cat]) {
      if (pat >= 0 && DATA[cat].patterns[pat]) renderPattern(v, DATA[cat], DATA[cat].patterns[pat]);
      else renderPatternList(v, DATA[cat]);
    } else renderCats(v);
  }

  function renderCats(v) {
    var h = ['<div class="st2-wrap">'];
    h.push('<div class="st2-hero">📐 โครงสร้างประโยค</div>');
    h.push('<div class="st2-intro">ภาษาอังกฤษทุกประโยคมี “โครง” — แค่เติมคำนาม/กริยา/คำคุณศัพท์ลงในช่อง แล้วเรียนรู้ว่าถ้าเปลี่ยนส่วนไหน ประโยคจะเปลี่ยนยังไง</div>');
    h.push('<button class="st2-practice-btn" id="st-practice">🎯 ฝึกโครงสร้าง — ทดสอบตัวเอง</button>');
    h.push('<div class="st2-cgrid">');
    for (var i = 0; i < DATA.length; i++) {
      var c = DATA[i];
      h.push('<button class="st2-ccard" data-st-cat="' + i + '"><div class="st2-cn">' + esc(c.cat_th) + '</div>' +
        '<div class="st2-cc">' + (c.patterns ? c.patterns.length : 0) + ' โครงสร้าง</div></button>');
    }
    h.push('</div></div>');
    v.innerHTML = h.join("");
    document.getElementById("st-practice").onclick = startPractice;
    [].forEach.call(v.querySelectorAll("[data-st-cat]"), function (b) {
      b.onclick = function () { cat = parseInt(b.getAttribute("data-st-cat"), 10); pat = -1; render(v); };
    });
  }

  function renderPatternList(v, c) {
    var h = ['<div class="st2-wrap">'];
    h.push('<div class="st2-bar"><button class="st2-back" id="st-back">‹ ทุกหมวด</button><div class="st2-title">' + esc(c.cat_th) + '</div></div>');
    for (var i = 0; i < c.patterns.length; i++) {
      var p = c.patterns[i];
      h.push('<button class="st2-pcard" data-st-pat="' + i + '"><div class="st2-pf">' + frameHtml(p.frame) + '</div>' +
        '<div class="st2-pn">' + esc(p.name_th || p.name_en || "") + '</div></button>');
    }
    h.push('</div>');
    v.innerHTML = h.join("");
    document.getElementById("st-back").onclick = function () { cat = -1; render(v); };
    [].forEach.call(v.querySelectorAll("[data-st-pat]"), function (b) {
      b.onclick = function () { pat = parseInt(b.getAttribute("data-st-pat"), 10); render(v); };
    });
  }

  // render *cat:token* markers as colour-coded highlights (cat: v/b/a/f); rest plain
  function hlHtml(s) {
    var parts = String(s).split(/(\*[a-z]:[^*]+\*)/), h = "", i;
    for (i = 0; i < parts.length; i++) {
      var g = parts[i];
      if (!g) continue;
      var m = /^\*([a-z]):([^*]+)\*$/.exec(g);
      if (m) h += '<mark class="st2-hl st2-hl-' + m[1] + '">' + esc(m[2]) + '</mark>';
      else h += esc(g);
    }
    return h;
  }
  // one row of the conjugation table: label -> sentence (with highlights) + 🔊
  function formRow(label, ex) {
    var clean = String(ex).replace(/\*[a-z]:([^*]+)\*/g, "$1");
    return '<div class="st2-frow"><span class="st2-fl">' + esc(label) + '</span>' +
      '<span class="st2-fx">' + hlHtml(ex) + ' <button type="button" class="st2-spk" data-say="' + esc(clean) + '">🔊</button></span></div>';
  }

  function frameHtml(fr) {
    var parts = String(fr).split(/(\[[^\]]*\])/), h = "", i;
    for (i = 0; i < parts.length; i++) {
      var seg = parts[i];
      if (!seg) continue;
      if (/^\[[^\]]*\]$/.test(seg)) h += '<span class="st2-slot">' + esc(seg.replace(/^\[|\]$/g, "")) + '</span>';
      else h += esc(seg);
    }
    return h;
  }

  function renderPattern(v, c, p) {
    var h = ['<div class="st2-wrap st2-detail">'];
    h.push('<div class="st2-bar"><button class="st2-back" id="st-pback">‹ ' + esc(c.cat_th) + '</button></div>');
    h.push('<div class="st2-dname">' + esc(p.name_th || "") + (p.name_en ? ' <span>' + esc(p.name_en) + '</span>' : '') + '</div>');
    h.push('<div class="st2-frame">' + frameHtml(p.frame) + '</div>');
    if (p.slots && p.slots.length) {
      h.push('<div class="st2-slots">');
      for (var s = 0; s < p.slots.length; s++) h.push('<div class="st2-srow"><span class="st2-st">' + esc(p.slots[s].t) + '</span><span class="st2-sr">' + esc(p.slots[s].r) + '</span></div>');
      h.push('</div>');
    }
    if (p.meaning_th) h.push('<div class="st2-mean">' + esc(p.meaning_th) + '</div>');
    if (p.use_th) h.push('<div class="st2-use"><div class="st2-use-h">💬 ใช้ตอนไหน · เอาไปใช้ยังไง</div><div class="st2-use-b">' + esc(p.use_th) + '</div></div>');
    if (p.forms) {
      var f = p.forms;
      h.push('<button type="button" class="st2-forms-tog" data-forms-tog="1">🔄 ดูรูปแบบประโยค (ผัน I/you/he… · อดีต/ปัจจุบัน/อนาคต) <span class="st2-ft-ar">▾</span></button>');
      h.push('<div class="st2-forms" style="display:none">');
      h.push('<div class="st2-flegend">สีบอกว่า<b>ทำไมคำถึงเปลี่ยน</b> (เทียบรูปตั้งต้น I/You/We/They · ปัจจุบัน):<div class="st2-lgrow">' +
        '<span class="st2-lg st2-hl-v">กริยาหลัก</span>' +
        '<span class="st2-lg st2-hl-b">to be</span>' +
        '<span class="st2-lg st2-hl-a">กริยาช่วย/modal</span>' +
        '<span class="st2-lg st2-hl-f">อนาคต (will)</span></div></div>');
      if (f.note_th) h.push('<div class="st2-fnote">' + esc(f.note_th) + '</div>');
      if (f.pron && f.pron.length) {
        h.push('<div class="st2-fsec">ผันตามประธาน</div>');
        for (var pi = 0; pi < f.pron.length; pi++) h.push(formRow(f.pron[pi].p, f.pron[pi].ex));
      }
      if (f.noun_th) h.push('<div class="st2-fnoun">📝 ' + esc(f.noun_th) + '</div>');
      if (f.tense && f.tense.length) {
        h.push('<div class="st2-fsec">ผันตามกาล (เวลา)</div>');
        for (var ti = 0; ti < f.tense.length; ti++) h.push(formRow(f.tense[ti].t, f.tense[ti].ex));
      }
      h.push('</div>');

    if (p.examples && p.examples.length) {

    }
    if (p.transform && p.transform.length) {
      h.push('<div class="st2-sec">ถ้าเปลี่ยนส่วน → ประโยคเปลี่ยน</div>');
      for (var t = 0; t < p.transform.length; t++) {
        var tr = p.transform[t];
        h.push('<div class="st2-tr"><div class="st2-tr-l">🔀 ' + esc(tr.label_th) + '</div>' +

    }

  function wireSpeak(v) {

  // ---------- practice ----------
  function buildSession(n) {
    var corr = [], which = [], ci, pi, p;
    for (ci = 0; ci < DATA.length; ci++) {
      for (pi = 0; pi < DATA[ci].patterns.length; pi++) {
        p = DATA[ci].patterns[pi];
        if (p.thai_err && p.thai_err.wrong && p.thai_err.right && p.thai_err.wrong !== p.thai_err.right)
          corr.push({ type: 'correct', ci: ci, pi: pi });
        if (p.examples && p.examples.length) which.push({ type: 'which', ci: ci, pi: pi });
      }
    }
    shuffle(corr); shuffle(which);
    var out = [], i = 0;
    while (out.length < n && (corr.length || which.length)) {
      if ((i % 2 === 0 && corr.length) || !which.length) { if (corr.length) out.push(corr.pop()); }
      else { if (which.length) out.push(which.pop()); }
      i++;
    }

  }

  function startPractice() {
    load(function () {

  function renderQuestion(v) {

      h.push('<div class="st2-pr-q">เลือกประโยคที่ <b>ถูกต้อง</b></div>');
      for (var o = 0; o < opts.length; o++)
        h.push('<button class="st2-opt" data-ok="' + (opts[o].ok ? '1' : '0') + '">' + esc(opts[o].t) + '</button>');
    } else {
      var ex = p.examples[randn(p.examples.length)];
      // distractor categories
      var others = [];
      for (var ci2 = 0; ci2 < DATA.length; ci2++) if (ci2 !== q.ci) others.push(DATA[ci2].cat_th);
      shuffle(others);
      var choices = [{ t: DATA[q.ci].cat_th, ok: true }];
      for (var d = 0; d < 3 && d < others.length; d++) choices.push({ t: others[d], ok: false });
      shuffle(choices);
      h.push('<div class="st2-pr-q">ประโยคนี้ใช้ <b>โครงสร้างแบบไหน</b>?</div>');
      h.push('<div class="st2-pr-ex">' + esc(ex.en) + (ex.th ? '<span>' + esc(ex.th) + '</span>' : '') + '</div>');
      for (var o2 = 0; o2 < choices.length; o2++)
        h.push('<button class="st2-opt st2-opt-cat" data-ok="' + (choices[o2].ok ? '1' : '0') + '">' + esc(choices[o2].t) + '</button>');
    }
    h.push('<div class="st2-pr-fb" id="st-fb"></div>');
    h.push('</div>');
    v.innerHTML = h.join("");
    document.getElementById("st-quit").onclick = function () { pmode = null; cat = -1; pat = -1; rerender(); };
    answered = false;
    [].forEach.call(v.querySelectorAll(".st2-opt"), function (b) {
      b.onclick = function () { if (!answered) answer(b, q, p); };
    });
  }

  function answer(btn, q, p) {
    answered = true;
    var ok = btn.getAttribute("data-ok") === "1";
    if (ok) sscore++; else smiss.push({ ci: q.ci, pi: q.pi });
    // mark all options
    var opts = liveView().querySelectorAll(".st2-opt");
    [].forEach.call(opts, function (b) {
      b.disabled = true;
      if (b.getAttribute("data-ok") === "1") b.className += " st2-opt-ok";
      else if (b === btn) b.className += " st2-opt-bad";
      else b.className += " st2-opt-dim";
    });
    var fb = document.getElementById("st-fb");
    var name = p.name_th || p.name_en || "";
    var expl = "";
    if (q.type === 'correct' && p.thai_err && p.thai_err.why_th) expl = esc(p.thai_err.why_th);
    else expl = 'โครง: ' + frameHtml(p.frame);
    fb.innerHTML = '<div class="st2-fb-in ' + (ok ? 'good' : 'bad') + '">' +
      '<div class="st2-fb-r">' + (ok ? '✓ ถูกต้อง' : '✗ ยังไม่ถูก') + ' — <b>' + esc(name) + '</b></div>' +
      '<div class="st2-fb-x">' + expl + '</div>' +
      '<button class="st2-fb-view" data-view="1">ดูโครงสร้างนี้ →</button>' +
      '<button class="st2-fb-next" data-next="1">' + (si + 1 >= sess.length ? 'ดูผล' : 'ข้อถัดไป') + ' ›</button>' +
      '</div>';
    fb.querySelector("[data-next]").onclick = function () {
      si++; if (si >= sess.length) pmode = 'result'; rerender();
    };
    fb.querySelector("[data-view]").onclick = function () {
      pmode = null; cat = q.ci; pat = q.pi; rerender();
    };
    var v = liveView(); if (v) { var f = v.querySelector(".st2-pr-fb"); if (f) f.scrollIntoView({ block: "nearest" }); }
  }

  function renderResult(v) {
    var pct = Math.round((sscore / sess.length) * 100);
    var h = ['<div class="st2-wrap st2-pr">'];
    h.push('<div class="st2-res"><div class="st2-res-i">' + (pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪') + '</div>' +
      '<div class="st2-res-s">' + sscore + '/' + sess.length + '</div>' +
      '<div class="st2-res-d">' + (pct >= 80 ? 'เก่งมาก!' : pct >= 50 ? 'ดีขึ้นเรื่อยๆ' : 'ฝึกต่อไปนะ') + '</div></div>');
    if (smiss.length) {
      h.push('<div class="st2-sec">ทบทวนโครงที่ยังพลาด</div>');
      for (var i = 0; i < smiss.length; i++) {
        var p = DATA[smiss[i].ci].patterns[smiss[i].pi];
        h.push('<button class="st2-miss" data-mci="' + smiss[i].ci + '" data-mpi="' + smiss[i].pi + '">' +
          esc(p.name_th || p.name_en || "") + ' <span>' + esc(DATA[smiss[i].ci].cat_th) + '</span></button>');
      }
    }
    h.push('<button class="st2-practice-btn" id="st-again">🎯 ฝึกอีกชุด</button>');
    h.push('<button class="st2-res-back" id="st-rback">‹ กลับไปหน้าโครงสร้าง</button>');
    h.push('</div>');
    v.innerHTML = h.join("");
    document.getElementById("st-again").onclick = startPractice;
    document.getElementById("st-rback").onclick = function () { pmode = null; cat = -1; pat = -1; rerender(); };
    [].forEach.call(v.querySelectorAll(".st2-miss"), function (b) {
      b.onclick = function () { pmode = null; cat = parseInt(b.getAttribute("data-mci"), 10); pat = parseInt(b.getAttribute("data-mpi"), 10); rerender(); };
    });
  }

  // open a specific structure for a given plan-day (cycles through all patterns)
  function openDay(day) {
    pmode = null;
    load(function () { var total = count() || 1; var n = ((Math.max(1, day | 0) - 1) % total); var loc = locate(n); cat = loc.ci; pat = loc.pi; });
    goMode("structure");
  }

  return {
    render: render,
    open: function () { pmode = null; cat = -1; pat = -1; goMode("structure"); },
    practice: function () { goMode("structure"); startPractice(); },
    openDay: openDay,
    dayNo: function (day) { return count() ? (((Math.max(1, day | 0) - 1) % count()) + 1) : 0; },
    reset: function () { pmode = null; cat = -1; pat = -1; }
  };
})();

/* ===== module: plan ===== */
/* plan.js — "แผนเรียน 540 วัน" inside Stats. Generates a full day-by-day 18-month plan (v2),

PT.plan=(function(){

  var PHNAME={1:"รากฐาน & พูดตั้งแต่วันแรก",2:"ต่อยอด & เริ่มเขียน",3:"ขยาย & mock แรก",4:"วิชาการ & Writing",5:"เข้มข้น 4 ทักษะ",6:"ตกผลึก & สอบ"};

  var WLABEL={2:"ย่อหน้าสั้น 1 ย่อหน้า",3:"ย่อหน้า / เริ่ม Task 1",4:"Writing Task 1",5:"Writing Task 2",6:"Task 1 หรือ 2 (สลับ)"};

    180:"🏅 ผ่านเดือน 6 — จุดที่คนเลิกเยอะที่สุด คุณมาไกลมาก!",270:"🏅 mock ชุดแรกเสร็จ — รู้ระดับจริงของตัวเอง",
    360:"🏅 essay ได้ band 6+ — Writing กำลังพ้นเพดาน",450:"🏅 mock รวม ~6.5 — เหลืออีกนิดเดียว!",540:"🎓 พร้อมสอบจริง! จองสอบ IELTS ได้เลย"};

  /* ---- curriculum: which exact items each new-word day covers ---- */

    {deck:"oxford",grp:"A1",name:"Oxford A1",n:900},
    {deck:"oxford",grp:"A2",name:"Oxford A2",n:799},
    {deck:"oxford",grp:"B1",name:"Oxford B1",n:700},
    {deck:"oxford",grp:"B2",name:"Oxford B2",n:1298},
    {deck:"oxford",grp:"C1",name:"Oxford C1",n:1282},
    {deck:"pv",grp:null,name:"Phrasal Verbs",n:902},

    {deck:"topic",grp:null,name:"Topic Vocab",n:374},
    {deck:"syn",grp:null,name:"Synonyms",n:662},
    {deck:"awl",grp:null,name:"AWL",n:570},
    {deck:"knowledge",grp:null,name:"รอบรู้วิชาการ",n:1040}
  ];
  var CUM=[],_s=0; for(var _i=0;_i<CURRIC.length;_i++){CUM.push(_s);_s+=CURRIC[_i].n;} var TOTV=_s;

  function dinfo(day){
    var month=Math.ceil(day/PD),dom=((day-1)%PD)+1,phase=Math.ceil(month/3),dow=(day-1)%7;
    var rest=(dow===6),mock=(phase===6&&dow===5)||(phase>=3&&dom===28&&!rest);

  }
  var _cur=null;
  function cursorStart(day){ if(!_cur){_cur=[0];var c=0;for(var d=1;d<=TOTAL;d++){c+=dinfo(d).nc;_cur[d]=c;}} return _cur[day-1]||0; }
  function segsOf(start,count){var out=[],pos=start,left=count;
    for(var i=0;i<CURRIC.length&&left>0;i++){var a=CUM[i],b=CUM[i]+CURRIC[i].n;

  function segLabel(sg){var a=[];for(var i=0;i<sg.length;i++)a.push(sg[i].name+" คำที่ "+sg[i].from+"–"+sg[i].to);return a.join(" + ");}
  // distinct source names a month covers (for the month card subtitle)
  function monthVocab(m){var s=(m-1)*PD+1,e=m*PD,names=[],seen={},d;

  function gameOf(day){var g=day%3;

/* ===== module: miss ===== */
/* miss.js — "สมุดคำผิด" (Mistake Notebook). Auto-collects items answered wrong in
   Quiz/Cards; supports a "review only weak words" filter. ES5. Uses store, esc, keyOf, S, goMode.
   Storage: miss_<deck> = { "<keyOf>": {n:wrongCount, r:rightSinceWrong, t:lastWrongMs} }.
   An item leaves the notebook after 2 consecutive correct answers. */
PT.miss = (function () {
  "use strict";
  var cache = {};
  function skey(d) { return "miss_" + d; }
  function load(d) {
    if (cache[d]) return cache[d];
    var o = {};
    try { o = JSON.parse(store.get(skey(d)) || "{}") || {}; } catch (e) { o = {}; }
    cache[d] = o; return o;
  }
  function save(d) { try { store.set(skey(d), JSON.stringify(cache[d] || {})); } catch (e) {} }

  function add(d, k) {
    if (!d || !k) return;
    var o = load(d), e = o[k] || { n: 0, r: 0, t: 0 };
    e.n++; e.r = 0; e.t = Date.now(); o[k] = e; save(d);
  }
  function right(d, k) {
    if (!d || !k) return;
    var o = load(d); if (!o[k]) return;
    o[k].r = (o[k].r || 0) + 1;
    if (o[k].r >= 2) delete o[k];
    save(d);
  }
  function has(d, k) { return !!load(d)[k]; }
  function keys(d) { var o = load(d), a = [], k; for (k in o) if (o.hasOwnProperty(k)) a.push(k); return a; }
  function count(d) { return keys(d).length; }
  function clear(d) { cache[d] = {}; save(d); }

  function up(el, a, root) { while (el && el !== root) { if (el.getAttribute && el.getAttribute(a) !== null) return el; el = el.parentNode; } return null; }

  function startReview() {
    if (count(S.deck) < 1) return;
    S.filter.groups = {}; S.filter.status = {}; S.filter.pos = {}; S.filter.fav = false;
    S.filter.miss = true; S.workingDirty = true;
    if (window.goMode) goMode("quiz");
  }

  function draw() {
    var r = document.getElementById("miss-root"); if (!r) return;
    var d = S.deck, ks = keys(d);
    if (!ks.length) {
      r.innerHTML = '<div class="ms-empty">ยังไม่มีคำที่ตอบผิด — เวลาตอบผิดใน Quiz หรือกด "อีกครั้ง" ใน Cards คำนั้นจะถูกเก็บมาที่นี่ เพื่อให้ทบทวนเฉพาะจุดอ่อนได้</div>';
      return;
    }
    var o = load(d), map = {}, i, data = S.data || [];
    for (i = 0; i < data.length; i++) map[keyOf(data[i])] = data[i];
    ks.sort(function (a, b) { return (o[b].n || 0) - (o[a].n || 0); });
    var h = '<div class="ms-top"><span>' + ks.length + ' คำที่ต้องเก็บ</span>' +
      '<button class="ms-btn ms-rev" data-msrev="1">▶ ทบทวนจุดอ่อน</button></div><div class="ms-list">';
    for (i = 0; i < ks.length; i++) {
      var it = map[ks[i]]; if (!it) continue;
      h += '<div class="ms-item"><div class="ms-w"><b>' + esc(it.w || "") + '</b>' +
        (it.mt ? '<span>' + esc(it.mt) + '</span>' : '') + '</div>' +
        '<span class="ms-n">ผิด ' + (o[ks[i]].n || 1) + '×</span></div>';
    }
    h += '</div><button class="ms-btn ms-clear" data-msclear="1">ล้างสมุดคำผิด (คลังนี้)</button>';
    r.innerHTML = h;
  }

  function section() {
    return '<div class="ms-sec"><div class="ms-h">📓 สมุดคำผิด <span id="miss-count"></span></div><div id="miss-root"></div></div>';
  }
  function wire(scope) {
    var r = document.getElementById("miss-root"); if (!r) return;
    var cn = document.getElementById("miss-count"); if (cn) cn.textContent = count(S.deck) ? "(" + count(S.deck) + ")" : "";
    draw();
    r.addEventListener("click", function (e) {
      var t = e.target, el;
      if ((el = up(t, "data-msrev", r))) { startReview(); return; }
      if ((el = up(t, "data-msclear", r))) {
        if (confirm("ล้างสมุดคำผิดของคลังนี้?")) { clear(S.deck); var c = document.getElementById("miss-count"); if (c) c.textContent = ""; draw(); }
        return;
      }
    });
  }

  return { add: add, right: right, has: has, keys: keys, count: count, clear: clear, section: section, wire: wire, startReview: startReview };
})();

/* todayhub.js — "วันนี้" Today Hub: one screen gathering everything to do today.
   Full-feature daily design: every day touches Cards+Quiz+สนทนา+เลือกคำ+ประโยค, and a rotating
   "major" slot covers เรื่องสั้น/Reading/พูดอัดเสียง/ฟัง/รอบรู้วิชาการ/Writing Lab across the week,
   plus a rotating game (เติมประโยค/หาที่ผิด/เติมคำ). Hidden mode "todayhub". ES5.
   Uses globals: S, esc, store, keyOf, goMode, loadDeck, PT.plan, PT.daily, PT.srs, PT.talk,
   PT.examprep, PT.quiz. */
PT.hub = (function () {
  "use strict";
  var HKEY = "pt_hub";
  var _hubBack = false;

  function todayISO() { var d = new Date(); var m = d.getMonth() + 1, dd = d.getDate(); return d.getFullYear() + "-" + (m < 10 ? "0" : "") + m + "-" + (dd < 10 ? "0" : "") + dd; }
  function planDay() { try { return (PT.plan && PT.plan.todayDay) ? PT.plan.todayDay() : null; } catch (e) { return null; } }

  function loadState() {
    var day = planDay(), date = todayISO(), st = null;
    try { st = JSON.parse(store.get(HKEY) || "null"); } catch (e) { st = null; }
    if (!st || st.date !== date || st.day !== day) { st = { day: day, date: date, steps: {}, cnt: {}, celebrated: 0 }; saveState(st); }
    if (!st.cnt) st.cnt = {};
    return st;
  }
  function saveState(st) { try { store.set(HKEY, JSON.stringify(st)); } catch (e) {} }
  function mark(step, val) { var st = loadState(); st.steps[step] = val ? 1 : 0; saveState(st); }

  function dueCount() {

        else { try { PT.quiz._state.sub = "bank"; PT.quiz._state.cur = null; } catch (e) {} goMode("quiz"); }
        syncPill();

    };

      try { if (PT.plan && PT.plan.setStartByDay) PT.plan.setStartByDay(n); } catch (e) {}
      try { store.set(HKEY, "null"); } catch (e) {}
      draw();
    };
  }

  function draw() { var v = document.getElementById("view"); if (v && S.mode === "todayhub") render(v); }

  /* ---- return-to-hub pill ---- */
  function ensurePill() {
    var p = document.getElementById("hub-pill");
    if (!p) {
      p = document.createElement("button");
      p.id = "hub-pill"; p.type = "button"; p.className = "hb-pill"; p.textContent = "‹ กลับสู่วันนี้";
      p.onclick = function () { goMode("todayhub"); };
      document.body.appendChild(p);
    }
    return p;
  }
  function syncPill() {
    var p = ensurePill();
    p.style.display = (_hubBack && S.mode !== "todayhub") ? "block" : "none";
  }
  (function () {
    var tb = document.querySelector(".tabbar");
    if (tb) tb.addEventListener("click", function () { _hubBack = false; setTimeout(syncPill, 0); });
  })();

  function notify(step) { mark(step, 1); if (S.mode === "todayhub") draw(); }
  // increment a counted step (e.g. แต่งประโยค 3 ข้อ) — marks done when the target is reached
  function bumpStep(step, need) {
    var st = loadState();
    st.cnt[step] = (st.cnt[step] || 0) + 1;
    if (st.cnt[step] >= (need || 1)) st.steps[step] = 1;
    saveState(st);
    if (S.mode === "todayhub") draw();
  }
  function start() { _hubBack = false; goMode("todayhub"); }

  return { start: start, render: render, notify: notify, bumpStep: bumpStep, syncPill: syncPill, leave: function () {} };
})();

/* ===== module: a11y ===== */
/* PT.a11y — accessibility enhancement pass (module "a11y")
 * ES5-safe. Called by host as PT.a11y.enhance(rootEl) after every render.
 * Defensive: every lookup feature-detects before touching a node.
 * Does not alter app behavior/state — only adds/refreshes ARIA, lang,
 * tabindex, and focus-related attributes.
 */
(function () {
  "use strict";

  window.PT = window.PT || {};

  // ---- small regex helpers for lang detection --------------------------
  // Thai block: U+0E00-U+0E7F. If a string contains any Thai codepoint we
  // treat it as Thai; otherwise, if it contains at least one Latin letter,
  // we treat it as English. Strings with neither (numbers/punct only) are
  // left untouched.
  var THAI_RE = /[฀-๿]/;
  var LATIN_RE = /[A-Za-z]/;

  function setLangFor(el) {
    if (!el) return;
    try {
      var t = el.textContent || "";
      if (!t || !t.replace(/\s+/g, "")) return;
      if (THAI_RE.test(t)) {
        el.setAttribute("lang", "th");
      } else if (LATIN_RE.test(t)) {
        el.setAttribute("lang", "en");
      }
    } catch (e) { /* no-op: defensive */ }
  }

  // Apply lang to elements matched by a selector list, scoped to root.
  function tagLang(root, selector) {
    if (!root || !root.querySelectorAll) return;
    var nodes;
    try {
      nodes = root.querySelectorAll(selector);
    } catch (e) {
      return;
    }
    for (var i = 0; i < nodes.length; i++) {
      setLangFor(nodes[i]);
    }
  }

  // ---- tabbar: role=tablist/tab -----------------------------------------
  function enhanceTabbar(root) {
    var tabbar = root.querySelector ? root.querySelector("#tabbar") : null;
    if (!tabbar) return;
    tabbar.setAttribute("role", "tablist");

    // Any direct-ish button/[role=button]/a children act as tabs.
    var items = tabbar.querySelectorAll("button, [role='button'], a");
    for (var i = 0; i < items.length; i++) {
      var el = items[i];
      el.setAttribute("role", "tab");
      if (!el.hasAttribute("tabindex")) el.setAttribute("tabindex", "0");

      var selected = false;
      // Heuristics: active/selected/current CSS class, or aria-current.
      if (el.className && /(^|\s)(active|selected|current)(\s|$)/.test(el.className)) {
        selected = true;
      }
      if (el.getAttribute("aria-current") === "page" || el.getAttribute("aria-current") === "true") {
        selected = true;
      }
      // data-mode matching current S.mode, if the global state is reachable.
      try {
        if (window.S && el.getAttribute && el.getAttribute("data-mode") === window.S.mode) {
          selected = true;
        }
      } catch (e) { /* no-op */ }

      el.setAttribute("aria-selected", selected ? "true" : "false");
      if (!el.hasAttribute("aria-label")) {
        var lbl = (el.textContent || "").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
        if (lbl) el.setAttribute("aria-label", lbl);
      }
    }

    // #view acts as the tabpanel for whichever tab is active.
    var view = root.querySelector ? root.querySelector("#view") : (document.getElementById ? document.getElementById("view") : null);
    if (view) {
      view.setAttribute("role", "tabpanel");
      if (!view.hasAttribute("tabindex")) view.setAttribute("tabindex", "-1");
    }
  }

  // ---- filter chips: role=button + aria-pressed --------------------------
  function enhanceFilterChips(root) {
    var filters = root.querySelector ? root.querySelector("#filters") : null;
    if (!filters) return;
    // Chips are commonly rendered with class starting "f-chip" per the
    // module CSS-prefix convention (filters -> "f-"). Match broadly but
    // stay scoped to #filters to avoid touching unrelated buttons.
    var chips = filters.querySelectorAll("[class*='f-chip'], .f-chip, button, [role='button']");
    for (var i = 0; i < chips.length; i++) {
      var el = chips[i];
      if (el.tagName && el.tagName.toLowerCase() === "input") continue; // leave real inputs alone
      el.setAttribute("role", "button");
      if (!el.hasAttribute("tabindex")) el.setAttribute("tabindex", "0");

      var pressed = false;
      if (el.className && /(^|\s)(active|selected|on|checked)(\s|$)/.test(el.className)) {
        pressed = true;
      }
      if (el.getAttribute("aria-pressed") !== null) {
        // already explicitly set by chip code — respect it, just normalize.
        pressed = el.getAttribute("aria-pressed") === "true";
      }
      el.setAttribute("aria-pressed", pressed ? "true" : "false");

      if (!el.hasAttribute("aria-label")) {
        var t = (el.textContent || "").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
        if (t) el.setAttribute("aria-label", t);
      }
    }
  }

  // ---- icon-only buttons: aria-label -------------------------------------
  function enhanceIconButtons(root) {
    var map = [
      { sel: "#theme", label: "Toggle theme / สลับธีมสี" },
      { sel: "#q", label: "Search / ค้นหา" }
    ];
    var i, el;
    for (i = 0; i < map.length; i++) {
      el = root.querySelector ? root.querySelector(map[i].sel) : null;
      if (el && !el.hasAttribute("aria-label")) {
        el.setAttribute("aria-label", map[i].label);
      }
    }

    // Speaker / TTS buttons: identify by common conventions — class hint,
    // data-speak attribute, or literal 🔊 glyph in text.
    var speakCandidates = root.querySelectorAll(
      "[data-speak], .c-speak, .speak, button[class*='speak']"
    );
    for (i = 0; i < speakCandidates.length; i++) {
      el = speakCandidates[i];
      if (!el.hasAttribute("aria-label")) el.setAttribute("aria-label", "Listen / ฟังเสียง");
      if (!el.hasAttribute("tabindex")) el.setAttribute("tabindex", "0");
    }
    // Fallback: any button whose only content is the speaker glyph.
    var allBtns = root.querySelectorAll("button");
    for (i = 0; i < allBtns.length; i++) {
      el = allBtns[i];
      var txt = (el.textContent || "").replace(/\s+/g, "");
      if (txt === "🔊" && !el.hasAttribute("aria-label")) {
        el.setAttribute("aria-label", "Listen / ฟังเสียง");
      }
      if (txt === "✕" || txt === "×" || txt === "close" || el.className && /close/.test(el.className)) {
        if (!el.hasAttribute("aria-label")) el.setAttribute("aria-label", "Close / ปิด");
      }
    }
  }

  // ---- sheet (bottom sheet detail view) ----------------------------------
  function enhanceSheet(root) {
    var sheet = root.querySelector ? root.querySelector("#sheet") : null;
    var sheetbg = root.querySelector ? root.querySelector("#sheetbg") : null;
    if (sheet) {
      sheet.setAttribute("role", "dialog");
      sheet.setAttribute("aria-modal", "true");
      if (!sheet.hasAttribute("tabindex")) sheet.setAttribute("tabindex", "-1");
      var closeBtn = sheet.querySelector("[data-close], .close, button[class*='close']");
      if (closeBtn && !closeBtn.hasAttribute("aria-label")) {
        closeBtn.setAttribute("aria-label", "Close / ปิด");
      }
    }
    if (sheetbg && !sheetbg.hasAttribute("aria-hidden")) {
      sheetbg.setAttribute("aria-hidden", "true");
    }
  }

  // ---- flip card (Cards mode) --------------------------------------------
  function enhanceFlipCard(root) {
    // Cards module prefixes classes with "c-"; the flip card itself is
    // expected to be something like .c-card / .c-flip. Match broadly.
    var cards = root.querySelectorAll(".c-card, .c-flip, [class*='c-card']");
    var i, el;
    for (i = 0; i < cards.length; i++) {
      el = cards[i];
      if (!el.hasAttribute("tabindex")) el.setAttribute("tabindex", "0");
      if (!el.hasAttribute("role")) el.setAttribute("role", "button");
      if (!el.hasAttribute("aria-label")) el.setAttribute("aria-label", "Flip card / พลิกการ์ด");
    }
    // Any buttons inside cards module (grading buttons Again/Hard/Good/Easy)
    var cbtns = root.querySelectorAll("[class*='c-'] button, .c-actions button");
    for (i = 0; i < cbtns.length; i++) {
      el = cbtns[i];
      if (!el.hasAttribute("tabindex")) el.setAttribute("tabindex", "0");
    }
  }

  // ---- reduced motion ------------------------------------------------------
  function respectReducedMotion(root) {
    try {
      var mq = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)");
      var reduce = !!(mq && mq.matches);
      var host = (root && root.classList) ? root : (document.documentElement || null);
      if (host && host.classList) {
        if (reduce) {
          host.classList.add("a-reduced-motion");
        } else {
          host.classList.remove("a-reduced-motion");
        }
      }
    } catch (e) { /* matchMedia unsupported: no-op */ }
  }

  // ---- lang tagging pass ---------------------------------------------------
  function enhanceLang(root) {
    // Thai-labeled fields by data-field convention, if present.
    tagLang(root, "[data-lang='th'], .mt, .et, [class*='-mt'], [class*='-et']");
    tagLang(root, "[data-lang='en'], .w, .ee, [class*='-w'], [class*='-ee']");
    // Generic fallback: sweep leaf text nodes' immediate span/div parents
    // inside #view and #sheet that don't yet have a lang attribute.
    var scopes = [];
    var v = root.querySelector ? root.querySelector("#view") : null;
    var sh = root.querySelector ? root.querySelector("#sheet") : null;
    if (v) scopes.push(v);
    if (sh) scopes.push(sh);
    for (var s = 0; s < scopes.length; s++) {
      var leaves = scopes[s].querySelectorAll("span, div, p, li, dd, dt");
      for (var i = 0; i < leaves.length; i++) {
        var el = leaves[i];
        if (el.hasAttribute("lang")) continue;
        // Only tag "leaf-ish" nodes (no element children) to avoid setting
        // lang on containers that mix both languages.
        if (el.children && el.children.length > 0) continue;
        setLangFor(el);
      }
    }
  }

  // ---- main entry ------------------------------------------------------
  function enhance(rootEl) {
    var root = rootEl || document;
    if (!root || !root.querySelectorAll) return;
    try { enhanceTabbar(root); } catch (e) { /* no-op */ }
    try { enhanceFilterChips(root); } catch (e) { /* no-op */ }
    try { enhanceIconButtons(root); } catch (e) { /* no-op */ }
    try { enhanceSheet(root); } catch (e) { /* no-op */ }
    try { enhanceFlipCard(root); } catch (e) { /* no-op */ }
    try { respectReducedMotion(root); } catch (e) { /* no-op */ }
    try { enhanceLang(root); } catch (e) { /* no-op */ }
  }

  window.PT.a11y = { enhance: enhance };
})();

/* ===== module: pwa ===== */
/* Pocket Tutor v2 - module "pwa" (pwa-offline)
   Registers the offline service worker AND surfaces updates to the user with a
   one-tap "new version available" banner, so they never have to close/reopen the
   app twice to get new content. ES5-safe, no external libs.
   Exposes: PT.pwa.register(), PT.pwa.version(cb)
*/
(function () {
  "use strict";
  window.PT = window.PT || {};
  var _reg = null, _reloading = false;

  function showUpdateBanner(waitingWorker) {
    if (document.getElementById("pt-update-bar")) return;
    var bar = document.createElement("div");
    bar.id = "pt-update-bar";
    bar.setAttribute("style",
      "position:fixed;left:12px;right:12px;bottom:74px;z-index:9999;" +
      "display:flex;align-items:center;gap:10px;" +
      "background:#e0942f;color:#fff;border-radius:14px;padding:12px 14px;" +
      "font:600 14px/1.35 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;" +
      "box-shadow:0 6px 20px rgba(0,0,0,.28);");
    bar.innerHTML =
      '<span style="flex:1">✨ มีเนื้อหาใหม่พร้อมแล้ว</span>' +
      '<button id="pt-update-go" style="flex:0 0 auto;background:#fff;color:#b06a12;border:none;' +
      'border-radius:999px;padding:8px 14px;font:800 13px sans-serif;cursor:pointer">อัปเดต</button>' +
      '<button id="pt-update-x" aria-label="ปิด" style="flex:0 0 auto;background:transparent;color:#fff;' +
      'border:none;font-size:18px;line-height:1;cursor:pointer;padding:4px">×</button>';
    document.body.appendChild(bar);
    document.getElementById("pt-update-go").onclick = function () {
      try { if (waitingWorker) waitingWorker.postMessage({ type: "SKIP_WAITING" }); } catch (e) {}
      // fallback: navigation is network-first now, so a plain reload gets fresh HTML too
      setTimeout(function () { if (!_reloading) { _reloading = true; window.location.reload(); } }, 400);
    };
    document.getElementById("pt-update-x").onclick = function () {
      var el = document.getElementById("pt-update-bar"); if (el && el.parentNode) el.parentNode.removeChild(el);
    };
  }

  function watch(reg) {
    _reg = reg;
    if (reg.waiting && navigator.serviceWorker.controller) showUpdateBanner(reg.waiting);
    reg.addEventListener("updatefound", function () {
      var nw = reg.installing;
      if (!nw) return;
      nw.addEventListener("statechange", function () {
        if (nw.state === "installed" && navigator.serviceWorker.controller) showUpdateBanner(nw);
      });
    });
  }

  PT.pwa = {
    register: function () {
      if (!("serviceWorker" in navigator)) return;
      if (window.location && window.location.protocol === "file:") return;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (_reloading) return; _reloading = true; window.location.reload();
      });
      window.addEventListener("load", function () {
        try {
          navigator.serviceWorker.register("./sw.js").then(function (reg) {
            watch(reg);
            try { reg.update(); } catch (e) {}
            document.addEventListener("visibilitychange", function () {
              if (!document.hidden && _reg) { try { _reg.update(); } catch (e) {} }
            });
          }, function () { /* registration rejected - offline just unavailable */ });
        } catch (e) { /* never let PWA setup break the app */ }
      });
    },
    version: function (cb) {
      try {
        if (!navigator.serviceWorker || !navigator.serviceWorker.controller) { cb(""); return; }
        var ch = new MessageChannel();
        ch.port1.onmessage = function (e) { cb((e.data && e.data.version) || ""); };
        navigator.serviceWorker.controller.postMessage({ type: "GET_VERSION" }, [ch.port2]);
      } catch (e) { cb(""); }
    }
  };
})();
