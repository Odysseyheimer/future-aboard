    for (i = 0; i < data.length; i++) {
      item = data[i];
      // status
      st = (PT.srs && PT.srs.statusOf)
        ? PT.srs.statusOf(S.rec[keyOf(item)], now) : "new";
      if (res.status[st] == null) res.status[st] = 0;
      res.status[st]++;
      // group
      g = item.g;
      res.groups[g] = (res.groups[g] || 0) + 1;
      // pos buckets (an item may count in multiple buckets)
      m = posMask(item);
      for (b = 0; b < labels.length; b++) {
        if (m & (1 << b)) res.pos[labels[b]]++;
      }
    }
    return res;
  };

  PT.filters = PTfilters;
})();

/* ===== module: filtersUI ===== */
/* PT.filtersUI — multi-select filter controls for #filters host.
   ES5 only. Renders 3 chip rows (status / group / pos) + sort segmented
   control + clear-all, wired to S.filter plain-object "sets". */
(function () {
  "use strict";
  window.PT = window.PT || {};

  // Thai labels for status keys (order matches chip order below).
  var STATUS = [
    { k: "new",      t: "ใหม่" },                                   // ใหม่
    { k: "learning", t: "กำลังเรียน" }, // กำลังเรียน
    { k: "due",      t: "ถึงกำหนด" },             // ถึงกำหนด
    { k: "known",    t: "รู้แล้ว" }                    // รู้แล้ว
  ];

  // Thai labels for POS buckets, indexed parallel to PT.pos.LABELS.
  var POS_TH = {
    noun:      "คำนาม",                       // คำนาม
    verb:      "คำกริยา",           // คำกริยา
    adjective: "คำคุณศัพท์", // คำคุณศัพท์
    adverb:    "คำวิเศษ",           // คำวิเศษณ์
    other:     "อื่นๆ"                        // อื่นๆ
  };

  // Sort options for the segmented control.
  var SORTS = [
    { k: "az",     t: "A–Z" },
    { k: "random", t: "สุ่ม" },                                 // สุ่ม
    { k: "due",    t: "ถึงกำหนด" }          // ถึงกำหนด
  ];

  // hasK fallback (host provides it, but stay safe).
  function has(obj, k) {
    if (typeof hasK === "function") return hasK(obj, k);
    return obj && Object.prototype.hasOwnProperty.call(obj, k);
  }

  // Toggle a value in a plain-object set: absent -> true, present -> deleted.
  function toggleSet(set, v) {
    if (has(set, v)) { delete set[v]; }
    else { set[v] = true; }
  }

  // Best-effort status counts from PT.filters.counts (shape: {new,learning,due,known}).
  function statusCounts() {
    try {
      if (PT.filters && typeof PT.filters.counts === "function") {
        var c = PT.filters.counts(S, Date.now());
        if (c) return c;
      }
    } catch (e) {}
    return null;
  }

  // Build one chip: <button class="f-chip" data-f=.. data-v=..>.
  function chip(dim, value, label, active, styleAttr, countLabel) {
    var cls = "f-chip" + (active ? " f-on" : "");
    var st = styleAttr ? (' style="' + styleAttr + '"') : "";
    var cnt = (countLabel !== null && countLabel !== undefined)
      ? '<span class="f-count">' + esc(String(countLabel)) + "</span>" : "";
    return '<button type="button" class="' + cls + '" data-f="' + esc(dim) +
      '" data-v="' + esc(value) + '" aria-pressed="' + (active ? "true" : "false") + '"' +
      st + '>' + '<span class="f-lab">' + esc(label) + "</span>" + cnt + "</button>";
  }

  PT.filtersUI = {
    render: function (hostEl) {
      if (!hostEl) return;
      var F = S.filter;
      var html = [];

      // --- Row 1: status chips (with live counts) ---
      var counts = statusCounts();
      var r1 = ['<div class="f-row" role="group" aria-label="สถานะ">'];
      var i;
      for (i = 0; i < STATUS.length; i++) {
        var s = STATUS[i];
        var cn = counts ? (counts[s.k] || 0) : null;
        r1.push(chip("status", s.k, s.t, has(F.status, s.k), "", cn));
      }
      r1.push("</div>");
      html.push(r1.join(""));

      // --- Row 2: group chips (deck-specific, colored; hidden if none) ---
      var deck = DECKS[S.deck];
      var groups = (deck && deck.groups) ? deck.groups : [];
      if (groups.length) {
        var r2 = ['<div class="f-row" role="group" aria-label="กลุ่ม">'];
        for (i = 0; i < groups.length; i++) {
          var g = groups[i];
          var col = gcolor(i);
          var active = has(F.groups, g);
          // Active chip uses the group color as background; inactive shows a color dot via border.
          var style = active
            ? ("background:" + col + ";border-color:" + col + ";color:#fff")
            : ("border-color:" + col);
          r2.push(chip("groups", g, g, active, style, null));
        }
        r2.push("</div>");
        html.push(r2.join(""));
      }

      // --- Row 3: POS chips (skip for decks without part-of-speech, e.g. sentences) ---
      var deckDef = (window.DECKS && DECKS[S.deck]) ? DECKS[S.deck] : {};
      if (deckDef.type !== "sentence") {
        var labels = (PT.pos && PT.pos.LABELS) ? PT.pos.LABELS
          : ["noun", "verb", "adjective", "adverb", "other"];
        var r3 = ['<div class="f-row" role="group" aria-label="ชนิดคำ">'];
        for (i = 0; i < labels.length; i++) {
          var lb = labels[i];
          r3.push(chip("pos", lb, (POS_TH[lb] || lb), has(F.pos, lb), "", null));
        }
        r3.push("</div>");
        html.push(r3.join(""));
      }

      // --- Row 4: sort segmented control + clear-all ---
      var r4 = ['<div class="f-row f-toolrow">'];
      r4.push('<div class="f-seg" role="group" aria-label="เรียงลำดับ">');
      for (i = 0; i < SORTS.length; i++) {
        var so = SORTS[i];
        var on = (F.sort === so.k);
        r4.push('<button type="button" class="f-segbtn' + (on ? " f-on" : "") +
          '" data-sort="' + esc(so.k) + '" aria-pressed="' + (on ? "true" : "false") +
          '">' + esc(so.t) + "</button>");
      }
      r4.push("</div>");
      // Favorites toggle (⭐ ติดดาว)
      r4.push('<button type="button" class="f-chip f-fav' + (F.fav ? " f-on" : "") +
        '" data-act="fav" aria-pressed="' + (F.fav ? "true" : "false") +
        '"><span class="f-lab">⭐ ติดดาว</span></button>');
      // Mistake-notebook toggle (📓 มักผิด)
      var mc = (PT.miss && PT.miss.count) ? PT.miss.count(S.deck) : 0;
      r4.push('<button type="button" class="f-chip f-miss' + (F.miss ? " f-on" : "") +
        '" data-act="miss" aria-pressed="' + (F.miss ? "true" : "false") +
        '"><span class="f-lab">📓 มักผิด' + (mc ? " " + mc : "") + '</span></button>');
      // Clear-all (ล้างตัวกรอง)
      r4.push('<button type="button" class="f-clear" data-act="clear">' +
        "ล้างตัวกรอง" + "</button>");
      r4.push("</div>");
      html.push(r4.join(""));

      hostEl.innerHTML = html.join("");

      // --- Wire events via delegation (rebind each render) ---
      if (hostEl._ptFiltersHandler) {
        hostEl.removeEventListener("click", hostEl._ptFiltersHandler);
      }
      var handler = function (ev) {
        var el = ev.target;
        // Walk up to the actionable button.
        while (el && el !== hostEl &&
               !el.getAttribute && el.parentNode) { el = el.parentNode; }
        while (el && el !== hostEl) {
          if (el.getAttribute &&
              (el.getAttribute("data-f") || el.getAttribute("data-sort") ||
               el.getAttribute("data-act"))) break;
          el = el.parentNode;
        }
        if (!el || el === hostEl) return;

        var changed = false;
        var act = el.getAttribute("data-act");
        var sort = el.getAttribute("data-sort");
        var dim = el.getAttribute("data-f");

        if (act === "fav") {
          S.filter.fav = !S.filter.fav;
          changed = true;
        } else if (act === "miss") {
          S.filter.miss = !S.filter.miss;
          changed = true;
        } else if (act === "clear") {
          S.filter.groups = {};
          S.filter.status = {};
          S.filter.pos = {};
          S.filter.fav = false;
          S.filter.miss = false;
          // Leave sort and q as-is (clear filters, not search/sort). Reset sort too? Keep sort.
          changed = true;
        } else if (sort) {
          if (S.filter.sort !== sort) { S.filter.sort = sort; changed = true; }
        } else if (dim) {
          var v = el.getAttribute("data-v");
          var set = (dim === "groups") ? S.filter.groups
                  : (dim === "status") ? S.filter.status
                  : (dim === "pos")    ? S.filter.pos : null;
          if (set) { toggleSet(set, v); changed = true; }
        }

        if (changed) {
          PT.filtersUI.render(hostEl); // reflect active state immediately
          PT.bus.emit("filterchange");
        }
      };
      hostEl.addEventListener("click", handler);
      hostEl._ptFiltersHandler = handler;
    }
  };
})();

/* ===== module: browse ===== */
// PT.browse — Browse tab: paginated list + word detail bottom sheet.
// ES5 only. Uses frozen host helpers: esc, speak, keyOf, gcolor, PT.filters,
// PT.srs, DECKS, S. Renders into #view; opens #sheet/#sheetbg for detail.
(function () {
  "use strict";
  window.PT = window.PT || {};

  var PAGE_SIZE = 50;

  // --- helpers -------------------------------------------------------------

  // Truncate a string to n chars with an ellipsis (ES5-safe).
  function trunc(s, n) {
    s = s == null ? "" : String(s);
    if (s.length <= n) return s;
    return s.substring(0, n - 1) + "…";
  }

  // Group tag color + label. For decks with groups, color by group index in
  // DECKS[deck].groups; for syn (no group) show deck initials in a neutral tag.
  function groupTag(deckKey, item) {
    var def = DECKS[deckKey];
    var groups = (def && def.groups) || [];
    var g = item.g;
    if (!groups.length || !g) {
      // No group dimension (e.g. syn): show deck initials.
      var initials = deckInitials(def ? def.name : deckKey);
      return '<span class="pg-tag pg-tag-plain">' + esc(initials) + "</span>";
    }
    var idx = 0;
    for (var i = 0; i < groups.length; i++) {
      if (groups[i] === g) { idx = i; break; }
    }
    return '<span class="pg-tag" style="background:' + gcolor(idx) +
      '">' + esc(g) + "</span>";
  }

  // Build 1-2 letter initials from a deck name (skip parens content).
  function deckInitials(name) {
    name = String(name || "");
    var clean = name.replace(/\(.*?\)/g, "");
    var parts = clean.split(/[^A-Za-z0-9]+/);
    var out = "";
    for (var i = 0; i < parts.length && out.length < 2; i++) {
      if (parts[i]) out += parts[i].charAt(0).toUpperCase();
    }
    return out || "?";
  }

  // Status dot color by SRS status.
  function statusColor(st) {
    if (st === "known") return "var(--know)";
    if (st === "due") return "var(--review)";
    if (st === "learning") return "var(--review)";
    return "var(--muted)"; // new
  }

  // Compute the pager page numbers with ellipsis. current +-2, first & last.
  // Returns array of numbers and the string "..." for gaps.
  function pagerItems(cur, total) {
    var out = [];
    var i;
    if (total <= 1) return [1];
    var lo = cur - 2, hi = cur + 2;
    if (lo < 1) lo = 1;
    if (hi > total) hi = total;
    // Always show first.
    out.push(1);
    if (lo > 2) out.push("…");
    for (i = lo; i <= hi; i++) {
      if (i !== 1 && i !== total) out.push(i);
    }
    if (hi < total - 1) out.push("…");
    if (total > 1) out.push(total);
    return out;
  }

  // --- detail bottom sheet -------------------------------------------------

  var sheetBound = false;

  function bindSheet() {
    if (sheetBound) return;
    var bg = document.getElementById("sheetbg");
    if (bg) {
      bg.onclick = function () { closeSheet(); };
    }
    sheetBound = true;
  }

  function closeSheet() {
    var sheet = document.getElementById("sheet");
    var bg = document.getElementById("sheetbg");
    if (sheet) { sheet.classList.remove("open"); sheet.style.transform = ""; sheet.style.display = "none"; sheet.innerHTML = ""; }
    if (bg) { bg.classList.remove("open"); bg.style.display = "none"; }
  }

  function openSheet(item, deckKey) {
    var sheet = document.getElementById("sheet");
    var bg = document.getElementById("sheetbg");
    if (!sheet) return;
    bindSheet();

    var def = DECKS[deckKey] || {};
    var h = [];
    h.push('<div class="pg-sheet">');
    h.push('<button class="pg-close" type="button" aria-label="Close">✕</button>');

    // Header: word + speak button + pos.
    h.push('<div class="pg-sh-head">');
    h.push('<div class="pg-sh-word">' + (item.em ? esc(item.em) + " " : "") + esc(item.w || "") +
      ' <button class="pg-spk pg-sh-say" type="button" data-say="' + esc(item.w || "") +
      '" aria-label="ฟังคำ">🔊</button>' +
      (def.type === "sentence"
        ? '<button class="pg-spk" type="button" data-slow="' + esc(item.w || "") + '" aria-label="อ่านช้า">🐢</button>'
        : '<button class="pg-spk" type="button" data-spell="' + esc(item.w || "") + '" aria-label="สะกดคำ">🔤</button>') +
      '</div>');
    if (item.p) h.push('<div class="pg-sh-pos">' + esc(item.p) + (item._no ? ' · <span class="pg-sh-no">คำที่ ' + item._no + (item.g && deckKey === "oxford" ? " ของ " + esc(item.g) : "") + '</span>' : '') + "</div>");
    else if (item._no) h.push('<div class="pg-sh-pos"><span class="pg-sh-no">ลำดับที่ ' + item._no + (item.g && deckKey === "oxford" ? " ของ " + esc(item.g) : "") + '</span></div>');
    h.push("</div>");

    // IPA pronunciation (enrichment).
    if (item.ip) h.push('<div class="pg-sh-ipa">' + esc(item.ip) + "</div>");

    // Verb forms V1 → V2 (past simple) → V3 (past participle), when this item is a verb.
    if (item.vf && item.vf.v2 && item.vf.v3) {
      h.push('<div class="pg-sh-vf">' +
        '<div class="pg-vf-cell"><span class="pg-vf-l">V1</span><span class="pg-vf-w">' + esc(item.w || "") + '</span></div>' +
        '<span class="pg-vf-ar">→</span>' +
        '<div class="pg-vf-cell"><span class="pg-vf-l">V2 · อดีต</span><span class="pg-vf-w">' + esc(item.vf.v2) +
        ' <button class="pg-spk" type="button" data-say="' + esc(item.vf.v2) + '" aria-label="ฟัง V2">🔊</button></span></div>' +
        '<span class="pg-vf-ar">→</span>' +
        '<div class="pg-vf-cell"><span class="pg-vf-l">V3 · Past Participle</span><span class="pg-vf-w">' + esc(item.vf.v3) +
        ' <button class="pg-spk" type="button" data-say="' + esc(item.vf.v3) + '" aria-label="ฟัง V3">🔊</button></span></div>' +
        (item.vf.ir ? '<div class="pg-vf-ir">⚠️ กริยาไม่ปกติ (irregular verb) — ต้องท่องจำรูปนี้ ไม่ได้เติม -ed</div>' : "") +
        "</div>");
    }

    // Meanings.
    if (item.me) h.push('<div class="pg-sh-me">' + esc(item.me) + "</div>");
    if (item.mt) h.push('<div class="pg-sh-mt">' + esc(item.mt) + "</div>");

    // Knowledge explainer ("what it is") — Knowledge deck enrichment.
    if (item.kn && (item.kn.th || item.kn.en)) {
      h.push('<div class="pg-sh-know"><div class="pg-sh-know-h">📖 มันคืออะไร</div>');
      if (item.kn.en) h.push('<div class="pg-sh-know-en">' + esc(item.kn.en) + "</div>");
      if (item.kn.th) h.push('<div class="pg-sh-know-th">' + esc(item.kn.th) + "</div>");
      h.push("</div>");
    }

    // Extra x with xlab label if present.
    if (item.x && def.xlab) {
      h.push('<div class="pg-sh-row"><span class="pg-sh-lab">' +
        esc(def.xlab) + '</span><span class="pg-sh-val">' +
        esc(item.x) + "</span></div>");
    } else if (item.x) {
      h.push('<div class="pg-sh-row"><span class="pg-sh-val">' +
        esc(item.x) + "</span></div>");
    }

    // Example EN + speak + TH (plus any enrichment examples in item.xs).
    var exList = [];
    if (item.ee) exList.push({ en: item.ee, th: item.et });
    if (item.xs && item.xs.length) {
      for (var xi = 0; xi < item.xs.length; xi++) {
        exList.push({ en: item.xs[xi].en || "", th: item.xs[xi].th || "" });
      }
    }
    for (var ei = 0; ei < exList.length; ei++) {
      var ex = exList[ei];
      if (!ex.en) continue;
      h.push('<div class="pg-sh-ex"><span class="pg-sh-ee">' + esc(ex.en) + "</span> " +
        '<button class="pg-spk" type="button" data-say="' + esc(ex.en) + '" aria-label="Speak">🔊</button>' +
        '<button class="pg-spk" type="button" data-slow="' + esc(ex.en) + '" aria-label="อ่านช้า">🐢</button>');
      if (ex.th) h.push('<div class="pg-sh-et">' + esc(ex.th) + "</div>");
      h.push("</div>");
    }

    // Academic / study usage examples (Knowledge deck enrichment).
    if (item.au && item.au.length) {
      h.push('<div class="pg-sh-aca"><div class="pg-sh-aca-h">🎓 ใช้ในการเรียน / วิชาการ</div>');
      for (var ai = 0; ai < item.au.length; ai++) {
        var a = item.au[ai];
        if (!a.en) continue;
        h.push('<div class="pg-sh-ex"><span class="pg-sh-ee">' + esc(a.en) + "</span> " +
          '<button class="pg-spk" type="button" data-say="' + esc(a.en) + '" aria-label="Speak">🔊</button>');
        if (a.th) h.push('<div class="pg-sh-et">' + esc(a.th) + "</div>");
        h.push("</div>");
      }
      h.push("</div>");
    }

    // Synonyms / antonyms (enrichment).
    if (item.sy && item.sy.length) {
      h.push('<div class="pg-sh-row"><span class="pg-sh-lab">คำเหมือน</span><span class="pg-sh-val">' +
        esc(item.sy.join(", ")) + "</span></div>");
    }
    if (item.an && item.an.length) {
      h.push('<div class="pg-sh-row"><span class="pg-sh-lab">คำตรงข้าม</span><span class="pg-sh-val">' +
        esc(item.an.join(", ")) + "</span></div>");
    }

    // Teacher note.
    if (item.tn) {
      h.push('<div class="pg-sh-note"><span class="pg-sh-lab">Note</span> ' +
        esc(item.tn) + "</div>");
    }
    // Word-connections map entry (word decks only).
    if (item.w && def.type !== "sentence" && window.PT && PT.wmap) {
      h.push('<button class="pg-sh-map" type="button">🗺️ แผนที่คำ — คำเหมือน · ตรงข้าม · ใช้คู่กัน</button>');
    }
    // Retrieval question.
    if (item.rq) {
      h.push('<div class="pg-sh-rq"><span class="pg-sh-lab">Retrieval</span> ' +
        esc(item.rq) + "</div>");
    }

    h.push("</div>"); // .pg-sheet
    sheet.innerHTML = h.join("");
    sheet.style.display = "block";
    if (bg) bg.style.display = "block";
    // Reflow, then slide it up into view. Set the transform inline (reliably wins
    // over the base #sheet rule) plus the .open class for the backdrop.
    void sheet.offsetHeight;
    sheet.classList.add("open");
    if (bg) bg.classList.add("open");
    sheet.style.transform = "translateY(0)";

    // Wire buttons.
    var closeBtn = sheet.querySelector(".pg-close");
    if (closeBtn) closeBtn.onclick = function () { closeSheet(); };
    var spks = sheet.querySelectorAll(".pg-spk");
    for (var si = 0; si < spks.length; si++) {
      (function (btn) {
        btn.onclick = function () { speak(btn.getAttribute("data-say") || item.w || ""); };
      })(spks[si]);
    }
    var mapBtn = sheet.querySelector(".pg-sh-map");
    if (mapBtn) mapBtn.onclick = function () { if (PT.wmap && PT.wmap.openFor) PT.wmap.openFor(item, deckKey); };
  }

  // --- list + pager rendering ---------------------------------------------

  // Render only the list rows + pager into the host (keeps header intact).
  function renderListInto(host, list, deckKey, now) {
    var total = Math.ceil(list.length / PAGE_SIZE);
    if (total < 1) total = 1;
    // Clamp page.
    if (S.page < 1) S.page = 1;
    if (S.page > total) S.page = total;

    var start = (S.page - 1) * PAGE_SIZE;
    var end = start + PAGE_SIZE;
    if (end > list.length) end = list.length;

    var h = [];
    h.push('<div class="pg-list">');
    if (!list.length) {
      h.push('<div class="pg-empty">No items match.</div>');
    }
    for (var i = start; i < end; i++) {
      var item = list[i];
      var st = PT.srs.statusOf(S.rec[keyOf(item)] || PT.srs.newRecord(), now);
      h.push('<div class="pg-row" data-i="' + i + '">');
      h.push(groupTag(deckKey, item));
      h.push('<div class="pg-main">');
      h.push('<div class="pg-w">' + (item._no ? '<span class="pg-no">#' + item._no + '</span> ' : '') + esc(item.w || ""));
      if (item.p) h.push(' <span class="pg-pos">' + esc(item.p) + "</span>");
      h.push("</div>");
      h.push('<div class="pg-mt">' + esc(trunc(item.mt, 60)) + "</div>");
      h.push("</div>"); // .pg-main
      h.push('<span class="pg-dot" style="background:' + statusColor(st) +
        '"></span>');
      h.push("</div>"); // .pg-row
    }
    h.push("</div>"); // .pg-list

    // Pager control.
    if (total > 1) {
      h.push('<div class="pg-pager">');
      h.push(pagerBtn("«", 1, S.page === 1));            // first
      h.push(pagerBtn("‹", S.page - 1, S.page === 1));   // prev
      var items = pagerItems(S.page, total);
      for (var j = 0; j < items.length; j++) {
        var it = items[j];
        if (it === "…") {
          h.push('<span class="pg-gap">…</span>');
        } else {
          h.push('<button class="pg-pg' + (it === S.page ? " pg-cur" : "") +

        }
      }
      h.push(pagerBtn("›", S.page + 1, S.page === total)); // next
      h.push(pagerBtn("»", total, S.page === total));       // last
      h.push("</div>");
    }

    host.innerHTML = h.join("");

    // Wire row taps.
    var rows = host.querySelectorAll(".pg-row");
    for (var r = 0; r < rows.length; r++) {
      (function (rowEl) {
        rowEl.onclick = function () {
          var idx = parseInt(rowEl.getAttribute("data-i"), 10);
          openSheet(list[idx], deckKey);
        };
      })(rows[r]);
    }

    // Wire pager taps (re-render only this host).
    var pbtns = host.querySelectorAll(".pg-pg, .pg-nav");
    for (var b = 0; b < pbtns.length; b++) {
      (function (btn) {
        if (btn.disabled) return;
        btn.onclick = function () {
          var pg = parseInt(btn.getAttribute("data-pg"), 10);
          if (isNaN(pg)) return;

          if (PT.a11y && PT.a11y.enhance) PT.a11y.enhance(host);
        };
      })(pbtns[b]);
    }
  }

  function pagerBtn(label, pg, disabled) {
    return '<button class="pg-nav" type="button" data-pg="' + pg + '"' +
      (disabled ? " disabled" : "") + ">" + label + "</button>";
  }

  // --- public render -------------------------------------------------------

  PT.browse = {
    openSheet: openSheet,
    closeSheet: closeSheet,
    render: function (viewEl) {
      if (!viewEl) return;
      var now = Date.now();
      var list = PT.filters.apply(S);
      var deckKey = S.deck;

      var h = [];
      // Featured learning resource: sentence structure.
      if (window.PT && PT.structure) h.push('<button class="lib-feat" id="lib-struct"><span class="lf-i">📐</span>' +
        '<span><b>โครงสร้างประโยค</b><em>เรียนรู้โครงประโยคอังกฤษ · WH · คำเชื่อม · การแปลงประโยค</em></span></button>');
      // Library deck header + "review this deck (Cards)" entry.
      var dnm = (window.DECKS && DECKS[deckKey]) ? DECKS[deckKey].name : deckKey;
      h.push('<div class="lib-head"><div class="lib-title">' + esc(dnm) + '</div>' +
        '<button class="lib-review" id="lib-review">🃏 ทบทวน</button></div>');
      // Count line.
      h.push('<div class="pg-count">' + list.length + " item" +
        (list.length === 1 ? "" : "s") + "</div>");
      // List/pager host (re-rendered on page change without touching count).
      h.push('<div class="pg-host" id="pg-host"></div>');
      viewEl.innerHTML = h.join("");

      var rv = viewEl.querySelector("#lib-review");
      if (rv) rv.onclick = function () { if (window.goMode) goMode("cards"); };
      var ls = viewEl.querySelector("#lib-struct");
      if (ls) ls.onclick = function () { if (PT.structure && PT.structure.open) PT.structure.open(); };
      var host = viewEl.querySelector("#pg-host");
      renderListInto(host, list, deckKey, now);

      if (PT.a11y && PT.a11y.enhance) PT.a11y.enhance(viewEl);
    }
  };
})();

/* ===== module: cards ===== */
/* PT.cards — Flashcards tab (SM-2 study).
   Owns the Cards mode: builds a study queue, renders a 3D flip card,
   four rating buttons, undo, and keyboard control. ES5 only. */
(function () {
  "use strict";
  window.PT = window.PT || {};
  var PT = window.PT;
  PT.cards = PT.cards || {};

  /* ---------- small local helpers ---------- */

  function now() { return Date.now(); }

  // Ensure a record exists for an item; returns it (does NOT mutate maps
  // unless it has to create one — creation is harmless/idempotent).
  function recFor(S, item) {
    var k = keyOf(item);
    var r = S.rec[k];
    if (!r) { r = PT.srs.newRecord(); }  // transient — do NOT store; only grading persists
    return r;
  }

  // Persist rec map through srs, if srs exposes a save hook.
  function srsSave(S) {
    if (PT.srs && typeof PT.srs.save === "function") {
      try { PT.srs.save(S.deck, S.rec); } catch (e) {}
    }
  }

  // Day counters (new/rev caps). Prefer PT.srs.dayLog; fall back to a
  // local store-backed counter keyed by today's date so caps still work.
  function todayKey() {
    var d = new Date();
    return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  }
  function localDay() {
    var raw = store.get("pt.cards.day");
    var obj = null;
    try { obj = raw ? JSON.parse(raw) : null; } catch (e) { obj = null; }
    if (!obj || obj.d !== todayKey()) obj = { d: todayKey(), n: 0, r: 0 };
    return obj;
  }
  function dayCounts(deck) {
    if (PT.srs && typeof PT.srs.dayLog === "function") {
      try {
        var d = PT.srs.dayLog(deck);
        if (d) return { n: d.n || d.newDone || 0, r: d.r || d.revDone || 0 };
      } catch (e) {}
    }
    var o = localDay();
    return { n: o.n, r: o.r };
  }
  function bumpDay(kind, deck) {
    if (PT.srs) {
      if (kind === "new" && typeof PT.srs.bumpNew === "function") { try { PT.srs.bumpNew(deck); return; } catch (e) {} }
      if (kind !== "new" && typeof PT.srs.bumpRev === "function") { try { PT.srs.bumpRev(deck); return; } catch (e) {} }
    }
    var o = localDay();
    if (kind === "new") o.n += 1; else o.r += 1;
    store.set("pt.cards.day", JSON.stringify(o));
  }

  /* ---------- unlimited ("เล่นได้เรื่อยๆ ไม่มีจำกัด") mode ----------
     Off by default (respects the daily new/review caps, like real Anki).
     On: ignores newPerDay/revPerDay entirely, AND once due+learning+new run
     dry it recycles not-yet-due "known" cards for extra practice — so the
     session never has to end. Grading a recycled card still updates its real
     SM-2 schedule (reviewing early just pushes the interval further out),
     exactly like Anki's "Custom Study -> review ahead". Persisted so the
     learner's chosen mode sticks across visits. */
  var UNL_KEY = "pt_cards_unl";
  function isUnlimited() { return store.get(UNL_KEY) === "1"; }
  function setUnlimited(on) { store.set(UNL_KEY, on ? "1" : "0"); }

  /* ---------- queue construction ---------- */

  // buildQueue(list,S,now): due reviews (capped by revPerDay) sorted by due,
  // then learning-due cards, then new cards (capped by newPerDay). In
  // unlimited mode, caps are skipped and not-yet-due cards fill in once the
  // normal queue is empty. Returns a live array of {item,dueAt} and stores
  // the session on S.session.
  PT.cards.buildQueue = function (list, S, n) {
    n = n || now();
    var unlimited = isUnlimited();
    var reviews = [], learning = [], news = [], extra = [];
    var i, item, rec, st;
    for (i = 0; i < list.length; i++) {
      item = list[i];
      rec = recFor(S, item);
      st = PT.srs.statusOf(rec, n);
      if (st === "due") {
        reviews.push({ item: item, dueAt: rec.due || 0 });
      } else if (st === "learning") {
        // learning-due: only if its due time has arrived
        if ((rec.due || 0) <= n) learning.push({ item: item, dueAt: rec.due || 0 });
      } else if (st === "new") {
        news.push({ item: item, dueAt: n });
      } else if (unlimited) {
        // "known", not due yet — held back for recycling below
        extra.push({ item: item, dueAt: rec.due || 0 });
      }
    }

    // sort reviews by due ascending
    reviews.sort(function (a, b) { return a.dueAt - b.dueAt; });
    learning.sort(function (a, b) { return a.dueAt - b.dueAt; });

    if (!unlimited) {
      // apply daily caps (subtract what has already been done today)
      var counts = dayCounts(S.deck);
      var st2 = S.settings || {};
      var revCap = typeof st2.revPerDay === "number" ? st2.revPerDay : 120;
      var newCap = typeof st2.newPerDay === "number" ? st2.newPerDay : 20;
      var revRoom = Math.max(0, revCap - counts.r);
      var newRoom = Math.max(0, newCap - counts.n);
      if (reviews.length > revRoom) reviews = reviews.slice(0, revRoom);
      if (news.length > newRoom) news = news.slice(0, newRoom);
    }

    // order new cards: random or alphabetical
    if (S.filter && S.filter.sort === "random") {
      shuffle(news);
    } else {
      news.sort(function (a, b) {
        var wa = (a.item.w || "").toLowerCase(), wb = (b.item.w || "").toLowerCase();
        return wa < wb ? -1 : (wa > wb ? 1 : 0);
      });
    }

    var q = reviews.concat(learning, news);
    if (unlimited && q.length === 0 && extra.length) {
      shuffle(extra);
      q = extra.slice(0, 60); // one recycling batch; render() refills again once this drains
    }

    // mark which entries are "new" so we can bump the new counter on intro
    for (i = 0; i < q.length; i++) {
      q[i]._new = PT.srs.statusOf(recFor(S, q[i].item), n) === "new";
    }

    S.session = {
      q: q,
      total: q.length,
      done: 0,
      flipped: false,
      undo: null,
      unlimited: unlimited,
      introduced: {} // keyOf -> true once a new card has been counted
    };
    return q;
  };

  function shuffle(a) {
    var i, j, t;
    for (i = a.length - 1; i > 0; i--) {
      j = Math.floor(Math.random() * (i + 1));
      t = a[i]; a[i] = a[j]; a[j] = t;
    }
  }

  /* ---------- rendering ---------- */

  var RATES = [
    { r: 0, th: "อีกครั้ง", cls: "c-again" },
    { r: 1, th: "ยาก", cls: "c-hard" },
    { r: 2, th: "ดี", cls: "c-good" },
    { r: 3, th: "ง่าย", cls: "c-easy" }
  ];

  PT.cards.render = function (viewEl) {
    var S = window.S;
    var n = now();
    var unlimited = isUnlimited();
    var list = null;

    // (re)build the session if there is none or it drained. In unlimited mode,
    // a drained queue means "recycle" — buildQueue already refills from
    // not-yet-due cards, so this loop naturally keeps the session alive.
    if (!S.session || !S.session.q || S.session.q.length === 0) {
      list = PT.filters.apply(S);
      PT.cards.buildQueue(list, S, n);
    }

    var sess = S.session;
    if (!sess || sess.q.length === 0) {
      var empty = list || PT.filters.apply(S);
      var unlBtn = '<button class="c-unl-cta" data-c-unl="1">🔁 เล่นต่อแบบไม่จำกัด</button>';
      viewEl.innerHTML = empty.length === 0
        ? '<div class="c-empty"><div class="c-empty-emoji">🗂️</div>' +
          '<div class="c-empty-msg">ไม่มีคำในตัวกรองนี้</div></div>'
        : '<div class="c-empty"><div class="c-empty-emoji">🎉</div>' +
          '<div class="c-empty-msg">เก่งมาก! หมดการ์ดที่ต้องทบทวนของวันนี้แล้ว</div>' +
          '<div class="c-empty-sub">อยากฝึกต่อ ไม่ติดโควตารายวัน?</div>' + unlBtn + '</div>';
      var unlCta = viewEl.querySelector("[data-c-unl]");
      if (unlCta) unlCta.onclick = function () { setUnlimited(true); S.session = null; PT.cards.render(viewEl); };
      bindKeyboard(viewEl);
      return;
    }

    var entry = sess.q[0];
    var item = entry.item;
    var rec = recFor(S, item);
    var pos = sess.done + 1;
    var grp = item.g || (window.DECKS && DECKS[S.deck] ? DECKS[S.deck].name : "");

    var front, back;
    if (S.dir === "th") {
      front = frontHtml(item.mt || item.w, item.p, "th");
      back = backHtml(item, "th");
    } else {
      front = frontHtml(item.w, item.p, "en");
      back = backHtml(item, "en");
    }

    // interval preview labels for the four ratings
    var rateBtns = "";
    for (var i = 0; i < RATES.length; i++) {
      var prev = "";
      try { prev = PT.srs.intervalPreview(rec, RATES[i].r, n) || ""; } catch (e) { prev = ""; }
      rateBtns +=
        '<button class="c-rate ' + RATES[i].cls + '" data-r="' + RATES[i].r + '">' +
        '<span class="c-rate-th">' + esc(RATES[i].th) + '</span>' +
        '<span class="c-rate-iv">' + esc(prev) + '</span>' +
        '</button>';
    }

    var undoBtn = sess.undo
      ? '<button class="c-undo" title="เลิกทำ">↩ เลิกทำ</button>' : '';
    var unlToggle = '<button class="c-unl' + (unlimited ? ' on' : '') + '" data-c-unl-t="1" ' +
      'title="' + (unlimited ? "โหมดไม่จำกัด: เปิดอยู่ — ไม่ติดโควตารายวัน" : "เปิดโหมดไม่จำกัด — เล่นได้เรื่อยๆ ไม่ติดโควตารายวัน") + '">' +
      (unlimited ? "🔁 ไม่จำกัด" : "🔁") + '</button>';

    viewEl.innerHTML =
      '<div class="c-wrap' + (sess.flipped ? ' c-flipped' : '') + '">' +
        '<div class="c-top">' +
          '<span class="c-prog">' + pos + ' / ' + sess.total + '</span>' +
          '<span class="c-dot">·</span>' +
          '<span class="c-grp">' + esc(grp) + '</span>' +
          unlToggle +
          undoBtn +
        '</div>' +
        '<div class="c-card" id="c-card" tabindex="0">' +
          '<div class="c-inner">' +
            '<div class="c-face c-front">' + front + '</div>' +
            '<div class="c-face c-back">' + back + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="c-foot">' +
          '<button class="c-reveal">ดูเฉลย</button>' +
          '<div class="c-rates">' + rateBtns + '</div>' +
        '</div>' +
      '</div>';

    wire(viewEl, item);
    bindKeyboard(viewEl);
    if (PT.a11y && typeof PT.a11y.enhance === "function") PT.a11y.enhance(viewEl);
  };

  function frontHtml(main, p, dir) {
    var lc = (main || "").length > 22 ? " c-word-long" : "";  // shrink long text (sentences)
    return '<div class="c-word' + lc + '">' + esc(main || "") + '</div>' +
           (p ? '<div class="c-pos">' + esc(p) + '</div>' : '') +
           '<div class="c-hint">' + (dir === "th" ? "แตะเพื่อดูคำศัพท์" : "แตะเพื่อดูความหมาย") + '</div>';
  }

  function backHtml(item, dir) {
    var h = '';
    var lcw = (item.w || "").length > 22 ? " c-b-word-long" : "";
    var isFav = !!(window.PT && PT.fav && PT.fav.isFav(item));
    h += '<div class="c-b-head">' +
           '<span class="c-b-word' + lcw + '">' + esc(item.w || "") + '</span>' +
           '<button class="c-fav' + (isFav ? ' on' : '') + '" title="ติดดาว" aria-label="ติดดาว">' + (isFav ? '★' : '☆') + '</button>' +
           '<button class="c-speak" title="ฟังเสียง">🔊</button>' +
           ((window.DECKS && DECKS[S.deck] && DECKS[S.deck].type === "sentence")
             ? '<button class="c-speak" title="อ่านช้า" data-slow="' + esc(item.w || "") + '">🐢</button>'
             : '<button class="c-speak" title="สะกดคำ" data-spell="' + esc(item.w || "") + '">🔤</button>') +
         '</div>';
    var meta = [];
    if (item.p) meta.push(esc(item.p));
    if (item.ip) meta.push('<span class="c-b-ipa">' + esc(item.ip) + '</span>');
    if (meta.length) h += '<div class="c-b-pos">' + meta.join(" · ") + '</div>';
    if (item.vf && item.vf.v2 && item.vf.v3) {
      h += '<div class="c-b-vf">' +
        '<div class="c-vf-cell"><span class="c-vf-l">V1</span><span class="c-vf-w">' + esc(item.w || "") + '</span></div>' +
        '<span class="c-vf-ar">→</span>' +
        '<div class="c-vf-cell"><span class="c-vf-l">V2</span><span class="c-vf-w">' + esc(item.vf.v2) + '</span></div>' +
        '<span class="c-vf-ar">→</span>' +
        '<div class="c-vf-cell"><span class="c-vf-l">V3</span><span class="c-vf-w">' + esc(item.vf.v3) + '</span></div>' +
        (item.vf.ir ? '<span class="c-vf-ir">ไม่ปกติ</span>' : '') +
        '</div>';
    }
    if (item.me) h += '<div class="c-b-row"><span class="c-b-lab">EN</span>' + esc(item.me) + '</div>';
    if (item.mt) h += '<div class="c-b-row"><span class="c-b-lab">TH</span>' + esc(item.mt) + '</div>';
    if (item.ee) h += '<div class="c-b-ex">' + esc(item.ee) + '</div>';
    if (item.et) h += '<div class="c-b-ex c-b-ex-th">' + esc(item.et) + '</div>';
    if (item.x) h += '<div class="c-b-x">' + esc(item.x) + '</div>';
    if (item.sy && item.sy.length) h += '<div class="c-b-syn">≈ ' + esc(item.sy.join(", ")) + '</div>';
    if (item.an && item.an.length) h += '<div class="c-b-syn c-b-ant">↔ ' + esc(item.an.join(", ")) + '</div>';
    if (item.tn) h += '<div class="c-b-note">📝 ' + esc(item.tn) + '</div>';
    return h;
  }

  /* ---------- interaction ---------- */

  function wire(viewEl, item) {
    var S = window.S;
    var card = viewEl.querySelector(".c-card");
    var reveal = viewEl.querySelector(".c-reveal");
    var rates = viewEl.querySelectorAll(".c-rate");
    var speakBtn = viewEl.querySelector(".c-speak");
    var undo = viewEl.querySelector(".c-undo");

    function doFlip() {
      if (S.session.flipped) return;
      S.session.flipped = true;
      var wrap = viewEl.querySelector(".c-wrap");
      if (wrap) wrap.className = "c-wrap c-flipped";
    }

    if (reveal) reveal.onclick = doFlip;
    if (card) card.onclick = doFlip;

    if (speakBtn) speakBtn.onclick = function (e) {
      e.stopPropagation();
      speak((item.w || "") + ". " + (item.ee || ""));
    };

    var favBtn = viewEl.querySelector(".c-fav");
    if (favBtn) favBtn.onclick = function (e) {
      e.stopPropagation();
      if (window.PT && PT.fav) {
        var on = PT.fav.toggle(item);
        favBtn.className = "c-fav" + (on ? " on" : "");
        favBtn.textContent = on ? "★" : "☆";
      }
    };

    var unlBtn = viewEl.querySelector("[data-c-unl-t]");
    if (unlBtn) unlBtn.onclick = function (e) {
      e.stopPropagation();
      setUnlimited(!isUnlimited());
      S.session = null; // force a fresh queue under the new mode
      PT.cards.render(viewEl);
    };

    var i;
    for (i = 0; i < rates.length; i++) {
      rates[i].onclick = (function (btn) {
        return function (e) {
          e.stopPropagation();
          if (!S.session.flipped) return; // must reveal first
          grade(parseInt(btn.getAttribute("data-r"), 10));
        };
      })(rates[i]);
    }

    if (undo) undo.onclick = function () { doUndo(); };
  }

  // Grade the current (front) card.
  function grade(rating) {
    var S = window.S;
    var n = now();
    var sess = S.session;
    if (!sess || !sess.q.length) return;

    var entry = sess.q[0];
    var item = entry.item;
    var key = keyOf(item);
    var prevRec = S.rec[key]; // preserved by reference (grade returns a new object)

    // mistake notebook: "อีกครั้ง" (Again=0) = a lapse -> collect; Good/Easy (>=2) -> credit toward retiring
    try { if (PT.miss) { if (rating === 0) PT.miss.add(S.deck, key); else if (rating >= 2) PT.miss.right(S.deck, key); } } catch (e) {}

    // undo snapshot BEFORE mutating
    sess.undo = {
      key: key,
      prevRec: prevRec,
      queue: sess.q.slice(),
      done: sess.done,
      introduced: cloneFlat(sess.introduced)
    };

    // bump the new-card counter the first time a new card is introduced
    if (entry._new && !sess.introduced[key]) {
      sess.introduced[key] = true;
      bumpDay("new", S.deck);
    } else {
      bumpDay("rev", S.deck);
    }

    var res = PT.srs.grade(prevRec, rating, n);
    S.rec[key] = res.rec;
    srsSave(S);

    if (res.requeue) {
      entry.dueAt = res.rec.due;
      // re-sort the live queue by dueAt ascending
      sess.q.sort(function (a, b) { return a.dueAt - b.dueAt; });
    } else {
      sess.q.shift();
      sess.done += 1;
    }

    sess.flipped = false;

    // progress dots elsewhere should update
    if (PT.bus && PT.bus.emit) PT.bus.emit("recchange");

    PT.cards.render(document.getElementById("view"));
  }

  function doUndo() {
    var S = window.S;
    var sess = S.session;
    if (!sess || !sess.undo) return;
    var u = sess.undo;
    if (u.prevRec) { S.rec[u.key] = u.prevRec; } else { delete S.rec[u.key]; }  // don't leave a phantom key for undone new cards
    sess.q = u.queue;
    sess.done = u.done;
    sess.introduced = u.introduced;
    sess.flipped = false;
    sess.undo = null;
    srsSave(S);
    if (PT.bus && PT.bus.emit) PT.bus.emit("recchange");
    PT.cards.render(document.getElementById("view"));
  }

  function cloneFlat(o) {
    var r = {}, k;
    for (k in o) if (Object.prototype.hasOwnProperty.call(o, k)) r[k] = o[k];
    return r;
  }

  /* ---------- keyboard: 1-4 rate, space flip ---------- */

  function bindKeyboard(viewEl) {
    if (PT.cards._kbBound) return;
    PT.cards._kbBound = true;
    document.addEventListener("keydown", function (e) {
      var S = window.S;
      if (S.mode !== "cards") return;
      var tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : "";
      if (tag === "input" || tag === "textarea" || tag === "select") return;
      if (!S.session || !S.session.q || !S.session.q.length) return;

      if (e.key === " " || e.key === "Spacebar" || e.keyCode === 32) {
        e.preventDefault();
        if (!S.session.flipped) {
          S.session.flipped = true;
          var wrap = document.querySelector(".c-wrap");
          if (wrap) wrap.className = "c-wrap c-flipped";
        }
        return;
      }

/* ===== module: quiz ===== */
/* PT.quiz — Quiz tab. Two sub-modes: Multiple choice (mc) and Typing (type).
   Integrated with SRS: correct=Good(2), wrong=Again(0). Emits 'recchange'.
   ES5 only. Classes prefixed '.qz-'. */
(function () {
  "use strict";
  window.PT = window.PT || {};

  // ---- module-local session state (kept on PT.quiz so it survives re-renders) ----
  var Q = {
    sub: "mc",        // "mc" | "type" | "listen"
    cur: null,        // current question object
    answered: false,  // whether current question was answered
    picked: -1,       // index user picked (mc) for highlight
    right: 0,         // session correct count
    total: 0,         // session total answered
    lastCorrect: false,
    played: false,    // listen mode: whether current clip has auto-played
    bDraft: ""        // build mode: the user's typed sentence
  };

  // pick a random integer 0..n-1
  function ri(n) { return Math.floor(Math.random() * n); }

  // shuffle array in place (Fisher-Yates), returns same array
  function shuffle(a) {
    var i, j, t;
    for (i = a.length - 1; i > 0; i--) {
      j = ri(i + 1);
      t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // Is direction English-prompt? (dir "en" => show English word, answer = meaning)
  function isEn(S) { return S && S.dir === "en"; }

  // The "prompt" text the learner sees for an item.
  function promptText(item, S) {
    // en: show English word -> choose Thai meaning
    // th: show Thai meaning  -> choose English word
    return isEn(S) ? (item.w || "") : (item.mt || item.me || "");
  }

  // The "answer" text (correct option / typed target) for an item.
  function answerText(item, S) {
    return isEn(S) ? (item.mt || item.me || "") : (item.w || "");
  }

  // A Thai->English SENTENCE pair for build mode, or null if the item has none.
  function sentPair(it, S) {
    if (!it) return null;
    var dt = (window.DECKS && DECKS[S.deck]) ? DECKS[S.deck].type : "";
    if (dt === "sentence") {                 // Sentences deck: w = EN sentence, mt = TH
      return (it.w && it.mt) ? { en: it.w, th: it.mt } : null;
    }
    return (it.ee && it.et) ? { en: it.ee, th: it.et } : null;  // vocab decks: example sentence
  }

  // Build a multiple-choice or typing question from the filtered list.
  // Frozen signature: PT.quiz.build(list, S) -> question object
  function build(list, S) {
    if (!list || !list.length) return null;

    var target = list[ri(list.length)];

    if (Q.sub === "type") {
      return {
        sub: "type",
        item: target,
        answer: answerText(target, S) // expected typed text (English when en, Thai when th)
      };
    }

    if (Q.sub === "listen") {
      // dictation: hear the English, type it back (answer is always the English)
      return {
        sub: "listen",
        item: target,
        answer: target.w || ""
      };
    }

    if (Q.sub === "build") {
      // sentence production: show Thai, user writes the English, then self-assess.
      var bt = null, bp = null, btries = 0;
      while (btries < 20) {
        var bcand = list[ri(list.length)];
        bp = sentPair(bcand, S);
        if (bp) { bt = bcand; break; }
        btries++;
      }
      if (!bt) return { sub: "build", item: null };
      return { sub: "build", item: bt, th: bp.th, en: bp.en };
    }

    if (Q.sub === "cloze") {
      // fill-in-the-blank: blank the headword out of its example sentence.
      var ct = null, blanked = null, tries = 0;
      while (tries < 15) {
        var cand = list[ri(list.length)];
        var b = makeCloze(cand);
        if (b) { ct = cand; blanked = b; break; }
        tries++;
      }
      if (!ct) return { sub: "cloze", item: null };
      return { sub: "cloze", item: ct, cloze: blanked, answer: ct.w || "" };
    }

    // ---- multiple choice ----
    // Prefer distractors from the SAME deck (S.data) sharing a POS bucket.
    var correct = answerText(target, S);
    var targetKey = keyOf(target);
    var pool = (S && S.data && S.data.length) ? S.data : list;

    // POS buckets of the target (may be empty)
    var tBuckets = (PT.pos && PT.pos.buckets) ? PT.pos.buckets(target.p || "") : [];

    function sharesBucket(it) {
      if (!tBuckets.length) return false;
      var b = (PT.pos && PT.pos.buckets) ? PT.pos.buckets(it.p || "") : [];
      var i, j;
      for (i = 0; i < b.length; i++) {
        for (j = 0; j < tBuckets.length; j++) {
          if (b[i] === tBuckets[j]) return true;
        }
      }
      return false;
    }

    var opts = [correct];         // option texts collected (for dedupe)
    var seen = {};
    seen[correct] = true;

    // 1st pass: same POS bucket
    var i, cand, txt;
    var order = [];
    for (i = 0; i < pool.length; i++) order.push(i);
    shuffle(order);

    for (i = 0; i < order.length && opts.length < 4; i++) {
      cand = pool[order[i]];
      if (keyOf(cand) === targetKey) continue;
      if (!sharesBucket(cand)) continue;
      txt = answerText(cand, S);
      if (!txt || hasSeen(seen, txt)) continue;
      seen[txt] = true;
      opts.push(txt);
    }
    // 2nd pass: fill remaining from anywhere in the deck
    for (i = 0; i < order.length && opts.length < 4; i++) {
      cand = pool[order[i]];
      if (keyOf(cand) === targetKey) continue;
      txt = answerText(cand, S);
      if (!txt || hasSeen(seen, txt)) continue;
      seen[txt] = true;
      opts.push(txt);
    }

    // Build option objects, mark the correct one, then shuffle.
    var optObjs = [];
    for (i = 0; i < opts.length; i++) {

    }
    shuffle(optObjs);

      sub: "mc",
      item: target,
      prompt: promptText(target, S),

  function hasSeen(seen, k) {

  // sentence -> "... _____ ...". null if the exact form isn't found.
  function makeCloze(item) {
    var ee = item && item.ee ? item.ee : "";
    var w = item && item.w ? item.w : "";
    if (!ee || !w) return null;
    var e = w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&").replace(/\s+/g, "\\s+"); // flexible spacing for phrases

  function gradeItem(item, correct, S) {

    // Today Hub: a cloze answer counts toward today's game slot
    try { if (PT.hub && PT.hub.bumpStep && Q.sub === "cloze") PT.hub.bumpStep("game", 3); } catch (e) {}
    var rec = (S.rec && S.rec[k]) ? S.rec[k] : PT.srs.newRecord();
    var rating = correct ? 2 : 0; // Good : Again

    S.rec = S.rec || {};
    S.rec[k] = res.rec;

    try { if (PT.srs && PT.srs.save) PT.srs.save(S.deck, S.rec); } catch (e) {}

    Q.picked = -1;
    Q.played = false;   // allow the new clip to auto-play (listen mode)
    Q.bDraft = "";      // clear build-mode draft
    rerender(S);
  }

  // build mode: reveal the model answer (capture the user's draft first)
  function bReveal(S) {
    if (Q.answered || !Q.cur) return;
    var el = document.getElementById("qz-binput");
    Q.bDraft = el ? el.value : "";

    rerender(S);
  }
  // build mode: self-assessment -> feed SRS + mistake notebook, then advance
  function bRate(rating, S) {
    if (!Q.cur || !Q.cur.item) return;

    if (correct) Q.right++;

  }
  function bClaude(S) {
    var q = Q.cur, msg = document.getElementById("qz-bmsg");
